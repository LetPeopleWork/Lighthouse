    title: Forecast-shift confirmation from at least one customer
    target: "At least one customer reports percentile dates shifted in the expected direction within 60 days"
    measurement_scope: opt_in_telemetry_required
    rationale: >
      Validates the feature's job-to-be-done: 'honest delivery dates for the
      stakeholder conversation'. If the shift is invisible or in the wrong
      direction the JTBD is unsubstantiated.
    measurement_plan:
      data_collection:
        - "Community feedback or interview note."
      derivation: "N/A — proxy signals only."
      surfacing:
        - "docs/evolution/filter-forecast-throughput-evolution.md"
    alerting: []
    status: deferred-pending-telemetry-feature

  - id: OUT-filter-default-chart-regression
    feature: filter-forecast-throughput
    title: Default chart behaviour regressions
    target: "Zero regressions in default Throughput Run Chart / PBC behaviour after this feature lands"
    measurement_scope: per_instance + vendor_demo_only
    acceptance_scenarios:
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/ForecastFilterThroughputChartIntegrationTest.cs
        scenario: "GetThroughputPbc_PremiumTenantTeamWithFilterAndQueryParamOmitted_DefaultsToRaw"
        tag: "@kpi-OUT-filter-default-chart-regression"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/ForecastFilterThroughputChartIntegrationTest.cs
        scenario: "GetThroughput_PremiumTenantTeamWithFilter_ReturnsPerItemGranularPayloadForClientSideFilter"
        tag: "@kpi-OUT-filter-default-chart-regression"
        gate_type: hard
    measurement_window: continuous (CI gate)
    rationale: >
      D1 / invariant #1 — default chart rendering must be byte-identical to today
      for every team regardless of premium status or filter configuration.
    alerting: []

  - id: OUT-filter-toggle-divergence
    feature: filter-forecast-throughput
    title: Per-run / per-view toggle usage diverges from default
    target: "At least one user reports flipping a toggle within the same session"
    measurement_scope: opt_in_telemetry_required
    rationale: >
      Slices 02 / 03 / 04 learning hypothesis. If toggles are never flipped,
      the symmetry argument behind D3 is unsubstantiated.
    measurement_plan:
      data_collection: ["Community / interview note."]
      derivation: "N/A — proxy signals only."
      surfacing: ["docs/evolution/filter-forecast-throughput-evolution.md"]
    alerting: []
    status: deferred-pending-telemetry-feature

  - id: OUT-filter-rule-editor-reuse
    feature: filter-forecast-throughput
    title: Rule-editor reuse satisfaction
    target: "No customer feedback reporting the editor is confusing or that dedicated controls were expected"
    measurement_scope: opt_in_telemetry_required
    rationale: >
      D7 reuse-bet validation. Disconfirming signal would prompt re-evaluation
      of the reuse strategy.
    measurement_plan:
      data_collection: ["Community / interview note."]
      derivation: "N/A — proxy signals only."
      surfacing: ["docs/evolution/filter-forecast-throughput-evolution.md"]
    alerting: []
    status: deferred-pending-telemetry-feature

  - id: OUT-filter-rule-engine-regression
    feature: filter-forecast-throughput
    title: Rule-engine generalisation regression
    target: "Zero regressions in existing rule-based deliveries; mutation kill rate >= pre-feature baseline on rule-engine code"
    measurement_scope: per_instance + vendor_demo_only
    acceptance_scenarios:
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/Models/DeliveryRules/RuleEngineReuseCanaryTests.cs
        scenario: "TypeEqualsBugRuleSet_DeserialisesIdenticallyAcrossBothConsumers"
        tag: "@kpi-OUT-filter-rule-engine-regression"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/Models/DeliveryRules/RuleEngineReuseCanaryTests.cs
        scenario: "MultiRuleSet_DeserialisesIdenticallyAcrossBothConsumers"
        tag: "@kpi-OUT-filter-rule-engine-regression"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/Models/DeliveryRules/RuleEngineReuseCanaryTests.cs
        scenario: "RuleSetExceedingMaxRules_FailsValidationOnBothConsumers"
        tag: "@kpi-OUT-filter-rule-engine-regression"
        gate_type: hard
    measurement_window: continuous (CI gate + Stryker.NET per-feature)
    rationale: >
      DDD-7 canary protects the JSON-shape invariant; existing rule-based
      deliveries test suite protects behaviour parity; Stryker kill rate
      protects mutation regression. All three are hard CI gates.
    alerting: []

  - id: OUT-aging-pace-bands-rendered
    feature: aging-pace-percentiles
    title: Per-state pace bands actually render for teams/portfolios
    target: ">= 30% of teams have >=1 state returning a non-empty band array within 6 weeks of sibling slice-01 transition-capture shipping"
    measurement_scope: per_instance
    acceptance_scenarios:
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/AgeInStatePercentilesReadApiIntegrationTest.cs
        scenario: "GetAgeInStatePercentiles_TeamWithCompletedItemsAcrossThreeStates_ReturnsExactCumulativeAgeAtExitPercentilesPerState"
        gate_type: hard
    instrumentation_status: >
      PENDING. No backend counter is emitted yet. Bands depend on forward-only
      WorkItemStateTransition accumulation; sparse until history builds. Cross-instance
      measurement blocked on Epic 5015 (opt-in telemetry); per_instance only.
    alerting: []

  - id: OUT-aging-pace-legend-toggled
