  - id: OUT-be-parallel-debt
    feature: backend-test-speed
    title: Avoidable [NonParallelizable] opt-out count
    target: "Reduced from 54 to the justified allowlist only (~<= 8 inherently-serial)"
    measurement_scope: per_instance
    measured_by: "`grep -rl NonParallelizable Lighthouse.Backend` vs the US-04 allowlist; ArchUnit guard enforces"
    measurement_window: every CI run (guard is a normal test)
    rationale: >
      The debt accumulated because no guard existed after #5020 CS-P. US-04 adds an ArchUnit guard
      that fails the build on any off-allowlist [NonParallelizable], preventing silent re-accumulation.
    alerting:
      - condition: "off-allowlist [NonParallelizable] present"
        action: "build fails (ArchUnit guard red)"

