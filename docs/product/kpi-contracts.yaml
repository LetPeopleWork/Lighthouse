        scenario: "Premium delivery-forecaster configures the filter and propagates it across every forecast surface"
        tag: "@kpi-OUT-filter-adoption"
        gate_type: soft
    measurement_window: rolling 30 days post-release
    rationale: >
      Validates Epic 4896 demand AND the rule-engine reuse architectural bet.
      If users complain the editor is confusing, the D7 reuse hypothesis is wrong.
    measurement_plan:
      data_collection:
        - "Community feedback (Slack, GitHub) and direct customer follow-up with Liz / JLP."
        - "NOT INSTRUMENTED. Self-hosted telemetry blocked on Epic 5015."
      derivation: "N/A — proxy signals only."
      surfacing:
        - "docs/evolution/filter-forecast-throughput-evolution.md (post-release running notes)"
    alerting: []
    status: deferred-pending-telemetry-feature
    blocked_by: "ADO Epic #5015 — Opt-in Product Telemetry."
    interim_measurement: "Community / customer-follow-up only; document confirmations in docs/evolution/filter-forecast-throughput-evolution.md"

