        scenario: "flow coach toggles per-state pace bands on the portfolio Work Item Aging chart"
        gate_type: soft
    instrumentation_status: >
      Tracked via issue-tracker label `feature-request-aging-pace` + community Slack mentions.
      Directional only (vendor_demo_only); no automated measurement.
    alerting: []

  # ─────────────────────────────────────────────────────────────────────────
  # remove-action-buttons (ADO #5077). Added by DISTILL wave 2026-05-29.
  # Frontend-only UX coherence + debt retirement. KPIs are repo/test/grep-
  # verifiable (NOT telemetry): customer instances do not phone home, so KPI 1
  # (no explicit commit click) and KPI 2 (stopgap Alerts removed) are asserted
  # at build time via the acceptance suite + grep. KPIs 5-6 (lost-edit -50%,
  # recompute +30%) stay blocked on Epic 5015 and are NOT registered here.
  #
  # GA BASELINE (DELIVER finalize 2026-05-29, HEAD 2770d739) — MEASURED:
  #   KPI 1: surfaces requiring an explicit Save/Run click for valid input = 0/6 (was 6/6).
  #   KPI 2: stopgap "you must refresh" Alerts remaining = 0 (was 2).
  #   KPI 3: surfaces exhibiting valid-input-acts-immediately = 6/6 (was 1/6).
  #   Verified: Vitest 3090 passing; mutation 81.82%; walking skeleton live (demo scenario 0).
  # ─────────────────────────────────────────────────────────────────────────

  - id: OUT-remove-action-buttons-no-explicit-commit-click
    feature: remove-action-buttons
    title: No settings/forecast surface requires an explicit Save/Run click for valid input
    target: "0 of 6 settings/forecast surfaces require an explicit Save/Run click for valid input (baseline 6/6)"
    ga_baseline: "0 of 6 (MEASURED at DELIVER finalize 2026-05-29, HEAD 2770d739)"
    measurement_scope: per_instance
    acceptance_scenarios:
      - file: Lighthouse.Frontend/src/hooks/useModifySettings.autosave.test.ts
        scenario: "@US-01 persists a valid edit automatically after the team-admin stops typing"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.Frontend/src/pages/Teams/Detail/TeamForecastView.autorun.test.tsx
        scenario: "@US-05 recomputes the new-item forecast automatically after a valid input change"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.EndToEndTests/tests/specs/teams/ForecastFilter.spec.ts
        scenario: "@walking_skeleton a team-admin's valid settings edit persists with All changes saved and no Save button (walking skeleton folded in; AutoSaveTeamSettings.spec.ts deleted)"
        tag: "@kpi"
        gate_type: hard
    instrumentation_status: >
      Repo/test/grep-verifiable (KPI 1 + KPI 3 from DISCUSS outcome-kpis). Asserted at build time
      via the acceptance suite (auto-save + auto-run scenarios) plus a grep for absence of Save/Run
      buttons on the six converted surfaces. No runtime telemetry; not dependent on Epic 5015.
    alerting: []

  - id: OUT-remove-action-buttons-stopgap-alerts-removed
    feature: remove-action-buttons
    title: Both "you must refresh" stopgap Alerts are removed
    target: "0 stopgap reload-instruction Alerts remain (baseline 2: StateMappings must-reload + forecast-filter-takeeffect-hint)"
    ga_baseline: "0 stopgap Alerts (MEASURED at DELIVER finalize 2026-05-29; both deleted, grep-confirmed)"
    measurement_scope: per_instance
    acceptance_scenarios:
      - file: Lighthouse.Frontend/src/hooks/useModifySettings.autosave.test.ts
        scenario: "@US-02 auto-saves a valid mapping change and refreshes the dependent metrics"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.Frontend/src/hooks/useModifySettings.autosave.test.ts
        scenario: "@US-03 auto-saves a valid filter rule and never triggers an automatic throughput recompute"
        tag: "@kpi"
        gate_type: hard
    instrumentation_status: >
      Repo/test/grep-verifiable (KPI 2 from DISCUSS outcome-kpis). Asserted at build time: a grep
      confirms the absence of the two retired Alerts ("After saving, a data reload is needed";
      `forecast-filter-takeeffect-hint`), and the auto-save + reload scenarios cover the replacement
      behaviour. No runtime telemetry.
    alerting: []

  - id: OUT-blackout-forecast-shift
    feature: blackout-day-forecast-shift
    title: Forecast percentile dates step over known non-working days and never land on one
    target: >
      100% of forecast surfaces shift percentile dates over configured future blackout periods
      (worked example: 10 working days + 2 future blackout days ⇒ 12 calendar days); 0 percentile
      dates land on a blackout day; no-blackout teams byte-identical to pre-feature (D6); the
      Monte Carlo days value (GetProbability) is unchanged with/without periods (D4).
    measurement_scope: per_instance
    acceptance_scenarios:
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/BlackoutForecastShiftTeamForecastIntegrationTest.cs
        scenario: "@US-01 manual When percentile date steps over a future blackout span (POST /forecast/manual/{id})"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/BlackoutForecastShiftItemPredictionIntegrationTest.cs
        scenario: "@US-02 by-date how-many is scored on the working-day count (POST /forecast/manual/{id})"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/BlackoutForecastShiftDeliveryIntegrationTest.cs
        scenario: "@US-03 feature/delivery percentile date steps over blackouts on the portfolio surface (GET /deliveries/portfolio/{id})"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/Services/Implementation/BlackoutForecastShiftWriteBackTest.cs
        scenario: "@US-04 the shifted date is written back and the historical-strip × forward-shift compose guard holds"
        tag: "@kpi"
        gate_type: hard
    instrumentation_status: >
      Repo/test-verifiable (all 4 KPIs: Fri-vs-Mon date stability, zero-dates-on-blackout, no-blackout
      regression, mutation >=80%). Asserted at build time via the
      backend acceptance suite pinning a deterministic forecast (days value fixed) and asserting the
      shifted calendar date / working-day count across all four surfaces, plus no-blackout regression
      guards (D6) and an ArchUnit Models ↛ Repositories guard (ADR-058 A1). No runtime telemetry;
      not dependent on Epic 5015. Tests authored RED+[Ignore] at DISTILL; un-ignored in DELIVER.
    alerting: []

  - id: OUT-recurring-blackout-unified-evaluation
    feature: recurring-blackout-events
    title: Recurring-rule days are honoured identically to one-off blackout days on every forecast & chart surface
    target: >
      A recurring-rule day produces identical IsBlackoutDay / GetBlackoutDayIndices results to an
      equivalent one-off BlackoutPeriod (D4 unified evaluation), so 0 percentile dates land on a
      recurring non-working day across the manual When forecast, by-date how-many/likelihood, delivery
      dates, backtest horizon, historical-throughput stripping, write-back, and chart overlays; with no
      rules and no periods every surface is byte-identical to pre-feature (DDD-6); the Monte Carlo is
      unchanged (D7 — only the blackout-day SET widens).
    measurement_scope: per_instance
    acceptance_scenarios:
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/RecurringBlackoutRulesWeekendsForeverIntegrationTest.cs
        scenario: "@US-01 a weekends-forever rule steps the When percentile dates over Saturday/Sunday"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/RecurringBlackoutRulesIntervalRuleIntegrationTest.cs
        scenario: "@US-02 an every-4th-Friday bounded rule marks exactly the off-site Fridays and no off-week Friday"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/RecurringBlackoutRulesDownstreamParityIntegrationTest.cs
        scenario: "@US-03 a recurring-rule day shifts the percentile date identically to an equivalent one-off period"
        tag: "@kpi"
        gate_type: hard
      - file: Lighthouse.Backend/Lighthouse.Backend.Tests/API/Integration/RecurringBlackoutRulesWriteBackIntegrationTest.cs
        scenario: "@US-03 the recurring-blackout-shifted date is written back; no-rule no-period case unchanged"
        tag: "@kpi"
        gate_type: hard
    instrumentation_status: >
      Repo/test-verifiable now (DISCUSS KPI 3 correctness guardrail + KPI 4 mutation quality);
      independent of telemetry. Asserted at build time via 26 port-to-port integration scenarios plus
      parity tests that compute the recurring-day result and the equivalent one-off result and assert
      equality, an ArchUnit seam guard (RecurringBlackoutEventsSeamArchUnitTest), and the regression
      tests added when the adversarial review found the backtest + throughput-stripping eval sites had
      bypassed the union seam. Mutation (KPI 4): backend 90.22% on the new recurrence + endpoint code.
      DISCUSS KPIs 1 & 2 (recurring-rule adoption replacing hand-entered weekend periods; drop in net-new
