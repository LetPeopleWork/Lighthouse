        daily blocker; an outbound, occasional job, so the honest gap is 2, not 4.

  - id: job-forecast-no-false-certainty
    title: Present a forecast that leaders won't read as a guarantee
    persona: delivery-forecaster
    feature_context: forecast-confidence-cap
    created: 2026-05-30
    note: >
      ADO #5126 "Never show 100% Confidence". The sibling concern — don't forecast a team with too
      little throughput data — is a DISTINCT job tracked in ADO #5125 and is OUT of this feature.
    job_story: >
      When I share a Lighthouse forecast likelihood with leadership and the number reads as 100%
      (or a high deterministic-looking figure),
      I want the number itself to express honest uncertainty rather than apparent certainty,
      so deterministic-thinking stakeholders don't lock onto it as a committed date and hold me to a
      certainty that probability never promised.
    dimensions:
      functional: >
        Forecast likelihoods above a high threshold render as ">95%" instead of a precise 96-100%
        figure; a genuinely complete item (no remaining work) still reads as done/100%.
      emotional: >
        Move from the dread of a leader screenshotting "100%" and treating it as a promise, to
        confidence that the headline number itself signals "there is still a chance this moves".
      social: >
        Be seen as a forecaster who communicates probability honestly — not someone who over-promised
        a date and then missed it.
    forces:
      push: >
        Lighthouse currently shows 100% (and 96-99%) on forecasts; deterministic-thinking leaders read
        100% as "that's the date" and are blindsided when it slips.
      pull: >
        A ">95%" band reads as "very likely, not guaranteed" — the honest message in one glance, with
        no verbal caveat speech required when presenting.
      anxiety: >
        Will capping make the tool look less precise or less credible?
        Will it hide a real difference between 96% and 99%?
        (Mitigated: anything at or below 95% still shows its precise value; only the deceptively-certain
        top band collapses, and completed items keep 100%.)
      habit: >
        Forecasters verbally caveat the 100% ("it's not really certain...") every time they present —
        a ritual the number itself should make unnecessary.
    opportunity_score:
      importance: 4
      current_satisfaction: 2
      gap: 2
      rationale: >
        Real credibility/trust pain in the forecaster's leadership conversation, but a
        communication-honesty refinement rather than a blocking capability gap — the forecast already
        works, this makes its headline number honest. Hence gap 2, not 4.

  - id: job-forecast-only-with-enough-data
    title: Trust a forecast only when it rests on enough throughput history
    persona: delivery-forecaster
    feature_context: forecast-minimum-data-guard
    created: 2026-05-31
    note: >
      ADO #5125 "Don't Forecast with too little Data". The sibling concern — never display a
      deceptively-certain 100% — is a DISTINCT job tracked in ADO #5126 / feature
      forecast-confidence-cap and is OUT of this feature. This job is the data-sufficiency GATE the
      cap's D3 explicitly deferred here. Rule basis chosen by the reporter (2026-05-31): a forecast
      is allowed only when the team's throughput window has at least 5 distinct days that each had
      ≥1 completed work item; below that the forecast output is SUPPRESSED and a plain-language "not
      enough data yet" message is shown across every forecast surface.
    job_story: >
      When I open a forecast for a new (or low-volume) team whose throughput history holds only a
      day or two of actual completions,
      I want Lighthouse to tell me there is not yet enough data to forecast — and show nothing in
      place of a number — rather than handing me a confident-looking date (often 100% on a far-future
      day) built on one or two data points,
      so I never present, and leadership never anchors on, a forecast that the underlying history
      cannot honestly support.
    dimensions:
      functional: >
        Below the sufficiency threshold (fewer than 5 distinct days with ≥1 completion in the
        team's throughput window) every forecast surface — manual When and How-Many, portfolio
        delivery likelihood, per-feature likelihood — replaces the number with an explicit
        "not enough throughput data yet (need ≥5 days with completed items)" state. At or above the
        threshold the forecast renders exactly as today. A genuinely completed item (no remaining
        work) is exempt — there is no forecast to suppress.
      emotional: >
        Move from quiet embarrassment ("I'm showing a 100% chance on a 2027 date from a team that
        has barely closed anything — this looks fake") to confidence ("Lighthouse won't hand me a
        number it can't stand behind; the empty state is the honest answer").
      social: >
        Be the forecaster who doesn't get caught presenting a date built on one data point —
        and who can point to the tool's own "not enough data yet" message as the reason to wait.
    forces:
      push: >
        A brand-new team with a throughput of one still gets a forecast — a far-future date at an
        apparently high likelihood — because the Monte Carlo path only guards `Total > 0`, never the
        DEPTH of the history. The reporter (Liz) hit exactly this and now hand-rolls a workaround:
        she hides the forecast on her dashboard and waits until the team has accumulated enough data.
      pull: >
        One sufficiency rule, evaluated server-side off the throughput the forecast actually uses,
        suppresses every forecast surface at once with a plain message that names what unblocks it —
        no dashboard hand-editing, no mental "is this team mature enough to trust?" check.
      anxiety: >
        What if the threshold hides a forecast a user actually wanted to see for a sparse team?
        (Mitigated: the message is explicit about the rule and the number returns the moment the
        team crosses 5 active days; the threshold is deliberately low / not-too-restrictive.)
        What if it fights the empty-filtered-sample fallback from filter-forecast-throughput?
        (Mitigated: sufficiency is evaluated on the post-fallback throughput series the forecast
        actually samples, so the two features compose.)
      habit: >
        Forecasters are used to Lighthouse always producing a number; an intentional "no forecast,
        here's why" state is a new posture. Eased because the message is actionable (gather more
        history) rather than an error, and because the reporter already performs this suppression
        manually — the tool is adopting her own rule.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 — a forecast built on one or two data points actively misleads the leadership
        conversation (the same trust surface as the sibling cap), and a direct customer (Liz) is
        already working around its absence. Current satisfaction: 1 — Lighthouse has NO minimum-data
        guard today; it forecasts from any non-empty throughput, however thin. Gap: 3 — a genuine
        missing safety capability; kept thin by a fixed threshold (no per-team config) and by
        reusing the throughput series already computed for the forecast.

  - id: job-forecast-delivery-trend-over-time
    title: Tell an honest over-time trend story for a delivery, not a point-in-time number
    persona: delivery-forecaster
    feature_context: delivery-metrics
    created: 2026-06-02
    note: >
      Epic 3993 "Delivery Metrics". The delivery detail view shows only the CURRENT snapshot today
      (likelihood, progress, remaining/total work, Monte-Carlo completion dates — all point-in-time).
      Verified in code (Delivery.ts, LighthouseAppContext.cs): no historical/time-series persistence
      exists. Backlog and done over time are reconstructable retroactively from WorkItem created/closed
      dates (zero new persistence); forecast and likelihood over time are NOT reconstructable (a
      Monte-Carlo forecast depends on throughput-as-of-that-day) and need a forward-only snapshot table.
    job_story: >
      When I am tracking a delivery toward its target date and preparing to report status to
      leadership,
      I want to see how the delivery's backlog, completion, and forecast have moved OVER TIME — not
      just today's snapshot — including whether our predictability is improving or degrading,
      so I can tell an honest trend story ("we were on track until scope was added in week 3; the
      forecast has held since") rather than defending a single point-in-time number that leaders
      read as a guarantee.
    dimensions:
      functional: >
        See a burnup of backlog vs done across the delivery's whole life (reconstructed from
        existing item dates, full history day one); a forecast band stacked on Done against the
        backlog line for the on-track read; a likelihood/forecast-spread trend for the
        predictability read. Features not yet broken down contribute an estimated size so the
        backlog isn't artificially low. Charts live on the existing Portfolio → Delivery detail
        surface, inheriting its premium gate and portfolio read-access RBAC. Forecast/likelihood
        history is forward-only and says so honestly when empty.
      emotional: >
        Move from defending a bare snapshot number ("it says 80%, trust me") that a leader can
        screenshot and hold me to, toward narrating a trend with evidence ("here's where scope
        jumped, here's the forecast holding steady since") — confidence grounded in the shape of
        the history rather than a single figure.
      social: >
        Be the forecaster/RTE who walks into the leadership review with a delivery's trend story —
        where it's been, where it's headed, whether predictability is firming up — instead of a
        point-in-time percentage that invites "is that a promise?". Frames status as a defensible
        narrative leadership can act on.
    forces:
      push: >
        Today nothing in Lighthouse shows a delivery's metrics over time — the delivery view is
        snapshot-only. To answer "how did we get here? when did scope jump? is the forecast
        holding?" the forecaster exports work-item history to a spreadsheet and rebuilds the
        burnup by hand every status meeting, losing the integrated-tool advantage.
      pull: >
        Open the delivery, read its history and forecast trend off charts that are already there —
        backlog vs done reconstructed instantly, forecast-over-time building forward from the day
        recording starts, predictability firming or slipping at a glance. One surface, the trend
        story told without a spreadsheet.
      anxiety: >
        Will the retroactively-reconstructed history match what actually happened (re-opened items,
        bulk-import date skew)? (Surfaced as Slice 1's explicit learning hypothesis, validated
        against a real delivery before later slices build on it.)
        Will the forecast trend look broken when it's empty just because it's new? (Mitigated: the
        empty state reads "forecast trend builds forward from today — no snapshots recorded yet";
        forward-only is honest, not a defect.)
        Will an early-stage delivery's backlog read artificially small? (Mitigated: features not yet
        broken down contribute an estimated size, annotated as such.)
      habit: >
        Forecasters reach for a spreadsheet to build a burnup; the new charts ask them to adopt an
        in-tool answer to a question they've answered offline. Eased by the burnup being a familiar
        chart shape and by the history appearing on first open (no setup, no recording wait for the
        backlog/done view).
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 — delivery status reporting to leadership is a recurring, high-stakes
        forecaster conversation, and the trend story is materially more honest and defensible than a
        snapshot number (same trust surface as the forecast-honesty jobs). Current satisfaction: 1 —
        the delivery view is snapshot-only today; over-time tracking means a hand-built spreadsheet.
        Gap: 3 — a genuine missing capability; kept tractable because backlog/done reconstruct from
        data already in the DB (zero persistence) and forecast/likelihood trends reuse the existing
        Monte-Carlo engine via a thin forward-only snapshot.

  - id: job-po-scope-cut-from-delivery-trend
    title: Decide which features to cut when a delivery's forecast won't meet the backlog
    persona: product-owner
    feature_context: delivery-metrics
    created: 2026-06-02
    note: >
      Epic 3993 secondary persona/job. The Product Owner is a scope-cut decision-maker on the SAME
      delivery-metrics over-time charts as the forecaster (no bespoke chart). Distinct from the
      forecaster's report-the-trend job: the PO acts ON the trend by cutting scope.
    job_story: >
      When a delivery I own is approaching its target date and the forecast band on the over-time
      chart won't meet the backlog line in time,
      I want to see the trend clearly enough to justify a scope cut — which features to drop so the
      rest can still land on date,
      so I can make the cut decision with evidence the team and leadership accept, rather than a
      gut-feel "let's drop something".
    dimensions:
      functional: >
        Read the forecast-over-time chart's gap between done+forecast and the backlog at the target
        date; use the burnup's scope-jump history to identify what was added; decide which features
        to cut to close the gap. Uses the same charts as the forecaster — no separate PO view.
      emotional: >
        Move from the discomfort of an arbitrary-feeling cut ("we just have to drop something") to a
        defensible one ("the forecast won't meet the backlog by the date; cutting these two closes
        the gap") — confidence the team will accept the call.
      social: >
        Be the PO who cuts scope with evidence rather than authority — the trend chart, not rank,
        justifies the decision in front of the team and leadership.
    forces:
      push: >
        Without an over-time view, a PO judges "will it land?" from a single snapshot likelihood and
        cuts scope on gut feel, which the team resists and leadership questions.
      pull: >
        The forecast-vs-backlog trend makes the gap (and what closes it) visible, turning a
        contentious cut into an evidence-backed one read off the same chart the forecaster uses.
      anxiety: >
        Will the chart over-attribute the gap to scope I can't actually cut? (Mitigated: the burnup's
        scope-jump history shows what was added and when, and the per-feature breakdown remains
        available on the snapshot view.)
      habit: >
        POs negotiate scope verbally; the chart asks them to ground the cut in the trend — eased
        because it reuses the same delivery surface they already open to check likelihood.
    opportunity_score:
      importance: 3
      current_satisfaction: 1
      gap: 2
      rationale: >
        Importance: 3 — scope-cut decisions are real and recurring but lower-frequency and less
        leadership-facing than the forecaster's status reporting; this is a secondary lens on the
        same charts, not the spine of the feature. Current satisfaction: 1 — no over-time view exists
        to ground the cut today. Gap: 2 — valuable but served entirely by the forecaster's charts
        (no bespoke PO build), hence a smaller gap than the lead job.

  - id: job-honest-delivery-trend-when-target-moves
    title: Keep a delivery's recorded trend honest when its target date changes
    persona: delivery-forecaster
    feature_context: delivery-target-date-tracking
    created: 2026-06-04
    note: >
      Epic 3993 follow-up. Refines job-forecast-delivery-trend-over-time, which assumed a fixed
      target. likelihoodPercentage, chance-of-being-late (100−likelihood on the fever chart), and the
      burnup's delivery-date marker are all computed relative to Delivery.Date (verified:
      GetLikelhoodForDate(Date)). The metrics-history DTO exposes a SINGLE current deliveryDate, so
      when the target moves every recorded point is silently re-referenced against the new target — a
      +2-week replan makes the recorded likelihood line step UP, reading as progress when it is
      goalpost-moving. Forward-only: TargetDateAtSnapshot (DateTime?) is captured going forward on the
      daily recorder run; no reconstruction of past targets. Shares the false-certainty trust surface
      with job-forecast-no-false-certainty.
    job_story: >
      When I read a delivery's likelihood/predictability trend and the target date has been moved one
      or more times during the delivery's life,
      I want the chart to show me WHERE the target moved and to contrast the forecast against the
      target as it stood at each point in time — not silently re-score every past day against today's
      target,
      so I don't mistake a replan for real delivery progress, and leadership doesn't either.
    dimensions:
      functional: >
        Each snapshot records the delivery's target as of that day (forward-only). The predictability
        When? view plots the target as a stepped line tracking the as-of-day target; a vertical
        neutral marker ("Target moved: {old} → {new}") annotates each change on the likelihood and
        When? views (and the fever trail); the burnup shows the target's replanning history (prior
        position faded, current emphasized). Pre-migration/null history falls back to the single
        current target with no crash.
      emotional: >
        Move from the quiet dread of presenting a likelihood jump that a leader reads as progress
        (and being unable to say why it really rose), to confidence that the chart itself shows the
        replan — the rise is explained on the screen, not in a caveat speech.
      social: >
        Be the forecaster who narrates "this jump is the replan, the team held steady" with the chart
        as evidence — not someone caught claiming progress that was really a moved deadline.
    forces:
      push: >
        Today the over-time charts re-reference every past point against today's target; a replan
        inflates the recorded likelihood and nothing on the chart signals it happened.
      pull: >
        One forward-recorded column drives a stepped target line, change markers, and the burnup's
        target history — the replan is visible at a glance, no spreadsheet and no verbal caveat.
      anxiety: >
        Will marking replans make the team look like it keeps missing? (Mitigated: neutral date-pair
        copy states the fact and lets the forecaster frame it.) Will null pre-migration history break
        the charts? (Mitigated: explicit flat-line / single-marker fallback.)
      habit: >
        Forecasters verbally caveat a likelihood jump ("that's because we moved the date") every time
        — a ritual the stepped line and the marker should make unnecessary.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 — the same high-stakes leadership trust surface as the forecast-honesty jobs;
        when a delivery is replanned (common), the recorded trend is actively misleading. Current
        satisfaction: 1 — the charts silently re-reference the moved target with no annotation, so in
        the replan case the tool misinforms. Gap: 3 — a genuine honesty defect on a shipped
        capability; kept tractable by one forward-only nullable column reusing the existing recorder
        and metrics-history endpoint (no reconstruction, no new endpoint, no new RBAC).

  - id: job-forecast-skip-known-nonworking-days
    title: Forecast dates that step over known non-working days and never land on one
    persona: delivery-forecaster
    feature_context: blackout-day-forecast-shift
    created: 2026-06-05
    note: >
      Epic 4974 "Blackout Days in Future" (reported by Chris). Sibling #4577 (recurring rules) is OUT.
      BlackoutPeriod config + blackout-aware historical throughput + backtest shipped March 2026 and are
      LOCKED; this job is served ONLY by the remaining forward day<->date working-day translation: the
      Monte Carlo days are unchanged (D4), the day->date projection skips configured BlackoutPeriods and
      rolls a landing date forward (D3), and target->days counts only working days for likelihood/how-many
      (D5). Triggered by configured BlackoutPeriods, no new toggle (D2). No-blackout teams are
      byte-identical to today (D6).
    job_story: >
      When I forecast a feature or team delivery and known non-working days (a weekend, a company
      shutdown) fall between now and the forecast date,
      I want Lighthouse to translate the forecast's working-days into a calendar date that steps over
      those days and never lands on one - leaving the underlying Monte Carlo unchanged -
      so a predictable weekend simply passing does not make my forecast look worse, and the percentile
      dates I present to stakeholders are ones on which work can actually be completed.
    dimensions:
      functional: >
        The forecast days output is identical with or without blackout periods. The day->date
        projection advances calendar days, skips days inside any configured BlackoutPeriod, and rolls a
        date that lands on a blackout day forward to the next working day. "By a date" likelihood and
        how-many use the working-day count between today and the target. Applies to manual When,
        likelihood/how-many by date, feature & delivery dates and likelihood, and forecast write-back.
      emotional: >
        Move from "I shared 70% on Friday, it is 55% Monday and nothing changed - I look unreliable" to
        "the number holds across a known weekend because the model treats it as predictable non-working
        time, and the date never lands on a Saturday".
      social: >
        Present percentile dates that count working days and fall on days work can finish, so leadership
        stops mentally discounting or re-deriving Lighthouse forecast dates.
    forces:
      push: >
        A passing weekend hits the forecast twice (it added zero-throughput days to history AND shrank
        the days-remaining), and an 85th-percentile date can knowingly land on a Saturday where nothing
        ships - eroding stakeholder trust in the forecast.
      pull: >
        The forecast days stay the same; they are merely translated to honest calendar dates that step
        over the blackout periods already configured for the team - no new setup, no spreadsheet
        hand-shifting.
      anxiety: >
        Will this silently change the Monte Carlo numbers? (No - D4, only the date projection changes.)
        Will it double-count with the shipped historical-throughput stripping? (Guarded by an explicit
        compose test - a blackout day is never both stripped from the sample and added to the projection
        in a way that moves the days value.)
      habit: >
        Forecasters mentally subtract "minus the weekend" or hand-shift the date in a spreadsheet before
        presenting; the tool should do it.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 - the same high-stakes leadership-trust surface as the other forecast-honesty jobs
        (confidence-cap, minimum-data-guard); a forecast that visibly worsens over a known weekend, or a
        percentile date on a non-working day, directly undermines the forecaster's credibility. Current
        satisfaction: 1 - the forward day->date path has zero blackout awareness today (verified: no
        blackout references in Models/Forecast, WhenForecastDto, Delivery, Feature). Gap: 3 - a genuine
        missing capability, kept thin because the config, historical-throughput stripping, and backtest
        halves are already shipped and the reusable BlackoutDaysExtensions helpers exist.

  - id: job-config-admin-define-recurring-blackout-rule
    title: Define a recurring non-working-day rule once instead of re-entering one-off periods
    persona: config-admin
    feature_context: recurring-blackout-events
    created: 2026-06-06
    note: >
      NEW in recurring-blackout-events (ADO Epic #4577 "Recurring Blackout Events", Premium,
      reported via Productboard). Sibling of the SHIPPED #4974 (blackout-day-forecast-shift): the
      one-off BlackoutPeriod (Start/End date range) CRUD, premium+SystemAdmin guard, the
      BlackoutPeriodsSettings.tsx settings UI, and the BlackoutDaysExtensions evaluation seam are
      shipped and LOCKED. This job is served by a NEW recurring-rule entity (RecurringBlackoutRule)
      that lives ALONGSIDE the one-off period: select weekdays, an "every X weeks" interval, a
      concrete start date, and an OPTIONAL open-ended end (empty = forever). Covers BOTH epic use
      cases: "exclude weekends forever" AND "team off-site every 4th Friday this year". Recurring
      and one-off coexist as distinct concepts in the settings UI but feed a UNIFIED blackout-day
      evaluation (D4) so a recurring-rule day is indistinguishable downstream from a one-off
      blackout day. Broader RRULE recurrence (monthly / nth-weekday-of-month), per-team scoping,
      and holiday-calendar import are OUT of v1. Rules are GLOBAL like one-off periods (inherits
      #4974 D9). SystemAdmin + Premium gate, same as one-off blackout-period creation.
    job_story: >
      When the same non-working days repeat on a predictable cadence - every weekend, or our team
      off-site every fourth Friday - and today I have to hand-enter each one as a separate one-off
      blackout period (and will keep re-entering them forever),
      I want to define the pattern ONCE as a recurring rule - which weekdays, how often, when it
      starts, and optionally when it ends or leave it open-ended to run forever -
      so that every matching day is automatically treated as a non-working day in forecasts and on
      the charts, without me maintaining an ever-growing list of individual date ranges.
    dimensions:
      functional: >
        A new RecurringBlackoutRule (weekdays set, every-X-weeks interval, start date, optional
        open-ended end) created/edited/deleted through a recurring-rules section in the existing
        System settings page, alongside the one-off blackout periods. The rule expands to concrete
        non-working days that feed the SAME IsBlackoutDay / GetBlackoutDayIndices evaluation the
        one-off periods feed (unified evaluation, D4), so forecasting (day<->date shift, throughput
        stripping) and chart overlays treat a recurring-rule day identically to a one-off blackout
        day. "Exclude weekends forever" = Sat+Sun, every 1 week, start today, no end. "Off-site
        every 4th Friday" = Fri, every 4 weeks, concrete start, concrete end. Creation gated by
        Premium + SystemAdmin (GET open), matching one-off period CRUD.
      emotional: >
        Move from "I dread the blackout-periods screen because I keep hand-adding weekends and it
        never ends" to "I described the weekend pattern once and Lighthouse keeps it correct
        forever". Confidence that the forecast already knows about the recurring off-site without
        anyone remembering to add it.
      social: >
        Be the admin who set the team up so forecasts are honest about recurring non-working time
        without anyone babysitting a list - the recurring rule is self-evidently the source of those
        skipped days.
    forces:
      push: >
        Excluding weekends today means creating a one-off period for every single weekend, forever -
        impractical, so admins simply do not, and forecasts silently count Saturdays and Sundays as
        working days. A regular off-site has the same problem at smaller scale.
      pull: >
        Calendar-style recurrence everyone already understands (weekdays + "every X weeks" + start +
        optional end) entered once, reusing the blackout-periods screen and the proven CRUD/guard
        pattern - and it plugs straight into the already-shipped blackout-aware forecasting.
      anxiety: >
        Will a recurring rule behave differently from a one-off period downstream? (No - unified
        evaluation, D4: a recurring-rule day is the same blackout day to forecasting and charts.)
        Will leaving the end date empty break anything? (No - empty end = runs forever, the explicit
        "exclude weekends" use case.) Will it change the Monte Carlo? (No - it only adds days to the
        existing blackout-day set the shipped #4974 shift already consumes.)
      habit: >
        Admins already manage one-off blackout periods in this exact settings page; recurrence is the
        natural "make this repeat" extension of an interaction they already perform.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 - "exclude weekends" is the single most common non-working-day pattern and is
        effectively unusable today via one-off periods; it directly feeds the high-stakes
        forecast-honesty surface (#4974). Current satisfaction: 1 - no recurrence exists; weekends
        can only be excluded by hand-entering every weekend, which nobody does. Gap: 3 - a genuine
        missing capability, kept tractable because it reuses the shipped one-off CRUD pattern,
        premium+admin guard, settings UI, and the unified BlackoutDaysExtensions evaluation seam; the
        only genuinely new logic is rule -> concrete-days expansion.

  - id: job-config-admin-define-named-cycle-time
    title: Define a named cycle time once so the team can measure a custom start->end window
    persona: config-admin
    feature_context: multiple-cycle-times
    created: 2026-06-08
    note: >
      NEW in multiple-cycle-times (ADO Epic #5251 "Support Multiple Cycle Times", Premium). The
      config action that unlocks the whole feature. A named cycle time = { name, startState, endState }
      with ORDERED-BOUNDARY semantics over WorkTrackingSystemOptionsOwner.AllStates
      (= ToDoStates ++ DoingStates ++ DoneStates, mapping-expanded via GetRawStatesForCategory - the
      same total order the cumulative-time-per-state chart's workflowOrder uses). The regular cycle
      time is the special case (start = first Doing state, end = first Done state), so this
      generalises/reuses the existing StartedDate/ClosedDate derivation rather than building a parallel
      engine - two states suffice, To Do/Doing/Done are NOT re-declared per definition. Saving rides
      the EXISTING team/portfolio settings endpoint (CycleTimeDefinitions is a new List on the settings
      aggregate, twin of WaitStates/DoingStates - no new write contract). Premium + config-admin
      (team-admin / portfolio-admin) gate, same as other state config.
    job_story: >
      When I am configuring a Team or Portfolio and I know that our real lead time starts well before
      Lighthouse's default "started" boundary (work sits in a planning or validation queue for weeks
      before anyone moves a card to Doing) - or ends differently from "closed" -
      I want to define an additional NAMED cycle time once by naming it and picking a start state and
      an end state, in the same mapping-aware, workflow-ordered state picker I already use elsewhere,
      so the team can visualise where time is really spent across that custom window on the scatterplot
      and the cumulative chart - without re-declaring categories or maintaining an offline spreadsheet.
    dimensions:
      functional: >
        A new "Cycle Times" config in the flow-metrics/state-config cluster (Team and Portfolio):
        the implicit "Default" cycle time (started->finished) shown read-only for reference, plus an
        add/edit/delete list of named definitions, each { name, startState, endState }. Both boundary
        pickers are MAPPING-AWARE (offer State-Mapping names AND raw states, expanded via
        GetRawStatesForCategory) and present states in workflow (AllStates) order, consistent with the
        wait-states feature. Save-time validation: endState must come STRICTLY after startState in
        AllStates (reject end-before-start, D4); name non-empty and unique within the owner. Persists
        to a new CycleTimeDefinitions List on WorkTrackingSystemOptionsOwner via the EXISTING settings
        update endpoint - no new endpoint, no new write contract. Premium-gated; UI gating via
        useRbac(); config-admin (team-admin / portfolio-admin) write scope. Re-entries use the FIRST
        boundary crossing (D2), mirroring the regular cycle time.
      emotional: >
        Move from "the only cycle time I can show is started->finished, which hides the weeks of
        validation queue before work even begins" to "I described the Planned->Done window once and the
        team can now see exactly where the time goes". Confidence that the chart the team reads reflects
        their real workflow, not just Lighthouse's default boundaries.
      social: >
        Be the admin who set the team up so its cycle-time charts answer "where does our time really
        go?" - the named window matches what the team actually experiences, not a generic default.
    forces:
      push: >
        Lighthouse computes ONE cycle time (started->finished) today; teams whose real bottleneck is
        upstream of "started" (a planning/validation/intake queue) or whose meaningful window differs
        from started->closed have no way to express it, so the scatterplot can never show where their
        time actually goes. The workaround is exporting state history to a spreadsheet and computing the
        custom window by hand.
      pull: >
        One familiar settings sub-section (the same mapping-aware, workflow-ordered state picker used
        for other state config) defines a reusable named window once; every consuming surface (the
        scatterplot selector, the cumulative-chart scope switch) respects it. Set once, visualise on
        demand.
      anxiety: >
        Will I have to re-declare To Do/Doing/Done for each named cycle time? (No - D1: two states
        suffice; the definition reuses AllStates ordering and the existing started/closed derivation.)
        What if I pick an end state before the start state? (Mitigated by D4: save is rejected inline
        with "End state must come after the start state in the workflow"; nothing is persisted.)
        What if I later remove a state a definition depends on? (Mitigated by D5: the definition becomes
        invalid - warned and disabled in the selectors - never a silent break or crash.)
      habit: >
        Admins already manage Doing-states, State Mappings, Blocked-states, and Wait-states in this
        exact form with this exact mapping-aware picker; adding a named cycle time is the same muscle
        memory. The only new idea is "a cycle time is just two boundary states" - surfaced in the
        sub-section helper text and an inline boundary preview.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 - a single started->finished cycle time cannot answer "where does our time
        really go?" for teams whose constraint is upstream of started (a common, high-stakes
        leadership question); customers asked for custom windows (Epic 5251). Current satisfaction: 1 -
        no named/custom cycle time exists anywhere in the product today (verified: WorkItemBase.CycleTime
        is the only cycle time, gated on StateCategory==Done). Gap: 3 - a foundational missing
        capability, kept tractable by reusing AllStates ordering, the existing started/closed
        derivation, the mapping-aware picker, and the existing settings write contract; the only
        genuinely new config logic is { name, startState, endState } + end-after-start validation.

  - id: job-delivery-lead-see-time-over-custom-window
    title: See where time really goes over a custom start->end window, not just started->finished
    persona: delivery-lead-rte
    feature_context: multiple-cycle-times
    created: 2026-06-08
    note: >
      NEW in multiple-cycle-times (ADO Epic #5251, Premium). The viewing job that pays off the config
      job. With a named cycle time defined, the delivery lead switches the Cycle Time Scatterplot's
      selector from "Default" to the named definition; the dots re-plot (Y = that definition's
      duration) and the 50/70/85/95 percentile lines recompute (D6a). The cumulative-time-per-state
      chart also gains a switch to scope its bars to a named cycle time's window (D6b). Both Team and
      Portfolio (D7). Items that never cross BOTH boundaries are excluded; a sparse/empty series is an
      explicit low-sample state (D9). A NEW read endpoint serves per-definition scatter/percentile data
      (the existing GetCycleTimeDataForTeam / GetCycleTimePercentilesForTeam compute only the default
      window); premium-gated, UI gating via useRbac() (D8). Forecasting is explicitly NOT in scope -
      this is analysis, not forecasting.
    job_story: >
      When I am running a retro or a leadership review and the started->finished cycle time looks fine
      yet features still land late, and I suspect the time disappears in a window the default cycle time
      can't see (e.g. a validation queue before work starts),
      I want to switch the Cycle Time Scatterplot to a named cycle time (e.g. Concept to Cash =
      Planned->Done) and read the re-plotted dots and recomputed percentile lines - and optionally scope
      the cumulative-time-per-state chart to that window,
      so I can name where time is really spent with evidence ("Concept to Cash P85 is 47 days; 35 of
      them are the validation queue before build even starts") rather than guessing from the
      started->finished window alone.
    dimensions:
      functional: >
        On the Cycle Time Scatterplot, a cycle-time selector ("Default" + each named definition);
        selecting a named definition re-plots every closed item's dot with Y = that definition's
        ordered-boundary duration (first start-or-later -> first end-or-later, first crossing per D2)
        and recomputes the 50/70/85/95 percentile lines over that series (D6a). On the
        cumulative-time-per-state chart, a switch to scope the bars to a named cycle time's window
        (D6b). Both surfaces at Team AND Portfolio scope (D7). Items that never cross BOTH boundaries
        are excluded (D9); a sparse/empty series renders an explicit low-sample state, not misleading
        percentiles on one or two dots. A definition invalidated by state removal (D5) appears DISABLED
        with a warning, never a crash. Served by a NEW per-definition read endpoint; premium-gated, UI
        gating via useRbac() (D8). Forecasting is OUT of scope.
      emotional: >
        Move from "started->finished looks fine but we keep landing late and I can't show why" to
        "the Concept-to-Cash scatterplot makes the upstream wait undeniable - the build is fast, the
        queue before it is the problem". Confidence grounded in the shape of the chart, not anecdote.
      social: >
        Walk into the leadership review with two scatterplots side by side - "build is fast (P85 12
        days started->finished); Concept to Cash is 47 days; here's the 35-day validation queue" -
        reframing the improvement conversation toward the real constraint instead of squeezing a build
        step that is already fast.
    forces:
      push: >
        The scatterplot shows only the started->finished window today; for teams whose constraint is
        upstream of "started" (or in any custom window) it literally cannot show where the time goes, so
        leads either intuit it or rebuild the custom-window distribution in a spreadsheet, losing the
        integrated-tool trail back to the source items.
      pull: >
        One selector on the chart they already use re-plots the dots and the percentiles over the named
        window; one switch scopes the cumulative chart to the same window. The custom-window story is
        told on the existing surfaces, no spreadsheet, no new screen to learn.
      anxiety: >
        What if the named series has too few items to be meaningful? (Mitigated by D9: a sparse/empty
        series is an explicit low-sample state; the scatterplot only plots closed items anyway, and
        items that never crossed both boundaries are excluded rather than faked.)
        What if I switch to a definition whose boundary state was removed? (Mitigated by D5: it appears
        disabled with a warning; the chart stays on the last valid selection.)
        Is this forecasting? (No - explicitly analysis only; the Monte Carlo and forecast surfaces are
        untouched.)
      habit: >
        Leads who use the scatterplot are accustomed to one cycle time and the full-width 50/70/85/95
        lines; the new series needs the selector labelled clearly so switching to a named window doesn't
        surprise them. The chart geometry is otherwise identical - same dots, same percentile lines,
        different boundary window.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 - "where does our time really go?" over a custom window is a recurring,
        high-stakes leadership/retro question, and a single started->finished cycle time provably cannot
        answer it for upstream-constrained teams (direct customer ask, Epic 5251). Current satisfaction:
        1 - the scatterplot shows only the default window; any custom window means a hand-built
        spreadsheet. Gap: 3 - a genuine missing capability; kept tractable because it reuses the
        existing scatterplot/percentile machinery and the cumulative chart, adding a per-definition read
        endpoint and a selector/switch rather than a new analysis engine.

  - id: job-flow-coach-gauge-wip-age-spread
    title: Gauge how old my current work-in-progress is, at a glance
    persona: flow-coach
    feature_context: work-item-age-percentiles
    job_story: >
      When I review my team's current in-progress work during a standup or flow review,
      I want a percentile readout of how old my WIP is RIGHT NOW — not how long finished
      work took — and the option to lay that same distribution over the Work Item Aging
      chart in place of the cycle-time lines,
      so I can judge at a glance whether my live work is aging healthily or piling up, and
      name which items have drifted past the bulk of the current WIP.
    dimensions:
      functional: >
        See the 50/70/85/95 percentiles of the CURRENT in-progress population's own ages
        (a snapshot of live WIP, not a history of completions) as a small overview card,
        and toggle the Work Item Aging chart's horizontal reference lines between Cycle
        Time percentiles (historical completions) and Work Item Age percentiles (current
        WIP), one set at a time.
      emotional: >
        Move from "I can see the dots but I can't tell if this is a healthy spread or a
        pile-up" to "85% of my WIP is younger than 18 days and these three are the
        outliers" — confidence that the WIP age is summarised, not eyeballed.
      social: >
        Frame WIP-health conversations with the live distribution ("most of our current
        work is under two weeks old; these two have drifted well past it") rather than gut
        feel, and distinguish that from the historical cycle-time benchmark precisely.
    forces:
      push: >
        Today the overview summarises cycle time (finished work) but there is NO summary of
        how old the current WIP is; the aging chart plots the dots but offers only
        historical cycle-time lines as the benchmark. Coaches must eyeball every dot to
        judge the live spread.
      pull: >
        A small percentile card answers "how old is my WIP?" in one glance, and a single
        toggle lays that distribution onto the aging chart for a direct dots-vs-spread read
        — same screen, no mental math, clearly separated from the cycle-time benchmark.
      anxiety: >
        Will coaches confuse "current WIP age percentiles" with "historical cycle-time
        percentiles"? (Mitigated: the two are mutually exclusive on the chart with explicit
        labels, and the card is titled distinctly.) Is a snapshot of a handful of
        in-progress items statistically meaningful? (Accepted: it behaves like the data it
        has — no special low-sample gate — same stance as the cycle-time card.)
      habit: >
        Coaches currently scan the aging-chart dots one by one, or fall back to the
        cycle-time lines as a proxy for "is this old?", instead of reading the live WIP
        distribution directly.
    opportunity_score:
      importance: 4
      current_satisfaction: 2
      gap: 2
      rationale: >
        Importance: 4 - "is my current WIP aging healthily?" is a core standup/flow-review
        question. Current satisfaction: 2 - the dots are visible and the cycle-time lines
        give an indirect proxy, but there is no direct WIP-age summary. Gap: 2 - a genuine
        but contained gap; reuses the existing percentile machinery and aging chart rather
        than new analysis, so the lift is small.

  - id: job-maintainer-keep-website-current
    title: Keep the marketing website's screenshots current without a cross-repo chore
    persona: lighthouse-maintainer
    feature_context: website-screenshot-freshness
    created: 2026-06-14
    note: >
      NEW in website-screenshot-freshness (ADO #5259). The marketing website (separate repo
      LetPeopleWork/website) bundles its own stale copies of Lighthouse screenshots, so they drift
      out of sync after every UI change and only get noticed at release. The docs-site @screenshot
      pipeline already regenerates canonical PNGs in docs/assets/**; this job makes the website
      consume those (GitHub-hosted, D1) so "keep the website current" becomes a side effect of work
      already done, plus a finalization gate (D7) so drift can't re-accumulate unseen.
    job_story: >
      When I finish a Lighthouse feature that changes a UI surface the website markets,
      I want the website's screenshot of that surface to become current without me manually
      re-exporting and committing an image into a separate repo,
      so keeping the marketing site honest costs me nothing per release and I catch the need
      while the change is still fresh in my head.
    dimensions:
      functional: >
        The website references the canonical docs/assets PNGs the @screenshot suite regenerates
        (via a GitHub-file CDN, D2, pinned to the latest release tag, D3) instead of bundling local
        copies; feature finalization carries an explicit Website-freshness gate (D7) that must be
        answered (including "N/A, because...") before close-out.
      emotional: >
        Move from resignation ("stale again, and fixing it is a tedious cross-repo image dump") to
        confidence ("updating the docs updated the website too, and finalization reminds me to check").
      social: >
        Be the maintainer whose public surfaces are trustworthy — the website shows the product as it
        actually is, with no embarrassing version-old screenshots in front of prospects.
    forces:
      push: >
        The website lives in a separate repo, so its screenshots drift out of sight; manual
        re-export-and-commit is exactly the chore that gets skipped; batching to release time
        produces huge, error-prone catch-up sessions.
      pull: >
        Point the website at the canonical assets already produced for the docs site — one source of
        truth, two consumers — and gate finalization so the check happens at the moment of change.
      anxiety: >
        Will hotlinking GitHub-hosted images render reliably on the live site? (Mitigated: the
        walking skeleton proves it live before any bulk migration; jsDelivr if raw is unreliable.)
        Will the website show in-flight main? (Mitigated by D3: pin to latest release tag.)
      habit: >
        Maintainers are used to treating the website as a separate manual artifact updated at release;
        this asks them to trust the auto-served pipeline and a finalization checklist instead.
    opportunity_score:
      importance: 3
      current_satisfaction: 1
      gap: 2
      rationale: >
        Importance: 3 - public-imagery honesty matters for credibility but is a maintainer-process
        concern, not a core product capability. Current satisfaction: 1 - today the website drifts and
        is fixed manually and late. Gap: 2 - real and recurring, but bounded: it reuses the existing
        screenshot pipeline, so the marginal work is the consuming-side wiring plus a checklist gate.

