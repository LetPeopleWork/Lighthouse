jobs:
  - id: job-rbac-bootstrap
    title: Bootstrap RBAC as the first administrator
    persona: first-time-system-admin
    job_story: >
      When I am the first person to configure Lighthouse with OIDC authentication enabled
      and no System Admin has been assigned yet,
      I want to claim the System Admin role for myself and designate my SSO group,
      so I can take ownership of the authorization system without external help or IT escalation.
    dimensions:
      functional: Claim System Admin role via one-click bootstrap; assign SSO group to System Admin role so future logins are automatic
      emotional: Move from uncertainty ("will this lock anyone out?") to confidence ("I set this up correctly")
      social: Establish my credibility as the responsible owner of the Lighthouse instance in front of colleagues
    forces:
      push: No admin exists; users are blocked from uploading a license or configuring anything; must resolve before rollout
      pull: Single in-app action grants immediate control without IT ticket or config file edit
      anxiety: >
        What if I bootstrap incorrectly and lock myself out?
        What if the emergency admin falls through?
        What if the license cannot be uploaded before a System Admin exists?
      habit: Developers expect to edit a config file or environment variable to set the first admin
    opportunity_score:
      importance: 5
      current_satisfaction: 1
      gap: 4
      rationale: Blocker — without bootstrap nobody can use RBAC at all

  - id: job-rbac-manage-users
    title: Manage who can access teams and portfolios
    persona: system-admin
    job_story: >
      When I need to control which colleagues can view or administer specific teams and portfolios
      in Lighthouse,
      I want to assign individual users or SSO groups to Viewer or Admin roles scoped to those
      teams/portfolios,
      so I can enforce least-privilege access without modifying any external identity provider config.
    dimensions:
      functional: Grant/revoke Viewer and Admin roles per team/portfolio per user or SSO group; see who is unassigned; housekeep departed users
      emotional: Feel in control of who sees what; confident that accidental data leaks are prevented
      social: Demonstrate responsible data stewardship to management; reassure team admins that their scope is protected
    forces:
      push: Colleagues from other teams can see each other's delivery forecasts when RBAC is off; confidentiality concern
      pull: Scoped roles mean team admins self-serve their own membership without escalating to System Admin
      anxiety: >
        Will granting the wrong role silently give someone write access?
        What if I forget to remove a departed employee?
        What if group-based rights behave differently from individual rights?
      habit: Admins manage access via the identity provider (Keycloak/AAD groups) and expect Lighthouse to trust those groups completely
    opportunity_score:
      importance: 5
      current_satisfaction: 2
      gap: 3

  - id: job-rbac-scoped-admin
    title: Administer my own team or portfolio without system-admin help
    persona: team-admin
    job_story: >
      When I am the owner of a specific team (or portfolio) in Lighthouse,
      I want to manage which users are Viewers or Admins for my scope independently,
      so I can onboard or remove colleagues without waiting for the System Admin.
    dimensions:
      functional: Assign/remove Viewer and TeamAdmin roles for my team; configure SSO group mappings for my team
      emotional: Feel autonomous and unblocked; avoid feeling dependent on a central gatekeeper for routine changes
      social: Be seen as a self-sufficient team lead who handles their own access governance
    forces:
      push: Waiting for System Admin to grant access delays onboarding; frustrates new team members
      pull: Access management UI is in the same place as team settings — one coherent workflow
      anxiety: >
        Can I accidentally grant someone access to a portfolio I do not own?
        Will errors in the access groups UI break my team configuration?
      habit: Team leads rely on the identity provider or email the IT team to manage group membership
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3

  - id: job-rbac-viewer-clarity
    title: Understand what I can and cannot do in Lighthouse
    persona: viewer
    job_story: >
      When I log in to Lighthouse with read-only access,
      I want the interface to show me exactly what is visible to me and hide controls I cannot use,
      so I can navigate confidently without seeing confusing errors or disabled buttons.
    dimensions:
      functional: Read-only view of delivery forecasts, team/portfolio data; hidden write controls; visible "no access" state when none assigned
      emotional: Feel informed rather than confused; avoid the embarrassment of clicking something restricted and getting an error
      social: Present polished forecasting data to stakeholders without accidentally exposing admin functions
    forces:
      push: Currently, viewers see error messages, broken "Update all" buttons, and inaccessible settings tabs — eroding trust
      pull: Clean read-only interface that focuses on forecasting data relevant to the viewer
      anxiety: >
        What if I inadvertently trigger a data refresh I do not have rights to?
        What if the system shows me partial data and I draw wrong conclusions?
      habit: Non-admin users are used to seeing everything (RBAC disabled mode) and may be confused when certain elements disappear
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3

  - id: job-oauth-work-tracking-credentials
    title: Govern work-tracking-system credentials from my IdP, not from a pasted PAT
    persona: connector-admin
    feature_context: work-tracking-oauth-authentication
    job_story: >
      When I configure Lighthouse to read from Jira or Azure DevOps in an organisation
      where API tokens are governed centrally,
      I want to authenticate the connection via my organisation's OAuth identity provider
      instead of pasting a long-lived personal access token,
      so I can rotate and revoke that connection's access from the IdP without
      re-deploying Lighthouse or chasing the engineer whose PAT it was.
    dimensions:
      functional: >
        Configure connection-level OAuth credentials (clientId, clientSecret) per Jira/ADO connector;
        complete the consent dance once; have Lighthouse refresh tokens silently;
        revoke access centrally in the IdP when needed.
      emotional: >
        Move from quiet anxiety ("whose PAT is this and when will it expire?") to confidence
        ("the IdP is the source of truth and Lighthouse follows it").
      social: >
        Demonstrate to security/IT colleagues that Lighthouse is a well-behaved
        OAuth client in the corporate identity perimeter — not a special case requiring a service-account PAT exception.
    forces:
      push: >
        PATs are issued from a specific human's account; that person leaves the company and every Lighthouse connection breaks.
        Security policy increasingly forbids long-lived tokens stored outside the IdP.
      pull: >
        Single in-app OAuth dance replaces a recurring "rotate the PAT" chore.
        Token revocation moves to the IdP UI where the rest of the org already manages access.
      anxiety: >
        What if the OAuth app registration is wrong and the callback URL doesn't match what Lighthouse expects?
        What if refresh tokens fail silently and I find out only when a forecast is wrong?
        What if Premium licensing makes this too expensive to justify?
      habit: >
        Connector admins are used to creating a PAT in their personal Atlassian/ADO account
        and pasting it into Lighthouse — the OAuth path is unfamiliar and requires registering
        an app in the developer console first.
    opportunity_score:
      importance: 4
      current_satisfaction: 2
      gap: 2
      rationale: >
        Important for premium/enterprise customers whose security policy disallows long-lived
        PATs; satisfaction-gap is moderate because PATs do work today, just at growing
        operational cost as orgs mature their IAM posture.

  - id: job-dev-test-feedback-velocity
    title: Get fast, trustworthy test feedback without giving up coverage
    persona: lighthouse-developer
    feature_context: test-speed-improvements
    job_story: >
      When I have a backend or frontend code change ready in Lighthouse,
      I want to know within a minute locally and a few minutes on CI whether the change
      broke anything,
      so I can stay in flow and ship incremental commits instead of batching changes
      behind a slow test signal.
    dimensions:
      functional: >
        Run `dotnet test` and `pnpm test` locally on the inner TDD loop without
        real-Jira/real-ADO/real-Linear traffic blocking each cycle; have CI gate PR
        merges within a coffee-break wall-clock while still preserving the
        "every public connector method verified at least once" invariant via some
        mechanism (cadence-split, recorded cassettes, fixture-session sharing,
        parallelism hardening — to be chosen against measured baseline data).
      emotional: >
        Move from quiet dread ("the test wait will kick me out of context") to
        confidence ("the suite is fast AND I have a coverage map proving I didn't
        sacrifice the safety net to get there").
      social: >
        Demonstrate to colleagues and community contributors that Lighthouse's
        contribution loop respects their time — a fast, reliable PR signal is a form
        of hospitality.
    forces:
      push: >
        The test suite is the biggest hitter in CI; locally `dotnet test` is slow
        enough that developers either skip running it or batch multiple commits.
        Recent CI failures (2026-05-17 entries in docs/ci-learnings.md) show test
        isolation and flakiness costs are already material.
      pull: >
        Separating per-PR unit feedback from release-cadence integration verification
        cuts the inner loop dramatically without losing the API-drift safety net.
        Per-test timing artifacts turn "I think test X is slow" into "test X takes
        N seconds, here is the evidence."
      anxiety: >
        What if moving integration tests off the per-PR cadence lets an API drift
        through? What if frontend slow-test fixes silently reduce coverage? What if
        sharding E2E surfaces flakes we never saw single-shard?
      habit: >
        Developers are used to "all tests on every push" as the only quality bar,
        even when the cost has grown to the point where running them locally is
        skipped — the cure (skip the run) is worse than the disease (slow run).
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Test wait time is a per-day cost on every contributor; current satisfaction
        is low because the suite has grown faster than its parallelisation strategy
        and integration tests against three real systems amortise badly across
        per-PR builds. The fix preserves coverage by re-tiering cadence, not by
        deleting tests.

  - id: job-flow-coach-spot-stuck-items
    title: Spot work items that are stuck in their current state
    persona: flow-coach
    feature_context: time-in-state-and-staleness
    job_story: >
      When I am running a team's flow review and an item has been sitting unmoved for
      a suspiciously long time,
      I want to see at a glance how many days each item has been in its current state
      and which items are past the team's staleness threshold,
      so I can start the right "what's blocking this?" conversation before the team's
      cycle-time distribution gets worse.
    dimensions:
      functional: >
        See "<N>d in <stateName>" per work item on the team view; sort by longest;
        identify items past the team's configurable staleness threshold visually (red badge).
      emotional: >
        Move from vague suspicion ("I think this PR has been stuck") to evidence-backed
        conversation ("this has been In Review for 11 days — what's the unblocker?").
      social: >
        Be seen by my team as the person who notices flow problems BEFORE the retro,
        not after.
    forces:
      push: >
        Today, "how long has X been in state Y" requires opening each work item in
        Jira/ADO and reading the history tab. High friction → people don't do it for
        every item → bottlenecks fester until a missed forecast.
      pull: >
        One column on the work-item table that answers the question for every item
        in one glance, plus a colour change that surfaces "this is past our normal".
      anxiety: >
        What if Lighthouse's number disagrees with what's in Jira/ADO? — trust gap
        if our derived number drifts. (Mitigated by D1: pull from source where possible.)
      habit: >
        Coaches currently rely on cycle-time distributions / WorkItemAge for "ageing"
        signal; time-in-current-state is finer-grained and they're not used to seeing it.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Community + Productboard tagged on Epic 4144 — direct customer signal that the
        information is wanted. Current satisfaction is near zero (the data isn't surfaced
        anywhere in Lighthouse today).

  - id: job-forecast-throughput-tune
    title: Tune the throughput that feeds my forecasts so projections match the kind of work that's actually coming
    persona: delivery-forecaster
    feature_context: filter-forecast-throughput
    job_story: >
      When I am forecasting feature delivery dates for my team and the historical throughput
      that Lighthouse samples from contains ad-hoc work (bugs, maintenance, orphan items, things
      tagged "spike", custom-field categories that aren't features) that won't repeat against my
      upcoming feature backlog,
      I want to express what counts as "noise" using a flexible rule set (the same one I already
      know from rule-based deliveries) and have every forecast surface — feature forecasts,
      team forecasts, backtests, and the throughput charts — let me see both the filtered and
      raw views,
      so I can give leadership honest delivery dates AND still tell the team's total-work story
      from the same screens, without maintaining an offline spreadsheet that breaks the
      integrated forecast trail.
    dimensions:
      functional: >
        Per-team configuration: a `forecastFilterRuleSet` using the existing DeliveryRuleSet
        rule engine (reused and generalised to operate on WorkItem fields). Available fields:
        Type, State, Name, Reference ID, Parent Reference ID, Tags, and connector-defined
        additional fields. Operators: equals, notEquals, contains. Match semantics: matching
        items are EXCLUDED from forecast throughput. Surfaces that USE the filter: Feature
        Forecasts (always, no toggle), Team Forecasts (per-run toggle), Backtests (per-run
        toggle), Throughput Run Chart and Throughput PBC (per-view toggle, default Raw).
        Premium-gated.
      emotional: >
        Move from "I have to apologise for the forecast and mentally subtract noise" / "the
        offline spreadsheet is fragile" / "I can't easily switch between the two stories" to
        "the same rule set powers every surface; I flip a toggle to switch the story I'm
        telling; both numbers are defensible."
      social: >
        Demonstrate to leadership that "yes, total throughput was 50 (see the Raw chart),
        but only 20 of those are feature-bearing (see the Filtered chart), so we should
        expect ~20 next quarter, not 50" — without context-switching to a spreadsheet to
        prove the math.
    forces:
      push: >
        Without filtering, feature forecasts pull from a throughput distribution inflated by
        bugs, ad-hoc work, orphan items, and any other category that isn't part of the upcoming
        feature backlog. Stakeholders see "P85 = 12 weeks" and are surprised when feature
        delivery slips because the team also has to handle bug intake. Customers (Liz / JLP)
        have explicitly asked for this — Epic 4896. The same problem exists on backtest
        accuracy ("my backtest says the model is great, but it's modelling a different
        throughput series than my forward forecasts use — apples to oranges").
      pull: >
        A single per-team rule set, expressed in the same editor users already use for
        rule-based deliveries, with arbitrary filter dimensions (type, parent presence, tags,
        custom fields) — set once, every forecast surface for the team respects it. Every
        surface that USES the throughput offers a way to see both stories (filtered vs. raw)
        without re-configuring.
      anxiety: >
        What if I filter so aggressively that the throughput window has too few samples and
        the forecast becomes unreliable? (Mitigated by D5: fall back to unfiltered with a
        warning chip on empty-filtered-sample.)
        What if I forget the filter is on and wonder why the forecast dates don't match the
        throughput chart? (Mitigated by US-03: every filtered surface shows a chip listing the
        active rules.)
        What if I configure rules wrong and the rule set silently includes items I expected
        to exclude (or vice versa)? (Mitigated by reuse of the existing rule editor pattern
        users already trust; tooltip enumerates rules in plain English.)
      habit: >
        Forecasters either accept the biased dates and mentally discount them, or export the
        throughput history to a spreadsheet and run Monte Carlo offline against a manually
        filtered series — defeating the purpose of having an integrated forecasting tool. For
        rule-based deliveries, the same forecasters ALREADY use the Lighthouse rule editor —
        so the editor pattern is familiar; this feature extends that familiarity to throughput.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Direct customer ask (Liz, JLP via Epic 4896). Cannot be done in Lighthouse today.
        Important for premium/enterprise customers whose leadership conversations live or die
        on the credibility of the P85 date. Satisfaction is near zero — workaround is an
        offline spreadsheet that breaks the integrated forecast trail. The reuse-of-rule-engine
        decision (D7) also pays architectural debt forward: future rule-based surfaces
        (cycle-time exclusions, predictability-scope filters) become cheap once the engine is
        generalised.

  - id: job-team-admin-tune-staleness
    title: Tune the "stuck" signal so it matches my team's normal cadence
    persona: team-admin
    feature_context: time-in-state-and-staleness
    job_story: >
      When my team's natural cycle time is faster (or slower) than Lighthouse's default
      assumption,
      I want to set a single number that tells Lighthouse what "too long in a state" means
      for us,
      so the staleness signal is useful for my team's actual pace rather than crying wolf
      or staying silent.
    dimensions:
      functional: >
        One integer setting per Team (and per Portfolio at portfolio scope). 0 disables
        the signal entirely. RBAC-gated to team-admin / portfolio-admin.
      emotional: >
        Confident that the alert is calibrated — the red badge means something I
        should actually act on.
      social: >
        Demonstrate to my team that the tool reflects how we actually work, not a
        generic "industry default" they have to mentally re-interpret.
    forces:
      push: >
        A fixed default threshold (whether 5 or 7 or 14 days) won't fit every team.
        Without tunability the signal is either spammy or useless.
      pull: >
        One field, one save. Re-colour is instant on next render — no sync wait,
        no admin escalation.
      anxiety: >
        What if I set it too low and everything turns red? What if I set it too high
        and nothing turns red and I miss real problems? (Mitigated by the badge always
        showing the raw number too, not just the colour.)
      habit: >
        Team admins are used to a "set it once and forget it" model for settings;
        we expect a useful default so most teams don't have to touch this.
    opportunity_score:
      importance: 3
      current_satisfaction: 0
      gap: 3
      rationale: >
        Required to make the staleness signal useful per-team. Without this, the badge
        colour is meaningless (no team-specific baseline). Satisfaction is zero today
        because the setting doesn't exist.

  - id: job-flow-coach-spot-pace-outliers
    title: Spot in-flight items that are pacing slower than the team historically does in that state
    persona: flow-coach
    feature_context: aging-pace-percentiles
    job_story: >
      When I open my team's Work Item Aging chart during a flow review or a standup
      and I want to know which in-flight items are dragging,
      I want to see at a glance — without doing math in my head — which items are sitting
      in their current state longer than most historically-completed items did while in
      THAT SAME state,
      so I can name the specific bottleneck step ("Review is slow on this item") rather than
      a vague "this one feels old", and start the right conversation with the right person.
    dimensions:
      functional: >
        See per-state percentile reference bands (50/70/85/95 of historical age-at-state-exit
        per workflow state) overlaid on the Work Item Aging chart, alongside the existing
        full-width cycle-time percentile lines. Each in-flight item dot's Y position can be
        compared visually against the band heights for ITS state column. Tooltip surfaces a
        plain-language pace assessment per dot (e.g. "above 85th percentile for Review").
      emotional: >
        Move from "I think this item is slow but I'm not sure compared to what" to "this
        specific step is taking longer than 9 out of 10 items historically did — let's ask
        why" — the chart names the specific dimension of slowness without requiring me to
        remember historical numbers for each state.
      social: >
        Be the flow coach who frames bottleneck conversations precisely ("our Review step
        for this item is at the 95th percentile of how long Review usually takes") rather
        than imprecisely ("this one feels old"). Closes a parity claim against
        ActionableAgile — a competitor tool — at customer / community demos.
    forces:
      push: >
        Today's chart shows full-width 50/70/85/95 lines for end-to-end cycle time only.
        Those lines answer "how does this item compare to overall cycle-time history?" — they
        do NOT answer "how does this item's CURRENT STATE compare to history for THAT
        STATE." Flow coaches who want the per-state framing must mentally translate ("the
        end-to-end line is at 25 days; this item is at 14 in Review; is 14 in Review a lot
        or a little for us?"). Friction → coaches don't use the chart for per-state framing
        → conversations stay imprecise.
      pull: >
        Short dashed segments above each state column at 50/70/85/95 of age-at-state-exit
        let the eye compare an in-flight dot directly to the historical pace for ITS state
        — same chart, no extra view, no mental math. Plus a tooltip line that says the bucket
        in plain language for the user who doesn't want to read chart geometry.
      anxiety: >
        What if the per-state distribution is too sparse to be meaningful in the first weeks
        post-release? (Mitigated by D5: empty/low-sample states are explicit; the existing
        end-to-end CT bands remain to fill the guidance gap.)
        What if the per-state framing causes coaches to micro-optimise one state at the
        expense of overall flow? (Mitigated by KEEPING the existing end-to-end CT bands;
        the new bands ADD context, do not replace it.)
        What if there's not enough visual contrast between the new short segments and the
        existing full-width lines? (Mitigated by D6: dedicated chip group + separate sub-
        header in the legend; users can hide either series.)
      habit: >
        Flow coaches who already use ActionableAgile are accustomed to per-state bands and
        will expect them. Coaches who only know Lighthouse are accustomed to the existing
        full-width bands and need the new series labelled clearly so it doesn't surprise
        them — the second chip group sub-header handles that.
    opportunity_score:
      importance: 4
      current_satisfaction: 2
      gap: 2
      rationale: >
        Importance: 4 — direct competitive-parity claim against ActionableAgile,
        plus a real informational gap (per-state pace framing is materially different from
        end-to-end CT framing). Current satisfaction: 2 (NOT 1) — because Lighthouse DOES
        show end-to-end CT bands today, which partially satisfies the chart-glance pace
        recognition need; the gap is the per-state framing, not the absence of bands
        entirely. Gap: 2 — bigger than zero (real missing capability), smaller than the
        sibling time-in-state job's gap of 3 (which had zero current satisfaction).

  - id: job-delivery-lead-spot-workflow-constraint
    title: Spot which workflow state is the systemic constraint on the team's throughput
    persona: delivery-lead-rte
    feature_context: state-time-cumulative-view
    job_story: >
      When I am preparing a retrospective, an improvement-planning meeting, or a leadership
      review for my team (or release train) and the conversation is about WHERE to invest
      our process-improvement effort next quarter,
      I want to see at a glance which workflow state has consumed the most of our collective
      time over the period — including time that in-flight items are STILL consuming right
      now — and how that compares across teams or windows,
      so I can name the constraint with evidence ("Review took 38% of our time this quarter,
      up from 22% last quarter") rather than guessing from anecdotes or from per-item charts
      that answer a different question.
    dimensions:
      functional: >
        See a horizontal bar chart, one bar per workflow state, height = cumulative time
        all items in the active filter spent in that state during the active window.
        Includes time-in-current-state for in-flight items (user-stated requirement).
        Filter composes with existing Team/Portfolio/work-item-type/date-range primitives
        unchanged. Default placement on team and portfolio detail pages (flow-metrics
        category). Bar ordering follows workflow order (left-to-right matching kanban) so
        the chart maps to the team's mental model of the pipeline.
      emotional: >
        Move from "I think Review is our problem but I'm not sure how big" (vague,
        defensible only by anecdote) to "Review took 38% of our cumulative time this
        quarter — here is the bar, here is the comparison to last quarter, this is where
        improvement effort lands" (defensible, retro-actionable). The chart names the
        constraint without requiring the user to do mental arithmetic across per-item ages.
      social: >
        Be the delivery lead / RTE who walks into the leadership review with one chart that
        answers the meeting's central question ("where are we spending our time?") rather
        than three charts that each answer a partial sub-question. Frames the improvement
        conversation in numbers leadership can act on (budget, hiring, process change)
        rather than gut-feel diagnoses.
    forces:
      push: >
        Today, "where did our time go this quarter?" cannot be answered from any single
        Lighthouse chart. The Simplified CFD shows volume-over-time per StateCategory (only
        Doing/Done) but not per workflow state, and not as a single cumulative number.
        Cycle-time percentiles are end-to-end, not per-state. Work Item Aging is per-item,
        not aggregated. To get the answer, leads either skip the question (intuit the
        constraint) or build a spreadsheet from raw history data — both lose the
        integrated-tool advantage and break the trail back to the source items.
      pull: >
        One bar chart on the team / portfolio detail page that answers the retrospective
        question in one glance, respecting the team's current filter, including in-flight
        time. Set the date range, set the type filter, read the bars. The chart works for
        any time horizon (sprint, quarter, year) because it composes with the existing
        date-range filter unchanged.
      anxiety: >
        What if items that entered a state before the date window inflate the bars and I
        can't tell why? (Addressed by D5 full-duration attribution with D12 frame-based
        inclusion: the window selects WHICH items count; for each included item the FULL
        state-duration is counted — this is intentional, since clipping would conceal the
        real cost of slow states. The per-state drill-down (US-04) and the item picker
        (US-05) let the user see exactly which items drove a bar.)
        What if the bar chart shows "Review is the constraint" but it's because of one
        outlier item, not a systemic issue? (Mitigated by D6: tooltip shows the count of
        items contributing to each bar AND the mean per item, so a single-outlier bar is
        visible from the tooltip rather than hidden in the sum; the US-04 drill-down names
        the specific items.)
        What if comparing teams or quarters needs export to a spreadsheet anyway? (Mitigated
        by the cumulative bar being a defensible single number per state — directly
        screenshottable into a deck or compared by eye across two browser tabs.)
      habit: >
        Delivery leads today use the Simplified CFD or a spreadsheet of cycle-time data to
        infer where time goes; the new chart asks them to ADOPT a new visual answer to a
        question they've previously answered indirectly. The bar chart's familiarity (bars
        per category, height = magnitude — a primary-school chart shape) keeps the learning
        cost minimal.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 — Theory-of-Constraints-style improvement planning is a recurring,
        high-stakes leadership decision (where the quarter's improvement budget goes); the
        bar chart names the constraint defensibly. Current satisfaction: 1 — no chart in
        Lighthouse today answers "cumulative time per state across items in a window";
        users either guess or build a spreadsheet. Gap: 3 — same magnitude as sibling
        time-in-state job (also gap 3, also zero current satisfaction for the specific
        question); both are foundational Epic 4144 gaps surfaced by the same Productboard +
        Community signal on ADO #4144.

  - id: job-po-deep-dive-item-state-time
    title: Deep-dive a single outlier item (or one feature's stories) to see where its time went per state
    persona: product-owner
    feature_context: state-time-cumulative-view
    created: 2026-05-26
    note: >
      Absorbed from former Epic 4144 feature B2 (work-item-state-history-view) on 2026-05-26
      (feature-delta D15). Served by the US-05 in-chart item picker narrowed to a single item
      or one feature's child stories. Distribution lens only — the ordered chronology/timeline
      lens that B2 also envisioned was deliberately NOT built (out of scope, revisit on demand).
    job_story: >
      When a specific work item has clearly taken too long (an outlier surfaced in a retro, a
      stakeholder escalation, or a feature that slipped), or when I want to understand one
      feature's delivery shape,
      I want to scope the cumulative-time-per-state chart down to just that item (or that
      feature's stories) and see how its time was distributed across the workflow states,
      so I can tell the specific story — "this item sat in Review 31 of its 44 days" — in a
      post-mortem or stakeholder conversation, instead of exporting its history to a spreadsheet
      and pivoting it by hand.
    dimensions:
      functional: >
        Use the chart's item picker (search by Reference ID or Name; parent-expand to select
        all of a feature's children) to scope the bars to one item or a small set. The same
        bar geometry (per-state height, completed/ongoing segments, adaptive unit) then shows
        that selection's distribution. A single-item selection renders one item's per-state
        durations; re-entries through a state sum into that state's bar (cumulative, not
        chronological).
      emotional: >
        Move from "I know this item was slow but I can't quickly say WHERE the time went" to
        "Review held it 31 of 44 days — here's the bar". Confidence to name the specific
        bottleneck for a specific item without spreadsheet archaeology.
      social: >
        Be the PO who walks into the post-mortem with the item's actual state-time breakdown
        rather than a recollection, and who can answer "where did this feature's time go?" on
        the spot during a stakeholder review.
    forces:
      push: >
        No Lighthouse view today shows a single item's time-per-state distribution; the per-item
        badge (B1) shows only the CURRENT state's age. Answering "where did this item's whole
        life go?" means reading raw transition history and summing by hand.
      pull: >
        Reuse the cumulative chart the team already knows, scoped to one item or one feature —
        no new screen to learn, no export. The picker turns the systemic chart into a deep-dive
        instrument with one selection.
      anxiety: >
        Will I lose the ORDER the item moved through states? (Yes — by design, D15: this lens
        is distribution, not chronology. If the sequence/re-entry order is the actual need, that
        is the dropped B2 timeline lens, revisited only on explicit demand.)
        Will the unit read uselessly small for one short-lived item? (No — adaptive units, D16,
        switch to hours/minutes for small magnitudes.)
      habit: >
        POs today reconstruct an item's history from the work-tracking tool's own audit log or a
        spreadsheet; the picker asks them to adopt the in-chart selection instead. Low cost — it
        is the same chart, filtered.
    opportunity_score:
      importance: 3
      current_satisfaction: 1
      gap: 2
      rationale: >
        Importance: 3 — outlier post-mortems and feature-shape questions are recurring but
        lower-frequency than the systemic retro question (importance 4). Current satisfaction:
        1 — no per-item distribution view exists today. Gap: 2 — real but secondary to the
        systemic constraint job; this is why B2 was post-MVP originally and is now absorbed as a
        secondary lens of B3 rather than a standalone feature.

  - id: job-commit-intent-no-button
    title: Commit my intent without a ceremonial button
    persona: delivery-forecaster
    feature_context: remove-action-buttons
    created: 2026-05-29
    note: >
      NEW in remove-action-buttons (ADO #5077). Honest framing: these flows already work
      (satisfaction 2, not 1) — this is polish / debt-retirement, not a capability gap. The
      convergence value (retiring the two stopgap "you must refresh" Alerts, one uniform
      interaction law) is the multiplier, not raw importance.
    job_story: >
      When I have just finished expressing a valid change in Lighthouse — edited a team/portfolio
      setting, adjusted a state mapping, tuned a forecast filter —
      I want Lighthouse to act on my intent the moment it is valid (persist it, and refresh
      whatever data depends on it) instead of making me hunt for and click a Save button,
      so I can stay in the flow of the decision I am actually making rather than managing the
      tool's save/refresh ceremony — and trust that what I see on screen reflects what I changed.
    dimensions:
      functional: >
        As soon as inputs are valid, the change is persisted without a button press; if the
        dependent data view needs a refresh (state mappings, forecast filter) that refresh
        happens automatically where cheap or via a one-click in-place "Reload now" action where
        expensive (D-RELOAD) — never an instruction to navigate away and refresh manually. When
        inputs are invalid the change is held back and the specific problem is shown inline; the
        absence of a Save button must not hide the error. Auto-save is suppressed exactly where
        the Save button is disabled today (RBAC parity; no new authz surface).
      emotional: >
        Move from low-grade friction and doubt ("did that actually save?", "do I need to refresh
        now?", "where did my error go without a Save button?") to quiet confidence ("I changed
        it, it took, the screen is current") — the calm save-state indicator carries the
        reassurance the Save click used to.
      social: >
        Present Lighthouse as a tool that "just keeps up" with the user — no awkward "hang on, let
        me click save and refresh" mid-demo. Consistency across every settings surface reads as polish.
    forces:
      push: >
        After editing a long settings form the user must scroll/hunt to a single Save button
        (ValidationActions); easy to forget, easy to navigate away and lose the edit. State
        Mappings and the Forecast Filter make it worse: a two-step "save then manually refresh"
        ceremony, explicit in two stopgap Alerts (StateMappingsEditor "must reload"; the
        forecast-filter-takeeffect-hint added in commit 53e6287e).
      pull: >
        Change it, it sticks, the screen is current — no button, no second step. The proof
        already exists elsewhere (How Many / When auto-forecasts), so the pull is "make the rest
        of the app behave like the part that already feels good."
      anxiety: >
        "Did it actually save?" (removing the click removes the confirmation — need a calm
        save-state signal). "What if it auto-saves something half-typed?" (validators gate the
        auto-save; debounced; only fire on fully-valid form). "Where did the error go without a
        Save button?" (inline error becomes the primary, always-visible feedback channel).
        "Did my auto-save clobber a colleague's concurrent edit?" (low-concurrency; red card for DESIGN).
      habit: >
        Every form on the web trains "make changes, then click Save"; the absent button can read
        as "broken / read-only." Mitigation: the save-state indicator and the disappearance of
        the now-obsolete "you must refresh" Alerts.
    opportunity_score:
      importance: 3
      current_satisfaction: 2
      gap: 1
      rationale: >
        A recurring papercut on flows used by every team/portfolio admin, sharpened by the
        two-step save-then-refresh on state mappings and the forecast filter (the 53e6287e
        stopgap Alert is explicit debt). The flows DO work today (satisfaction 2, not 1). Gap is
        real but small; this is polish, and the convergence value (retiring the stopgap hints,
        one uniform behavior) is the multiplier, not raw importance.

  - id: job-see-forecast-update-live
    title: See my forecast update as I shape its inputs
    persona: delivery-forecaster
    feature_context: remove-action-buttons
    created: 2026-05-29
    note: >
      NEW in remove-action-buttons (ADO #5077). Distinct from job-commit-intent-no-button: this
      is recompute-on-valid (ephemeral, re-runnable, with stale-response and on-mount concerns)
      vs commit-on-valid (persist + refresh). The abstraction is ALREADY SHIPPED (the How Many /
      When forecast auto-run in TeamForecastView); this job applies it to the two forecast
      surfaces that have not yet adopted it (new-item-creation, backtest).
    job_story: >
      When I am sizing up a new-item-creation forecast or a backtest and I am adjusting the
      historical window, the target date, or the work-item-type selection,
      I want the forecast to recompute itself each time my inputs become valid — the same way
      the How Many / When forecast already does —
      so I can explore "what if the window were wider / the target later" as a continuous
      conversation with the numbers, instead of tweaking, clicking Run, reading, tweaking,
      clicking Run again.
    dimensions:
      functional: >
        When the required inputs are valid (new-item: from/to/target + ≥1 work-item type;
        backtest: start/end + valid historical window), the run fires automatically on change,
        debounced, with stale-response guarding (the requestSeqRef + DEBOUNCE_MS pattern already
        in TeamForecastView). Auto-run does NOT fire on first mount (hasInteractedRef gate).
        Invalid/incomplete inputs produce no run and show why.
      emotional: >
        Move from a stop-start tweak-click-read rhythm to a fluid "the numbers track my thinking"
        feel — the same delight the How Many / When forecast already delivers.
      social: >
        In a planning session, exploring scenarios live ("watch what happens to the backtest if
        I widen the window") is more credible than narrating clicks.
    forces:
      push: >
        NewItemForecaster and BacktestForecaster each force a tweak → click Forecast / Run
        Backtest → read → tweak → click again loop; the How Many / When forecast right above them
        on the same page already auto-runs, so the inconsistency is jarring within one screen.
      pull: >
        The numbers track the user's thinking; scenario exploration becomes continuous — the
        exact, already-shipped, already-trusted feel of the manual forecaster.
      anxiety: >
        "Will it fire while I'm still picking dates/types and burn requests or flash
        half-results?" (debounce + requestSeqRef stale-discard + only-run-when-all-valid).
        "Will a forecast run on page load before I've touched anything?" (hasInteractedRef
        on-mount suppression). "Will auto-run make stale vs fresh harder to tell?" (existing
        clear-on-input-change is kept; auto-run replaces the button, not the clearing).
      habit: >
        Same "I expect to click Run" muscle memory as the Save habit; eased because the sibling
        forecaster on the same page already behaves this way — a live, on-screen model.
    opportunity_score:
      importance: 3
      current_satisfaction: 2
      gap: 1
      rationale: >
        The tweak-click-read loop on new-item and backtest is friction, and the inconsistency
        with the auto-running How Many / When forecast ON THE SAME PAGE is a visible polish
        defect. Satisfaction is 2 (the forecasts work, and the proof-pattern exists for the user
        to compare against), so the gap is small. The leverage is consistency: half the page
        already feels right; this makes the rest match.

  - id: job-config-edit-no-silent-lost-update
    title: Save a config edit without silently clobbering a colleague's concurrent change
    persona: config-admin
    feature_context: epic-5121-domain-events-cqrs-concurrency
    created: 2026-05-30
    note: >
      NEW in epic-5121 (ADO #5100). User-visible value story. Closes the one genuine
      correctness gap ADR-027 names: two humans editing the same config aggregate
      (Team/Portfolio/Connection/RBAC/Delivery) today produces a SILENT last-writer-wins lost
      update, because there is no optimistic-concurrency token anywhere and the blanket
      SaveWithRetry reloads-and-retries. Scope is the human-edited config roots ONLY — NOT the
      high-churn single-writer sync entities (WorkItem/Feature/FeatureWork/transition).
    job_story: >
      When I am editing a shared Lighthouse configuration aggregate — a Team's settings, a
      Portfolio, a work-tracking Connection, an RBAC role/group/API-key assignment, or a
      Delivery — and another administrator may have changed that same aggregate since I loaded
      it,
      I want Lighthouse to refuse my save with a clear "someone else changed this, reload and
      re-apply" signal instead of silently overwriting their change (or having mine silently
      overwritten),
      so I can trust that no configuration change is ever quietly lost, and recover from a
      conflict by reloading the current value rather than discovering days later that my edit
      vanished.
    dimensions:
      functional: >
        Human-edited config aggregate roots (Team, Portfolio, WorkTrackingSystemConnection,
        RBAC — UserProfile/RbacGroupMapping/ApiKey, Delivery) carry an optimistic-concurrency
        token. A save made against a stale token is rejected with HTTP 409 instead of being
        applied. Read-your-writes holds for a user's own successful edit. The blanket
        save-and-retry is scoped to BYPASS tokened aggregates so it cannot silently swallow
        the conflict. High-churn sync entities are deliberately NOT tokened.
      emotional: >
        Move from quiet unease ("did my change actually stick, or did someone else's save eat
        it?") to confidence ("if there's a conflict I'll be told plainly and I can reload — no
        change ever vanishes silently").
      social: >
        Demonstrate to fellow administrators that Lighthouse is a trustworthy shared
        control-plane — concurrent edits are coordinated, not a race where the loser never
        finds out they lost.
    forces:
      push: >
        Two admins hitting Save on the same Team/Portfolio/Connection within the same window
        clobber each other with no warning; the first edit is silently gone. The motivating
        bug class (#4778 "Delivery Team Update Issue") lives in exactly this space, and ADR-027
        verified there is zero optimistic-concurrency token in the codebase today.
      pull: >
        A clear, immediate 409 "this changed since you loaded it — reload and re-apply" lets
        the second editor see the fresh value and merge intentionally, instead of a silent
        last-writer-wins overwrite. The protection is surgical: only the ~5 human-edited config
        roots, never the high-churn sync path.
      anxiety: >
        What if the 409 is so noisy that routine single-admin edits start failing? (Mitigated:
        the token only bites on a genuinely concurrent stale write; a lone editor never sees
        it.)
        What if scoping SaveWithRetry away from tokened saves accidentally re-hides the
        conflict it is meant to surface? (This is the careful change ADR-027 flags; the gold
        integration test — two stale writes → second gets 409 — guards it.)
        What if the 409 also starts firing on work-item sync and breaks refresh? (Mitigated:
        sync entities are explicitly out of scope, never tokened.)
      habit: >
        Admins are used to "edit form, click Save, it always succeeds" — a refused save is a
        new interaction they must learn. Eased because the failure is explicit and actionable
        ("reload"), not a cryptic error, and because it only appears in the genuinely-concurrent
        case they would WANT to be warned about.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 — silent lost updates on shared config are a real correctness defect
        (the #4778 bug class) and erode trust in the control plane, even though they are
        infrequent. Current satisfaction: 1 — there is NO concurrency protection at all today
        (verified zero tokens in ADR-027); the blanket last-writer-wins actively hides the
        problem. Gap: 3 — a genuine missing safety capability, surgically scoped to the config
        roots so the cost stays small.

  - id: job-react-proactively-to-workitem-change
    title: React the moment a work item transitions, goes stale, or gets blocked — instead of only at read time
    persona: flow-coach
    feature_context: epic-5121-domain-events-cqrs-concurrency
    created: 2026-05-30
    note: >
      NEW in epic-5121 (ADO #5122). User-visible value story — the value delivered HERE is
      that the three signals (transitioned / became-stale / blocked) become published in-process
      domain events off the sync delta, making proactive reactions an "add-a-handler" capability.
      The downstream reactions themselves — SignalR push, in-app/external notifications
      (#4754/#4755), webhooks — are OUT of scope for this epic. GUARDRAIL (ADR-027 D7): the
      dispatcher is TRANSPORT only, not Event Sourcing; WorkItemStateTransition history stays a
      read-time projection of the external changelog; any persisted event history is a separate
      sink (#5017-style), never the dispatcher.
    job_story: >
      When a work item I care about changes state, crosses my team's staleness threshold, or
      becomes blocked during a Lighthouse sync,
      I want Lighthouse to recognise that change as a first-class event at the moment it
      happens — rather than only surfacing it the next time I happen to open a chart —
      so the tool can proactively react to the things I currently have to go looking for, and I
      stop missing the window where acting early would have mattered.
    dimensions:
      functional: >
        Off the WorkItemService.SyncStateTransitions sync delta, Lighthouse publishes
        in-process domain events when an item transitions state (WorkItemTransitioned), crosses
        the configured staleness threshold (WorkItemBecameStale), or becomes blocked
        (WorkItemBlocked). The events carry enough identity (work item, from/to state,
        threshold, blocked reason) for any future handler to react. THIS epic delivers the
        event emission and the seam; it does NOT build the push/notification reactions.
      emotional: >
        Move from "I only find out an item went stale when I next open the aging chart, which
        might be days later" to "the moment it happens, the system knows — and reacting to it is
        now a small, additive step away."
      social: >
        Be the flow coach whose tooling can be wired to nudge the team proactively ("this item
        just crossed 11 days in Review") rather than relying on everyone remembering to check —
        a capability the team can grow into without re-plumbing.
    forces:
      push: >
        Today the three signals exist ONLY as read-time projections (time-in-state, aging-pace,
        blocked, cumulative-state-time) — nothing fires when the change actually occurs, so
        every proactive reaction is blocked on someone opening a screen. There is no seam to
        hang a SignalR push or a notification off, so #4754/#4755 cannot land cleanly.
      pull: >
        Publishing the transition/stale/blocked moments as in-process events makes every future
        proactive reaction "add a handler" — SignalR, notifications, webhooks become additive
        subscribers rather than edits to the sync engine.
      anxiety: >
        Will this turn the transition history into an event-sourced system of record? (No —
        ADR-027 D7 explicitly rejects ES; the dispatcher is transport-only, recovered via next
        re-sync; persisted history stays a separate projection/sink.)
        Will emitting events slow the sync or lose facts if a handler throws? (Mitigated by the
        #5098 gold test: a throwing handler does not lose the committed fact and recovers on the
        next re-sync.)
        Will events double-fire on every re-sync and spam future handlers? (The events are
        derived from the sync DELTA — a real change — not re-emitted for unchanged items.)
      habit: >
        The team is used to information being pull-only ("open Lighthouse to check"); a tool
        that can push proactively is a new posture. Eased because this epic only lays the rail —
        the push experience itself arrives later (#4754/#4755) once the seam is trusted.
    opportunity_score:
      importance: 4
      current_satisfaction: 1
      gap: 3
      rationale: >
        Importance: 4 — proactive reaction to stuck/blocked/transitioned work is the
        difference between catching a flow problem in the acting-early window versus at the
        retro; it unlocks the long-requested notification/push capabilities (#4754/#4755).
        Current satisfaction: 1 — the signals are read-time only; nothing fires at the moment of
        change, so no proactive reaction is possible at all today. Gap: 3 — the enabling
        capability (event emission) is genuinely missing; this epic closes the emission gap,
        the reactions follow downstream.

  - id: job-forecast-no-false-certainty
    title: Present a forecast that leaders won't read as a guarantee
    persona: delivery-forecaster
    feature_context: forecast-confidence-cap
    created: 2026-05-30
    note: >
      ADO #5126 "Never show 100% Confidence". The sibling concern — don't forecast a team with too
      little throughput data — is a DISTINCT job tracked in ADO #5125 and is OUT of this feature.
    job_story: >
      When I share a Lighthouse forecast likelihood with leadership and the number reads as 100%
      (or a high deterministic-looking figure),
      I want the number itself to express honest uncertainty rather than apparent certainty,
      so deterministic-thinking stakeholders don't lock onto it as a committed date and hold me to a
      certainty that probability never promised.
    dimensions:
      functional: >
        Forecast likelihoods above a high threshold render as ">95%" instead of a precise 96-100%
        figure; a genuinely complete item (no remaining work) still reads as done/100%.
      emotional: >
        Move from the dread of a leader screenshotting "100%" and treating it as a promise, to
        confidence that the headline number itself signals "there is still a chance this moves".
      social: >
        Be seen as a forecaster who communicates probability honestly — not someone who over-promised
        a date and then missed it.
    forces:
      push: >
        Lighthouse currently shows 100% (and 96-99%) on forecasts; deterministic-thinking leaders read
        100% as "that's the date" and are blindsided when it slips.
      pull: >
        A ">95%" band reads as "very likely, not guaranteed" — the honest message in one glance, with
        no verbal caveat speech required when presenting.
      anxiety: >
        Will capping make the tool look less precise or less credible?
        Will it hide a real difference between 96% and 99%?
        (Mitigated: anything at or below 95% still shows its precise value; only the deceptively-certain
        top band collapses, and completed items keep 100%.)
      habit: >
        Forecasters verbally caveat the 100% ("it's not really certain...") every time they present —
        a ritual the number itself should make unnecessary.
    opportunity_score:
      importance: 4
      current_satisfaction: 2
      gap: 2
      rationale: >
        Real credibility/trust pain in the forecaster's leadership conversation, but a
        communication-honesty refinement rather than a blocking capability gap — the forecast already
        works, this makes its headline number honest. Hence gap 2, not 4.

