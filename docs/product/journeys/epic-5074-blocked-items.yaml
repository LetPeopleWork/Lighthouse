schema_version: 1
feature_id: epic-5074-blocked-items
created: 2026-06-11
research_depth: comprehensive
note: >
  Two linked journeys for Epic 5074. The FOUNDATION journey (define-blocked-rules) replaces the
  hardcoded BlockedStates + BlockedTags mechanism with a flexible WorkItemRuleSet — the SAME engine
  (ADR-013) that already powers rule-based deliveries (Include semantics) and filtered throughput
  (Exclude semantics). Blocked-rules is a THIRD consumer with Include semantics (a matched item = a
  blocked item). Everything else in the Epic builds on this rule-based definition: blocked-time
  history capture (per-sync, Lighthouse-side, L1), the blocked-over-time chart, the blocked->stale
  linkage, and the Jira flagged-field cleanup. The READING journey (read-blocked-signals) pays it
  off across per-item duration, the over-time trend chart, and the stale-when-blocked-too-long
  signal. Anchored to verified code reality: WorkItemRuleSet/RuleEvaluator<T>/IRuleFieldProvider<T>
  exist and are reused; the WorkItemBlocked domain event (epic-5121) is the capture seam; the
  existing BlockedOverviewWidget is non-premium, so this Epic is non-premium (twin of
  time-in-state-and-staleness, also non-premium). Migration of existing BlockedStates/BlockedTags
  into equivalent rule conditions is a hard requirement so no admin loses config.

journeys:

  - name: define-blocked-rules
    goal: >
      A Configuration Administrator opens a Team's (or Portfolio's) Flow Metrics Configuration where
      Blocked States and Blocked Tags live today, and instead of two hardcoded lists defines a
      flexible Blocked rule set — the same rule builder they already use for rule-based deliveries
      and the forecast filter — that expresses exactly what "blocked" means for their workflow
      (a state, a tag, a custom field, or any AND/OR combination). Their existing BlockedStates and
      BlockedTags are auto-migrated into equivalent rule conditions so nothing they configured is lost.
    persona: "config-admin (Carlos Mendez, Team Phoenix admin)"
    emotional_arc:
      start: Constrained — "our 'blocked' is a Jira flag custom field, not a state or a tag — the two
        hardcoded lists can't express it, so I've been hacking it with a synthetic 'Flagged' label."
      middle: Familiar — "this is the exact rule builder I use for rule-based deliveries; I add a
        condition on the flag field with the operator I want, and AND/OR them like I already know how."
      end: Expressive — "blocked now means precisely what my workflow means by it — and my old
        blocked-states and blocked-tags came across automatically as rules, so I lost nothing."

    design_decisions_resolved:
      - id: D1
        question: Which rule engine and semantics does blocked use?
        decision: >
          Reuse the existing WorkItemRuleSet / RuleEvaluator<T> / IRuleFieldProvider<T> (ADR-013) with
          Include semantics — a work item that MATCHES the rule set is blocked (mirrors DeliveryRule's
          Include; the inverse of ForecastFilter's Exclude). No new engine, no new operators beyond the
          existing RuleOperators (equals, notequals, contains, notcontains, isempty, isnotempty). Field
          keys are the existing fixed fields plus additionalField.{id}, so a Jira flag custom field is
          expressible as a rule condition (this is how the Epic's flagged-cleanup is solved generically).
      - id: D2
        question: How is existing BlockedStates/BlockedTags config preserved?
        decision: >
          On the move to rule-based blocked, each existing BlockedStates value becomes a
          `State equals <value>` condition and each BlockedTags value becomes a `Tags contains <value>`
          condition, OR-combined (Mode "or"), producing a rule set that matches exactly the same items
          the hardcoded lists matched. Auto-migration runs once; the admin sees their prior config as
          pre-populated rule conditions they can then edit. Learning hypothesis: if ANY real customer's
          existing blocked config cannot be represented as equivalent rule conditions, the rule model is
          not expressive enough and the slice fails.
      - id: D3
        question: Does the blocked definition move to the source-of-truth?
        decision: >
          No (inherits README L1). "Blocked" remains a Lighthouse-side computed concept — the rule set
          is evaluated against the synced work-item fields per sync. The RULE DEFINITION is new config;
          the EVALUATION cadence is unchanged from today's IsBlocked (computed at sync / read time).
      - id: D4
        question: What gates the blocked-rule config write?
        decision: >
          The existing team/portfolio settings authorization — the same gate that protects
          BlockedStates/BlockedTags and delivery-rules config today (config-admin: team-admin /
          portfolio-admin). Flows through IRbacAdministrationService; UI gating derived from useRbac()
          (isTeamAdmin(id) / isPortfolioAdmin(id)). No new authorization surface.

    steps:

      - id: step-open-blocked-config
        action: >
          Carlos opens Team Phoenix settings and expands the Flow Metrics Configuration group, where
          Blocked States and Blocked Tags live today.
        expected_output: >
          The config form renders a "Blocked" rule builder (the same DeliveryRuleBuilder component used
          for rule-based deliveries and the forecast filter) in place of the two ItemListManager lists,
          pre-populated with the auto-migrated conditions from his existing BlockedStates/BlockedTags,
          with helper text: "An item is Blocked when it matches these rules. Build conditions on state,
          tags, or any field — the same way you build rule-based deliveries and forecast filters."
        emotional_state: Oriented — "there's my old blocked config, already expressed as rules"
        shared_artifacts:
          - settings.blockedRuleSet (new WorkItemRuleSet — replaces BlockedStates + BlockedTags)
          - ruleSchema (existing — fields + operators, served via the schema endpoint)
        failure_modes:
          - Migration produced no conditions because the team had empty BlockedStates and BlockedTags —
            the builder renders empty (valid: nothing was blocked before, nothing is now).

      - id: step-add-blocked-condition
        action: >
          Carlos adds a condition `Flagged (additionalField.10001) isnotempty` and sets the rule mode to
          "or" alongside his migrated `State equals Blocked` condition.
        expected_output: >
          Each condition renders as a field + operator + value row (field picker offers the fixed fields
          plus the connector's additional fields; operator picker offers the six RuleOperators). The mode
          toggle (and/or) composes the conditions. The MaxRules (20) and MaxValueLength (500) limits from
          the existing schema apply unchanged.
        emotional_state: In control — "I can finally say 'blocked = the Jira flag OR our Blocked state'"
        shared_artifacts:
          - settings.blockedRuleSet (the conditions being edited)
          - additionalFields (existing — connector-defined custom fields, e.g. the Jira flag field)
        failure_modes:
          - A condition references an additional field id the connector no longer exposes — the rule is
            kept but evaluates to no-match for that condition (same tolerance as delivery rules today).

      - id: step-save-blocked-rules
        action: >
          Carlos saves the team settings.
        expected_output: >
          The blocked rule set persists via the EXISTING team/portfolio settings update endpoint (the
          settings DTO carries blockedRuleSet where it carried blockedStates/blockedTags — a changed
          contract, version-gated for the CLI/MCP clients). On reload the rule conditions are still there
          (read-your-writes), and items matching the rules now compute as IsBlocked.
        emotional_state: Done — "saved; blocked now means exactly what I defined"
        shared_artifacts:
          - settings.blockedRuleSet (persisted on the settings aggregate)
        failure_modes:
          - Concurrent edit by another admin — handled by the existing settings concurrency mechanism
            (job-config-edit-no-silent-lost-update, epic-5121); blockedRuleSet inherits it as a field on
            the tokened config aggregate.

    error_paths_summary:
      - Empty rule set (no conditions): nothing is blocked — the default for a team that never configured
        blocked states/tags. Not an error.
      - A migrated value that is neither a current state nor a current tag (workflow changed since it was
        set): the condition is kept and simply matches nothing — identical tolerance to today's
        IsItemInList, which also silently matches nothing for a stale entry.
      - Rule set exceeds MaxRules (20): rejected by the existing schema validation with the same message
        the delivery-rule and forecast-filter builders already show.
      - Concurrent edit: existing settings concurrency (epic-5121) surfaces a conflict; no new surface.

    integration_validation:
      - The SAME blockedRuleSet drives IsBlocked everywhere (per-item badge, overview Blocked widget,
        history capture in journey 2). A divergent second evaluation path would mean two definitions of
        "blocked" — forbidden. There is ONE evaluation: RuleEvaluator<WorkItem> over blockedRuleSet.

    success_signal:
      - Teams whose "blocked" is a custom field or a compound condition (not just a bare state or tag)
        define a blocked rule set within the first weeks of release — and zero teams report losing their
        prior BlockedStates/BlockedTags config to the migration.

  - name: read-blocked-signals
    goal: >
      A flow coach, delivery lead, or product owner reads three blocked signals that the rule-based
      definition now makes possible: how long each item has been blocked (per-item duration), whether
      the team's blocked count is trending up or down over time (the over-time chart), and which blocked
      items have been blocked long enough to count as Stale — so blocked items stop being forgotten and
      the team can tell whether it is getting better or worse at clearing blockers.
    persona: "flow-coach (Priya Nair) — with delivery-lead-rte (over-time trend) and product-owner (per-item) as secondary readers"
    emotional_arc:
      start: Blind — "I can see WHICH items are blocked right now, but not how long, not the trend, and
        a quietly-blocked item just rots until someone happens to notice."
      middle: Informed — "this item has been blocked 9 days; our blocked count has climbed three weeks
        running; and these two have been blocked long enough that they're now flagged Stale."
      end: Decisive — "I know which blockers to escalate today, and I can tell leadership whether we're
        clearing blockers faster than they arrive."

    design_decisions_resolved:
      - id: D5
        question: Where does blocked-time history come from?
        decision: >
          Lighthouse-side per-sync capture (README L1). A new capture entity (e.g.
          WorkItemBlockedTransition) records when an item ENTERS and LEAVES blocked, populated off the
          sync delta. The existing WorkItemBlocked domain event (epic-5121, edge-triggered on
          !WasBlockedBeforeSync && IsBlocked) is the natural ENTER seam; a matching LEAVE detection
          (IsBlocked false after WasBlocked true) is NEW (there is no WorkItemUnblocked event today).
          Resolution = sync cadence, surfaced as approximate in the duration tooltip (twin of the
          time-in-state "Approximate — based on sync cadence" copy).
      - id: D6
        question: What does "blocked for N days" measure?
        decision: >
          Time since the item's CURRENT blocked spell began (enter-blocked timestamp), to now (or to
          unblock). It is NOT cumulative across past spells in the per-item badge — it answers "how long
          has THIS item been blocked right now?", the same shape as the time-in-state "<N>d in <state>"
          badge. A first-observation blocked item (no prior enter timestamp captured yet) shows "—" until
          the next sync establishes the baseline.
      - id: D7
        question: How is the blocked-over-time chart built?
        decision: >
          Following the delivery-metrics history pattern: a forward-only daily snapshot of the blocked
          COUNT (number of currently-blocked items in scope) per team/portfolio, plotted as a time
          series. Forward-only and says so when empty ("blocked trend builds forward from today — no
          snapshots yet"). Reuses the metrics-history recorder pattern, not a per-item reconstruction.
      - id: D8
        question: How does blocked->stale differ from time-in-state staleness?
        decision: >
          It is a DISTINCT trigger. Today's staleness (time-in-state-and-staleness, sibling of #4144) is
          IsStale = item in StateCategories.Doing AND (now − CurrentStateEnteredAt) > StalenessThresholdDays.
          Blocked->Stale keys on BLOCKED DURATION, not time-in-state: a blocked item becomes Stale after a
          configured blocked-duration threshold (a separate setting). The two staleness sources are OR'd
          for the stale signal but reported with distinct reasons so the coach knows WHY ("stale: blocked
          12 days" vs "stale: 11 days in Review").
      - id: D9
        question: Is any of this premium?
        decision: >
          No. The existing BlockedOverviewWidget and blocked-states config are non-premium (verified: no
          premium gate), as is the sibling time-in-state-and-staleness. The whole Epic stays non-premium.
          Website impact is therefore N/A for premium marketing (see feature-delta cross-cutting section).

    steps:

      - id: step-see-per-item-blocked-duration
        action: >
          Priya opens /teams/{teamId} and reads the blocked items, each now showing how long it has been
          blocked.
        expected_output: >
          Each blocked item shows "blocked <N>d" (e.g. "blocked 9d") alongside the existing blocked
          emphasis, with the rule-based reason available (which condition matched). A just-discovered
          blocked item shows "—" with an "establishing baseline" tooltip until the next sync.
        emotional_state: Alerted — "this one's been blocked 9 days — that's the escalation for standup"
        shared_artifacts:
          - blockedSince (new — enter-blocked timestamp from WorkItemBlockedTransition)
          - settings.blockedRuleSet (defines which items are blocked at all)
        failure_modes:
          - No capture history yet (first sync after release): all blocked items show "—" until the next
            sync — the same first-observation behaviour as the time-in-state badge.

      - id: step-read-blocked-over-time-trend
        action: >
          A delivery lead opens the Blocked Items over-time chart and reads whether the blocked count is
          trending up or down.
        expected_output: >
          A time series of the in-scope blocked count over the selected window, composing with the
          existing team/portfolio/date-range filter. The lead can say "blocked count climbed from 3 to 9
          over three weeks — we're accumulating blockers faster than we clear them." Empty/new state reads
          "builds forward from today", never a misleading flat zero.
        emotional_state: Diagnostic — "the trend is up and to the right — clearing blockers is our problem"
        shared_artifacts:
          - blockedCountSnapshot (new — forward-only daily blocked-count series, delivery-metrics pattern)
          - currentFilter (existing — team/portfolio scope, type, date range)
        failure_modes:
          - No snapshots recorded yet — honest forward-only empty state, not a zero line read as "never
            blocked".

      - id: step-spot-stale-because-blocked
        action: >
          Priya identifies blocked items that have been blocked long enough to be flagged Stale.
        expected_output: >
          Items blocked longer than the configured blocked-duration staleness threshold render with the
          stale treatment AND a distinct reason ("stale: blocked 12 days"), separate from the
          time-in-state stale reason. The blocked-staleness threshold is a config-admin setting (twin of
          StalenessThresholdDays), 0 = disabled.
        emotional_state: Equipped — "these two have been blocked so long they're now stale — top of my list"
        shared_artifacts:
          - settings.blockedStalenessThresholdDays (new — distinct from StalenessThresholdDays)
          - blockedSince (new — drives the blocked-duration that crosses the threshold)
        failure_modes:
          - Threshold set to 0: blocked->stale is disabled; only time-in-state staleness applies. Not an
            error — it is the opt-out.

      # --- Enhancement batch (2026-07-07): three widget/chart enrichments on the shipped foundation ---

      - id: step-read-blocked-trend-vs-last-period
        action: >
          A delivery lead opens the dashboard and reads whether the current blocked count is up or down
          versus the end of the previous period, straight off the Blocked overview widget. (Job:
          job-delivery-lead-tell-blocked-trend-vs-last-period.)
        expected_output: >
          The Blocked overview widget shows the current count PLUS a trend indicator: a direction
          (up/down/flat) and the numeric delta against the blocked count on the LAST DAY of the previous
          period, where "period" is the dashboard's currently-selected date range. Computed client-side
          from the blockedCountHistory (BlockedCountSnapshot) already loaded on the view. When no snapshot
          exists at the previous-period boundary, the indicator shows "—" (no baseline), never a fake
          delta of zero.
        emotional_state: Oriented — "16 blocked, and that's 4 more than end of last period — worse, flag it"
        shared_artifacts:
          - blockedCountHistory (existing — BlockedCountSnapshot series; the trend reads the prior-period boundary value)
          - currentFilter (existing — the selected date range defines "the period")
        failure_modes:
          - No snapshot at or before the previous-period boundary (forward-only history just began):
            indicator renders "—" with a "no prior-period baseline yet" tooltip. Not an error.

      - id: step-read-blocked-health-rag
        action: >
          Priya glances at the Blocked overview widget to see whether any blocker is urgent, without
          opening each blocked item. (Job: job-flow-coach-read-blocked-health-at-a-glance.)
        expected_output: >
          The Blocked overview widget carries a red/amber/green status driven by the MAX blocked age
          across the currently-blocked items, calibrated on the existing blockedStalenessThresholdDays:
          RED = an item has been blocked past the threshold, AMBER = an item is aging toward it, GREEN =
          nothing is aging. Uses the blockedSince already present on the blocked items in the metrics
          view. With the threshold at 0, RAG is disabled (neutral).
        emotional_state: Alerted — "the widget's red — the oldest blocker crossed our line, dig in now"
        shared_artifacts:
          - blockedSince (existing from slice-02 — drives max blocked age)
          - settings.blockedStalenessThresholdDays (existing from slice-04 — the RAG calibration line)
        failure_modes:
          - blockedStalenessThresholdDays = 0: RAG disabled, widget renders neutral (no colour). The
            opt-out, matching blocked->stale.
          - A blocked item still establishing its baseline (blockedSince "—"): excluded from the max-age
            computation until a baseline exists, same tolerance as the per-item badge.

      - id: step-drill-into-blocked-trend-point
        action: >
          Priya sees the blocked count spiked on a past day in the Blocked-Items-over-time chart and
          clicks that bar to see which items were blocked then. (Job:
          job-flow-coach-drill-into-blocked-trend-point.)
        expected_output: >
          Clicking a bar opens the existing WorkItemsDialog listing the items that were blocked at that
          date. Membership at a past date is RECONSTRUCTED from WorkItemBlockedTransition enter/leave
          intervals (ADR-068) via a new read endpoint — no new persisted membership — valid back to when
          transition capture started; the latest bar reconstructs from live IsBlocked. For a date before
          capture began, the dialog states the record is complete only from the capture-start date.
        emotional_state: Investigative — "these four were the blockers that week — two are still open"
        shared_artifacts:
          - blockedMembershipAtDate (new — reconstructed item set at date T from WorkItemBlockedTransition intervals; read-only, not persisted)
          - blockedSince (existing — the same WorkItemBlockedTransition capture that reconstruction reads)
        failure_modes:
          - Clicked date precedes transition-capture start: dialog shows the reconstructable set and a
            note that membership is complete only from the capture-start date.
          - No items were blocked at the clicked date: dialog opens empty with a "no items blocked on
            this date" message, not an error.

    error_paths_summary:
      - First-observation blocked items (no prior enter timestamp): per-item badge shows "—" and the
        item does not yet count toward blocked-staleness until a baseline exists.
      - Sync-cadence resolution: the per-item duration tooltip states "Approximate — based on sync
        cadence", matching the time-in-state badge, so users never read it as second-precise.
      - An item unblocked and re-blocked between two syncs (spell shorter than the cadence): captured as a
        single spell at sync resolution — a known limitation of L1, surfaced in the tooltip.
      - Blocked-over-time chart with no snapshots: forward-only empty state, never a misleading zero.
      - Both staleness sources fire on one item: the item is stale once, with both reasons listed, so the
        coach sees it is stale because of blocked duration AND time-in-state, not double-counted.

    integration_validation:
      - blockedSince and the blocked-count snapshot and the blocked-staleness threshold ALL derive from
        the SAME IsBlocked (the journey-1 blockedRuleSet). If the rule set changes, every blocked signal
        re-derives from the one definition — there is no second source of "blocked".

    success_signal:
      - Quietly-blocked items stop rotting unnoticed: the per-item duration surfaces them in the next flow
        review, and the over-time trend tells the team whether their clear-rate is improving.

  # --- Portfolio parity (2026-07-19, ADO Story #5524, feature portfolio-blocked-history) ---
  # Every blocked signal above was delivered for TEAMS. Portfolios received the config surface and the
  # count trend but never the underlying capture, so five of the nine blocked surfaces answer from
  # today's state at portfolio scope. This journey closes that column. It is deliberately thin: the
  # personas, jobs and emotional arc are those of read-blocked-signals — only the scope differs.

  - name: read-portfolio-blocked-signals
    goal: >
      A flow coach and a delivery lead read the SAME blocked signals on a Portfolio that they already
      read on a Team — how long each feature has been blocked, whether any blocker is urgent, what was
      blocked on a past date, and which features were blocked then — and get answers that are true of
      the date they selected rather than of today.
    persona: "flow-coach (Priya Nair) — with delivery-lead-rte as the historic-range reader"
    emotional_arc:
      start: Distrustful — "the portfolio blocked number moves when I change the date range, but I know
        it is just re-evaluating today's rules; I quote it with a mental asterisk."
      middle: Reassured — "the same range gives the same kind of answer on the portfolio as on the team,
        and a feature blocked last month shows up in last month."
      end: Comparable — "I can put this period's portfolio blocked level next to last period's and say
        which way we are going."

    design_decisions_resolved:
      - id: D10
        question: Where do Feature blocked spells live, given WorkItemBlockedTransition is keyed by a bare int?
        decision: >
          NOT in the existing WorkItemBlockedTransition keyspace as currently shaped. Feature and WorkItem
          are separate tables with independent identity sequences, WorkItemBlockedTransition.WorkItemId
          carries no owner discriminator, and the repository's at-date query applies no owner scoping — so
          a Feature id and a WorkItem id that collide produce a phantom blocked spell on the TEAM historic
          read delivered by #5508. This is not hypothetical: DemoBlockedHistoryBackfillHandler already
          writes Feature.Id rows into that table on every demo portfolio refresh. FeatureStateTransition
          (separate entity, keyed FeatureId) is the established precedent for exactly this problem.
          Whether the fix is a separate FeatureBlockedTransition entity or an OwnerType discriminator on
          the existing table is a DESIGN call; both satisfy the decision that features get their own
          keyspace.
      - id: D11
        question: Does the portfolio need new read/render surfaces?
        decision: >
          No. PortfolioMetricsView renders the same BaseMetricsView as TeamMetricsView, and
          BlockedOverviewWidget, blockedMaxAgeRag, deriveStaleness, TimeInStateBadge and WorkItemsDialog
          are all scope-agnostic shared components. They render neutral or absent for portfolios purely
          because FeatureDto passes null for blockedSince. Populating that one backend field lights up the
          duration badge, the max-blocked-age RAG chip and blocked->stale simultaneously. A portfolio-
          specific widget or branch would mean two definitions of one signal and is forbidden.
      - id: D12
        question: OPEN — is a feature "blocked" per-portfolio or across any portfolio?
        decision: >
          UNRESOLVED at DISCUSS; escalated to DESIGN with an ADR required. The codebase already
          contradicts itself: FeatureDto.FeatureIsBlocked uses Any-portfolio semantics
          (feature.Portfolios.Any(...)), while BlockedCountSnapshotRecordingHandler evaluates
          IsBlocked(feature, portfolio) per-portfolio. A feature in Portfolio A (rule matches) and
          Portfolio B (rule does not) is therefore blocked on B's feature list but absent from B's blocked
          count. The divergence pre-dates this feature, but capture cannot be built without resolving it,
          because a spell must be keyed either per-feature or per-(feature, portfolio).

    steps:

      - id: step-see-feature-blocked-duration
        action: >
          Priya opens /portfolios/{portfolioId} and reads the blocked features, each now showing how long
          it has been blocked. (Job: job-flow-coach-see-how-long-blocked, at portfolio scope.)
        expected_output: >
          Each blocked feature shows "blocked <N>d" from its captured spell, the Blocked overview widget's
          RAG chip colours off the oldest blocker, and features past blockedStalenessThresholdDays carry
          the "stale: blocked N days" reason — all three rendered by the existing shared components with
          no portfolio-specific branch. A feature blocked on first observation shows "—" until the next
          refresh.
        emotional_state: Alerted — "this feature has been blocked three weeks — that is the escalation"
        shared_artifacts:
          - featureBlockedSince (new — enter-blocked timestamp for Features, own keyspace per D10)
          - settings.blockedStalenessThresholdDays (existing — already present on Portfolio, previously inert)
        failure_modes:
          - No capture history yet (first refresh after release): all blocked features show "—", the same
            first-observation behaviour as the team badge.
          - blockedStalenessThresholdDays = 0: RAG neutral and blocked->stale disabled — the opt-out.

      - id: step-read-honest-historic-portfolio-blocked-count
        action: >
          A delivery lead selects a past date range on a Portfolio and reads the Blocked Overview count.
          (Job: job-delivery-lead-trust-portfolio-blocked-history.)
        expected_output: >
          The count reports what was blocked during that window, read from captured spells under the same
          isHistoricRange guard TeamMetricsController uses. A feature blocked during the range but clear
          today reads blocked; a feature blocked only today reads NOT blocked on ranges that closed before
          its spell began. Features with no capture history at all fall back to the live rule; a feature
          WITH history and no spell covering the date reads not-blocked, because absence of a spell is
          evidence rather than a gap.
        emotional_state: Comparable — "last period was 4, this period is 9 — we are accumulating blockers"
        shared_artifacts:
          - featureBlockedSince (new — the spells the historic read consults)
          - currentFilter (existing — the selected date range)
        failure_modes:
          - Range precedes capture start: falls back to the live rule with the same forward-only honesty
            caveat teams already carry. Not fabricated retroactively.

      - id: step-drill-into-portfolio-blocked-trend-point
        action: >
          Priya clicks a past bar on the portfolio Blocked-Items-over-time chart to see which features
          were blocked that day. (Job: job-flow-coach-drill-into-blocked-trend-point, at portfolio scope.)
        expected_output: >
          The existing WorkItemsDialog lists the features whose blocked spell covers that date,
          reconstructed from spell intervals — read-only, never persisted, mirroring ADR-099. The latest
          bar reconstructs from live IsBlocked. A pre-capture date shows the reconstructable set plus the
          completeness note. The ADR-099 reconciliation guard (already present and already owner-
          parameterised at PortfolioMetricsController, merely never called) logs when reconstruction
          disagrees with the captured BlockedCountSnapshot.
        emotional_state: Investigative — "these three features were the blockers that week"
        shared_artifacts:
          - blockedMembershipAtDate (existing — extended to Features)
          - blockedCountSnapshot (existing — the reconciliation cross-check)
        failure_modes:
          - Reconstruction diverges from the snapshot: the guard logs it rather than silently reconciling.
            Divergence is the only cross-check the design has on capture correctness — surfacing it is the
            point, not a defect in the guard.

    error_paths_summary:
      - Id collision between a Feature and a WorkItem (D10): before the fix, a demo instance can report a
        team work item as blocked on a past range it was never blocked in. This corrupts Story #5508's
        shipped behaviour and is fixed first.
      - Pre-capture portfolio ranges: forward-only fallback to the live rule, never retroactive fabrication.
      - Demo instances between the collision fix and the demo re-backfill: the portfolio trend renders but
        bars drill into an empty dialog. Honest and time-boxed — an empty dialog beats a phantom item.

    integration_validation:
      - The SAME blockedRuleSet drives blocked at both scopes. Portfolio capture must consume
        IBlockedItemService, never re-derive the rule match — a second evaluation path would mean two
        definitions of blocked, which the blockedRuleSet integration_risk forbids.
      - Team and Portfolio must agree: the same blocked-spell shape asserted through both controllers over
        the same past range must produce the same answer. Divergence is a failing test, not a nuance.

    success_signal:
      - A delivery lead quotes a portfolio blocked figure for a past period without qualifying it, and the
        parity matrix shows Team and Portfolio answering all nine blocked surfaces identically.

shared_artifacts_registry:
  blockedRuleSet:
    source_of_truth: "WorkTrackingSystemOptionsOwner.BlockedRuleSet (WorkItemRuleSet — replaces BlockedStates + BlockedTags) on Team/Portfolio settings"
    consumers:
      - "Blocked rule builder in Flow Metrics Configuration (reuses DeliveryRuleBuilder)"
      - "IsBlocked computation (RuleEvaluator<WorkItem> over blockedRuleSet, Include semantics)"
      - "Per-item blocked duration, overview Blocked widget, blocked-over-time snapshot, blocked-staleness — all gate on IsBlocked"
    owner: epic-5074-blocked-items
    integration_risk: "HIGH — single source; the ONE rule set defines 'blocked' for every downstream signal. A second evaluation path (or a leftover BlockedStates/BlockedTags read) would mean two contradictory definitions of blocked. The migration must DELETE the hardcoded read paths, not run alongside them."
    validation: "An item matched by blockedRuleSet is IsBlocked on the per-item badge, in the overview widget, in the over-time count, and (past threshold) in blocked-staleness — verify all five resolve via the single RuleEvaluator over blockedRuleSet, and that no code path still reads BlockedStates/BlockedTags after migration."
  blockedSince:
    source_of_truth: "WorkItemBlockedTransition.EnteredAt (new capture entity, populated per-sync off the WorkItemBlocked event + new leave-detection; README L1 — never from source-of-truth)"
    consumers:
      - "Per-item 'blocked <N>d' badge (current spell, D6)"
      - "Blocked-duration staleness trigger (D8, crosses blockedStalenessThresholdDays)"
    owner: epic-5074-blocked-items
    integration_risk: "MEDIUM — resolution is sync cadence (L1), so the duration is approximate; the badge tooltip MUST say so (twin of time-in-state). Re-block within one cadence collapses to one spell — a documented L1 limitation."
    validation: "An item that enters blocked shows a growing 'blocked Nd' from the captured EnteredAt; on unblock the spell closes; tooltip reads 'Approximate — based on sync cadence'."
  blockedCountSnapshot:
    source_of_truth: "Forward-only daily snapshot of the in-scope blocked count per Team/Portfolio (delivery-metrics history pattern; recorded going forward, never reconstructed)"
    consumers:
      - "Blocked Items over-time chart"
      - "Blocked overview widget previous-period trend indicator (reads the prior-period-boundary value; enhancement batch)"
    owner: epic-5074-blocked-items
    integration_risk: "MEDIUM — forward-only means the chart is empty until snapshots accrue; the empty state must read 'builds forward from today', never a flat zero that reads as 'never blocked'. The trend indicator MUST render '—' when no snapshot exists at the previous-period boundary, never a fabricated zero-delta."
    validation: "With snapshots present the chart plots the daily blocked count over the window; with none it shows the forward-only empty state. The trend indicator shows a direction+delta only when a prior-period-boundary snapshot exists, else '—'."
  blockedMembershipAtDate:
    source_of_truth: "RECONSTRUCTED (read-only, not persisted) from WorkItemBlockedTransition enter/leave intervals — the set of items whose blocked spell covers date T — via a new read endpoint. NEVER a new persisted membership column on BlockedCountSnapshot."
    consumers:
      - "Blocked-Items-over-time chart bar click -> WorkItemsDialog (enhancement batch B1)"
    owner: epic-5074-blocked-items
    integration_risk: "MEDIUM — reconstruction is only valid back to when WorkItemBlockedTransition capture started (slice-02); for earlier dates the dialog must state the record is complete only from the capture-start date. The count returned for date T SHOULD reconcile with the BlockedCountSnapshot.blockedCount for that date where both exist (differences reveal capture gaps — surface, do not silently diverge)."
    validation: "Clicking a bar at date T opens WorkItemsDialog with the items whose blocked interval covers T; the latest bar reconstructs from live IsBlocked; a pre-capture date shows the partial set plus the completeness note."

  featureBlockedSince:
    source_of_truth: "Enter-blocked timestamp for FEATURES, captured on the portfolio refresh path off a feature blocked/unblocked event pair. Lives in its OWN keyspace (D10) — NOT the WorkItemBlockedTransition table as currently keyed, whose bare-int WorkItemId collides with Feature ids. Precedent: FeatureStateTransition."
    consumers:
      - "Portfolio per-feature 'blocked <N>d' badge (shared TimeInStateBadge — no portfolio branch)"
      - "Portfolio Blocked overview max-blocked-age RAG chip (shared blockedMaxAgeRag)"
      - "Portfolio blocked->stale trigger (shared deriveStaleness, against the already-existing Portfolio.BlockedStalenessThresholdDays)"
      - "Historic as-of Blocked Overview count on PortfolioMetricsController.GetInProgressFeatures"
      - "Portfolio blocked drill-through membership reconstruction"
    owner: portfolio-blocked-history
    integration_risk: "HIGH — the keyspace decision is the whole risk. Sharing WorkItemBlockedTransition as currently shaped is DISPROVEN, not merely inadvisable: DemoBlockedHistoryBackfillHandler already writes Feature.Id rows there, and the unscoped at-date query hands them to team work items with matching ids, corrupting the historic team read shipped by #5508. Secondary risk: D12 is unresolved — a feature in several portfolios with different rule sets has no agreed blocked semantics, and the codebase currently answers it two different ways in two places."
    validation: "A feature that starts matching its portfolio blocked rule set opens exactly one spell; ceasing to match closes it; re-blocking opens a NEW spell. No row in the team keyspace lacks a corresponding WorkItem. Team and Portfolio return the same answer for the same spell shape over the same past range."

changelog:
  - date: "2026-06-11"
    feature: epic-5074-blocked-items
    change: >
      Initial comprehensive journey map — define-blocked-rules (foundation: WorkItemRuleSet replaces
      hardcoded BlockedStates/BlockedTags via ADR-013 reuse + auto-migration) and read-blocked-signals
      (per-item duration, blocked-over-time chart, blocked->stale linkage). Anchored to the existing
      rule engine, the epic-5121 WorkItemBlocked seam, and the non-premium BlockedOverviewWidget.
  - date: "2026-07-07"
    feature: epic-5074-blocked-items
    change: >
      Enhancement batch on the shipped foundation (slices 01-04). Extended read-blocked-signals with
      three widget/chart enrichments: previous-period trend indicator on the Blocked overview widget
      (client-side delta off existing blockedCountHistory), max-blocked-age RAG status on the same
      widget (reuses blockedSince + blockedStalenessThresholdDays), and drill-through from a
      blocked-over-time bar to a WorkItemsDialog of items blocked at that date (membership reconstructed
      from WorkItemBlockedTransition intervals, new read endpoint, no persisted membership). Added
      shared artifacts blockedMembershipAtDate; extended blockedCountSnapshot consumers. Slices 06-08.
  - date: "2026-07-19"
    feature: portfolio-blocked-history
    change: >
      Portfolio parity (ADO Story #5524), found during the adversarial review at finalization of Story
      #5508 — a gap #5508 exposed, not a regression from it. Added the read-portfolio-blocked-signals
      journey: feature blocked-duration badge + RAG + blocked->stale, honest historic as-of Blocked
      count, and past-date drill-through, all at portfolio scope. Added D10 (Features get their own
      blocked keyspace — sharing WorkItemBlockedTransition is disproven, not merely inadvisable, because
      the demo backfill already writes Feature.Id rows there and the unscoped at-date query corrupts the
      team historic read), D11 (zero frontend work — the whole MetricsView tree is shared and inert only
      because FeatureDto passes null for blockedSince), and D12 (OPEN, escalated to DESIGN: FeatureDto
      uses Any-portfolio blocked semantics while BlockedCountSnapshotRecordingHandler uses per-portfolio,
      and capture cannot be keyed until that is resolved). Added the featureBlockedSince shared artifact;
      extended blockedMembershipAtDate to Features. Corrections to the original report recorded in the
      feature-delta: the portfolio blocked-count TREND already worked, so the gap is capture and the two
      read paths, not the chart. Slices 01-05.
