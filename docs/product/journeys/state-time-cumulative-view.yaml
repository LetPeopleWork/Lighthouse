schema_version: 1
feature_id: state-time-cumulative-view
updated: 2026-05-26
reconciliation_note: >
  Reconciled 2026-05-26 with feature-delta.md (the authoritative artifact). This file had
  lagged behind the 2026-05-24 D5 flip (it still described clip-to-window) and predated the
  2026-05-26 revision (US-03 withdrawn, US-05 item picker added, feature B2 absorbed, adaptive
  units). D4/D5/D9 below are corrected and decisions D11–D18 + a picker step are added.

journeys:

  - name: spot-workflow-constraint-from-cumulative-bars
    goal: >
      Delivery Lead / RTE opens the team or portfolio detail page during a retro,
      improvement-planning meeting, or leadership review and within a glance identifies which
      workflow state has consumed the most of the team's collective time during the active
      filter window — including time that in-flight items are still consuming — and uses
      that signal to name the constraint, frame the improvement conversation, and decide
      where to invest the next quarter's process-improvement effort.
    persona: "delivery-lead-rte (also: flow-coach secondary for retro facilitation; product-owner secondary for the US-05 single-item / per-feature deep-dive absorbed from B2)"

    emotional_arc:
      start: Searching — "where is our team / portfolio actually spending its time this
        quarter? I have a guess but I need evidence before I bring it to leadership."
      middle: Focused — "the bar chart shows Review at 38% of cumulative time, much higher
        than the next state — and the in-flight items contribute almost half of that bar.
        This isn't a tail of stuck completed items; this is what we're doing RIGHT NOW."
      end: Decisive — "Review is the constraint this quarter. The chart is screenshottable
        for the leadership deck. The improvement effort goes to Review process — not to
        whichever team complained loudest in the retro."

    design_decisions_resolved:
      - id: D1
        question: Does Lighthouse already have a cumulative time-per-state visualization?
        decision: >
          NO — verified by inspecting Lighthouse.Frontend/src/components/Common/Charts/* and
          Lighthouse.Frontend/src/pages/Common/MetricsView/widgetInfoMetadata.ts. The
          existing "stacked" widget is the Simplified CFD (Doing/Done areas over TIME, not
          per-state cumulative). WorkDistributionChart aggregates by parent feature, not by
          state. WorkItemAgingChart is per-item, not aggregated. No premise correction
          needed — the gap claim in the carry-over README is accurate.
      - id: D2
        question: Default chart placement?
        decision: >
          Team detail page AND portfolio detail page, both under the existing "flow-metrics"
          category (alongside cycleScatter, aging, throughput, wipOverTime,
          totalWorkItemAgeOverTime, arrivals, stacked, loadBalanceMatrix). Widget key:
          `stateTimeCumulative`. Size: `large`. Shipping team-only would create a parity
          hole between scopes (same rationale as sibling F's D8); shipping a new top-level
          route would fragment the user's mental model (improvement decisions are made at
          team or portfolio scope, both already have a detail page).
      - id: D3
        question: Bar ordering?
        decision: >
          Workflow order, left-to-right matching the team's kanban board (i.e.
          alphabetical-by-StateCategory then by configured order within the category — same
          ordering the WorkItemAgingChart uses for its X-axis state columns). The bar chart
          shares the pipeline metaphor with the aging chart; using the same ordering means
          a user can read both charts with the same eye motion. Alternatives considered:
          (a) descending by cumulative time — rejected, breaks the pipeline-shape mental
          model; (b) by StateCategory only (To Do / Doing / Done) — rejected, hides
          per-state detail which is the whole point of the chart.
      - id: D4
        question: Unit displayed (total person-days, mean per item, or both)?
        decision: >
          Total time as the bar height — the cumulative-time-tax framing the persona uses.
          Tooltip discloses BOTH total and mean-per-item plus the item count. The DISPLAYED
          UNIT is adaptive (D16, revised 2026-05-26): computed at full calendar precision,
          shown in one unit per render chosen from the largest bar (minutes → hours → days →
          weeks) and applied uniformly to every bar so heights stay comparable. A 100-items-
          over-a-quarter view reads in days/weeks; a single-item short-window view reads in
          hours, not "0.3d". A total/mean toggle is NOT shipped in MVP; fold into a follow-up
          on telemetry signal.
      - id: D5
        question: Date-range semantics for items entering a state BEFORE the filter window?
        decision: >
          FULL-DURATION attribution with FRAME-BASED item selection (flipped 2026-05-24 per
          user redirect; superseded the original clip-to-window default). The filter window
          selects WHICH ITEMS are included (per the D12 inclusion rule); for every included
          item the bar counts the FULL time it spent in that state, regardless of whether that
          time falls inside or outside the window. An item that entered "Review" 30 days before
          the window and left 10 days in contributes its FULL 40 days to the Review bar — not
          10. An in-flight item contributes its full `now - currentStateEnteredAt`. Rationale:
          clipping under-counts the real cycle time of items relevant to the period and conceals
          the true cost of slow states; for a leadership/retro audience the real-cycle-pattern
          framing is more actionable. The bars becoming larger when items straddle window
          boundaries is the intended signal. User verbatim (2026-05-24): "we pick the items that
          were relevant within the frame, but then look at the full time … if it was in progress
          40 days before that, we should count the full time." Alternative (clip-to-window) was
          the initial default, rejected on the redirect.
      - id: D6
        question: Ongoing-items visual treatment?
        decision: >
          Each state bar is stacked into TWO segments: a base segment for time
          contributed by items that COMPLETED at least one transition out of the state
          during the window ("completed contribution"), and a top segment for time
          contributed by items still IN the state at window end ("ongoing contribution",
          rendered with diagonal hatching to disambiguate from the solid base segment).
          User stated this requirement verbatim 2026-05-24: "cumulative times for all
          items in the filter, including ongoing items". The hatch pattern is the
          familiar Lighthouse convention for "this is in progress, not done" — same as
          the existing blocked-item visual semantics carry hatching today. Tooltip
          breaks out the count and total of each segment so leaders can read "Review
          time is half completed, half in-flight" at a glance.
      - id: D7
        question: Filter composition?
        decision: >
          Composes UNCHANGED with the existing Team/Portfolio scope, work-item-type
          filter chips, and date-range selector. No new filter primitives. The bar
          chart recomputes when any of those change. This matches sibling F's D7
          (same chart-filter composition principle).
      - id: D8
        question: WS strategy?
        decision: >
          Type A (additive). No contract change to existing endpoints. One new endpoint
          per scope (team + portfolio); one new chart widget; one new entry in
          widgetInfoMetadata + categoryMetadata. If the endpoint is absent, the chart
          slot is empty — no regression to existing widgets.
      - id: D9
        question: Sibling-data dependency on WorkItemStateTransition?
        decision: >
          The 4 fields shipped by sibling time-in-state-and-staleness slice 01
          (workItemId, fromState, toState, transitionedAt) PLUS the derived
          currentStateEnteredAt field on WorkItem are sufficient. NO schema additions
          requested. The cumulative-time-per-state computation (full-duration, per the
          flipped D5) is: for each item satisfying the D12 inclusion rule, for each state s,
            completedTimeInS = sum over completed (enter, exit) pairs through s of [exit - enter]  (FULL, unclipped);
            ongoingTimeInS   = (now - currentStateEnteredAt) if the item is currently in s else 0;
            completedSegment[s] += completedTimeInS;
            ongoingSegment[s]   += ongoingTimeInS;
            barHeight[s]         = completedSegment[s] + ongoingSegment[s].
          The window only gates which items are included (D12); it does not clip the durations
          summed. This is computable from the four transition fields + currentStateEnteredAt
          alone. **No upstream coordination with sibling 1 DESIGN required.**
      - id: D10
        question: Cross-feature alignment with sibling F (aging-pace-percentiles)?
        decision: >
          Both features compute per-state aggregations from WorkItemStateTransition. A
          shared per-state aggregation service / materialised cache is a candidate
          optimization but NOT required for MVP correctness. DISCUSS calls it out as a
          DESIGN-time cross-feature coordination point (see "Cross-MVP DESIGN
          coordination" section); MVP DISCUSS proceeds assuming independent
          computation per feature.
      - id: D11
        question: Must in-flight items contribute?
        decision: >
          Yes (user-stated requirement). Each in-flight item contributes its FULL
          `now - currentStateEnteredAt` time to the ongoing segment of its current state,
          provided it meets the D12 inclusion rule. Visual treatment per D6 (hatched segment).
      - id: D12
        question: Which items are included for a given window?
        decision: >
          A work item is included if (a) any of its (state-enter, state-exit) intervals
          intersects the window, OR (b) it is in-flight with currentStateEnteredAt <= windowEnd.
          Once included, its FULL state-durations contribute (D5). Items entirely outside the
          window are excluded.
      - id: D13
        question: Keep the standalone tooltip "included items" line (former US-03)?
        decision: >
          No — US-03 withdrawn (2026-05-26). The per-state drill-down (US-04, click a bar to
          list contributing items) is the stronger affordance. Completed/ongoing COUNTS remain
          in the US-01 tooltip; the inclusion+attribution EXPLANATION moves to the widget-info
          (learn-more) metadata. User verbatim: "US-03 seems like it's not needed - we can click
          to drill down."
      - id: D14
        question: In-chart item filter to scope the bars to specific items?
        decision: >
          US-05 (new 2026-05-26): a multi-select item picker on the chart, searchable by
          Reference ID or Name only, with parent-expand ("select all children of a feature/epic").
          Default cleared = systemic all-items view; with a selection the bars recompute over just
          that subset. The transpose of US-04. User verbatim: "a filter on the chart itself to
          select specific item(s) … General: see all cumulated. Filtered: see it for a single or
          a set of items."
      - id: D15
        question: Relationship to former feature B2 (work-item-state-history-view)?
        decision: >
          B2 absorbed (2026-05-26). A single-item picker selection gives that item's per-state
          time DISTRIBUTION — B2's substantive value. B2's CHRONOLOGY lens (ordered transition
          timeline, re-entry sequence with dates) is dropped for MVP, revisited only on demand.
          Adds product-owner as a secondary persona and job-po-deep-dive-item-state-time.
          User verbatim: "Absorb distribution, drop chronology."
      - id: D16
        question: How are time units displayed across scales?
        decision: >
          Adaptive uniform unit per render (minutes → hours → days → weeks), chosen from the
          largest bar and applied to all bars; computed at full calendar precision. Wall-clock
          time, not business-hours. User verbatim: "display something based on the scale …
          account for differences in scale."
      - id: D17
        question: How does the picker interact with the date window?
        decision: >
          The date window (+ ambient filters) gates the picker's candidate set: only D12-included
          items are selectable. An item not touched in the window is not findable in the picker.
          Selecting a subset narrows the bars; full-duration (D5) still applies. User verbatim:
          "The date window will select which items are even available … If the item wasn't touched
          in the original time window, you won't find it via the filter on the chart."
      - id: D18
        question: Does the picker selection change the widget RAG status?
        decision: >
          No. RAG is computed over the whole in-scope set and is NOT recomputed when the picker
          narrows the displayed bars — same as hiding a work-item-type in the cycle-time chart
          leaving its RAG unchanged. User verbatim: "RAG should only apply to whole set … same
          behaviour if I would hide a specific work item type in the cycle time chart - it doesnt
          change the rag."

    steps:

      - id: step-open-detail-page-for-retro
        action: >
          Delivery Lead / RTE navigates to /teams/{teamId} or /portfolios/{portfolioId}
          before a retrospective or improvement-planning meeting and switches to the
          Flow Metrics category
        expected_output: >
          Detail page renders; Flow Metrics category shows the existing widgets
          (cycleScatter, aging, throughput, wipOverTime, totalWorkItemAgeOverTime,
          arrivals, stacked, loadBalanceMatrix) PLUS the new "Cumulative Time per
          State" widget (`stateTimeCumulative`). The widget shows a horizontal bar
          chart, one bar per workflow state in workflow order, with each bar visibly
          split into a solid base segment (completed contribution) and a diagonally-
          hatched top segment (ongoing contribution).
        emotional_state: Curious — "let's see where our time went this quarter"
        shared_artifacts:
          - cumulativeStateTimeData (new, from GET
            /api/teams/{teamId}/metrics/cumulativeStateTime?startDate&endDate)
          - currentFilter (existing — team/portfolio scope, type chips, date range)

      - id: step-scan-bars-find-constraint
        action: >
          Delivery Lead visually identifies the tallest bar and the relative heights
          of other bars
        expected_output: >
          Tallest bar is visibly taller than the rest; the user identifies it as
          "the constraint" (e.g. "Review", at 38% of cumulative time). The ratio
          between the tallest and second-tallest bars is read at a glance from the
          chart geometry.
        emotional_state: Focused — "Review is far ahead of everything else. That's
          our constraint."
        shared_artifacts:
          - rendered bar geometry (per-state, with base + ongoing segments)

      - id: step-tooltip-confirm-not-outlier
        action: >
          Delivery Lead hovers the tallest bar to confirm it represents many items,
          not one outlier dragging the sum
        expected_output: >
          Tooltip shows (unit adaptive per D16 — days here for a quarter-scale chart):
            State: Review
            Total: 184 days
            Items contributing: 47 (38 completed, 9 ongoing)
            Mean per item: 3.9 days
            Median per item: 2.5 days
            Completed segment: 122 days from items that have exited Review
            Ongoing segment: 62 days from items still in Review now
          Full state-durations are counted per D5 (the window selected which items count, not
          how much of each duration). The completed/ongoing COUNTS remain here (former US-03
          was withdrawn, D13); the inclusion-rule explanation lives in the widget learn-more.
        emotional_state: Validated — "47 items, not 1. This is systemic, not an
          outlier. Improvement effort here pays off."
        shared_artifacts:
          - bar tooltip component

      - id: step-toggle-filter-compare-quarters
        action: >
          Delivery Lead changes the date range from "last 30 days" to "last quarter"
          to compare; or toggles a work-item-type filter chip (e.g. excludes "Bug")
          to confirm the constraint holds for feature work
        expected_output: >
          Chart recomputes immediately (within the same fetch cycle the existing
          Flow Metrics widgets use). Bar heights re-render; the ranking may change.
          The user can flip across windows by changing dates; the chart respects
          every existing filter primitive without any new controls.
        emotional_state: In control — "I can compare quarters or filter types
          without leaving the chart"
        shared_artifacts:
          - existing filter primitive (date range, type chips)
          - cumulativeStateTimeData (refetched per filter)

      - id: step-scope-to-items-deep-dive
        action: >
          (US-05, optional deep-dive) The user opens the item picker, searches by Reference ID
          or Name — or matches a parent feature and chooses "select all its children" — and
          selects one item or a small set to see where THOSE items' time went. A Product Owner
          doing an outlier post-mortem selects the single slipped item.
        expected_output: >
          The same bars recompute over only the selected items (full-duration per D5, completed/
          ongoing segments per D6); the display unit re-adapts to the smaller magnitude (e.g.
          hours for a single short-lived item, per D16). Only D12-included items for the current
          window are selectable (D17). The widget RAG status does NOT change — it still reflects
          the whole in-scope set (D18). Clearing the picker returns to the systemic view.
        emotional_state: Investigative — "across this feature's 8 stories, Review ate 60%" /
          "this one item sat in Review 31 of its 44 days — that's the story to tell"
        shared_artifacts:
          - selected item-id set (picker → chart, passed as itemIds)
          - candidate item list (new, from GET .../cumulativeStateTime/candidates)

      - id: step-name-the-conversation
        action: >
          Delivery Lead screenshots the chart for the leadership deck and frames the
          retro / improvement-planning conversation using the bar chart as evidence
        expected_output: >
          Delivery lead can say "Review consumed 38% of our cumulative time last
          quarter (here is the chart); 47 items contributed, half of that time is
          still in flight; let's invest in Review process automation next quarter"
          — vs. the previous best, which was "I think Review is slow, here are some
          aging-chart screenshots that hint at it."
        emotional_state: Decisive — "the chart names the constraint; the
          improvement decision follows from evidence, not anecdote"
        shared_artifacts: []

    error_paths_summary:
      - Empty filter (no items match): chart renders an "empty state" message
        ("No items match the current filter for the selected window — adjust
        filters to see time distribution"). Same convention as existing
        WorkDistributionChart and aging chart when no items match.
      - All items skipped a state (no transitions through state X): state X gets
        zero-height bar; bar still rendered as a labeled placeholder so the user
        sees which states are part of the workflow definition. Avoids the
        "missing state" confusion ("did the chart drop a state?" vs "no time
        spent there").
      - State removed from the workflow during the window: state appears as a
        bar with the time accumulated WHILE it was active; tooltip notes
        "state removed from workflow on YYYY-MM-DD". Surfaces workflow changes
        as part of the evidence rather than silently hiding them.
      - Single item (whether the ambient filter narrows to one, or the US-05
        picker selects one): chart renders that one item's per-state durations as
        the bars; mean and total are equal; the display unit adapts to the small
        magnitude (D16). This is now a FIRST-CLASS deep-dive path (the absorbed-B2
        distribution lens, D15), reached deliberately via the picker — not only an
        edge case. The RAG status still reflects the whole in-scope set, not the
        single item (D18), so it is not misread as "this item is red".
      - Zero transitions data accumulated (sibling slice 01 just shipped, or a
        team has only been using Lighthouse for a few days): the endpoint
        returns an empty array; the widget renders the same "empty state"
        message as the empty-filter case plus a tooltip linking to "data
        accumulates forward only — wait for transitions to populate."
      - In-flight item with `currentStateEnteredAt = null` (first-observation,
        per sibling D-handling): item contributes 0 to the ongoing segment for
        any state until next sync establishes a baseline. Same forward-only
        constraint sibling already documented.

    success_signal:
      - Delivery Lead / RTE leaves the retro or planning meeting with a
        specific constraint named ("Review") and a specific evidence-backed
        next-quarter improvement target — rather than a list of complaints to
        triage.
      - The chart shows up in customer-shared retro decks within 6 weeks of
        sibling slice 01 shipping (OUT-cumulative-state-time-leadership-share).
      - The "where do we spend our time?" question stops being answered by
        spreadsheets or guesses; ≥30% of team/portfolio detail page sessions
        include a view of the Cumulative Time per State widget within 6 weeks
        of release (OUT-cumulative-state-time-adoption).
      - The item picker (US-05) is actually used for deep-dives: ≥15% of
        chart-viewing sessions exercise it within 8 weeks — validating the
        B2-absorption bet that the per-item/subset distribution lens was the
        real need, not the dropped chronology lens
        (OUT-cumulative-state-time-item-filter-usage).
