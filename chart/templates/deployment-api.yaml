{{- include "lighthouse.assertFrontendMode" . -}}
{{- include "lighthouse.assertScaling" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lighthouse.fullname" . }}-api
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lighthouse.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if eq (include "lighthouse.reloadEnabled" .) "true" }}
      annotations:
        # epic-5306 slice-05 (carry-over finding #3): make config + managed-secret changes reach the
        # running API without a manual `rollout restart`. checksum/config re-stamps the pod when the
        # chart-rendered ConfigMap changes (a render-time hash). The reloader watch handles Secrets that
        # rotate OUTSIDE Helm — ESO/OpenBao materialises them after render, so the checksum never sees
        # them; stakater/reloader observes the named Secret(s) at runtime and rolls the Deployment.
        # Only emitted when a managed (existingSecret) credential is in use → standalone stays unchanged.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        secret.reloader.stakater.com/reload: {{ include "lighthouse.reloadSecrets" . | quote }}
      {{- end }}
      labels:
        {{- include "lighthouse.api.selectorLabels" . | nindent 8 }}
    spec:
      # epic-5305 #5309 graceful shutdown: drain bounded by Shutdown:TimeoutSeconds.
      terminationGracePeriodSeconds: {{ .Values.shutdownTimeoutSeconds }}
      # Wait for the database to accept connections before starting the API, so a not-yet-ready
      # Postgres (bundled StatefulSet still booting, or a managed DB warming up) does not crash-loop
      # the API on first boot. Standalone is unaffected (it does not use this chart).
      initContainers:
        - name: wait-for-db
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "lighthouse.db.host" . }} {{ include "lighthouse.db.port" . }}; do
                echo "waiting for database {{ include "lighthouse.db.host" . }}:{{ include "lighthouse.db.port" . }}"
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ include "lighthouse.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              # Unprivileged — see Kestrel__Endpoints__Http__Url in the ConfigMap (non-root bind).
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "lighthouse.fullname" . }}-config
          env:
            - name: Database__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ include "lighthouse.db.secretName" . }}
                  key: Database__ConnectionString
            {{- with .Values.redis.connectionString }}
            # epic-5305 #5304 SignalR Redis backplane + single-instance background work (replicaCount>1).
            - name: ConnectionStrings__Redis
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.oidc.enabled }}
            - name: Authentication__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: {{ include "lighthouse.oidc.secretName" . }}
                  key: Authentication__ClientSecret
            {{- end }}
          # epic-5305 #5310 health probes: rollout gates on real readiness.
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
