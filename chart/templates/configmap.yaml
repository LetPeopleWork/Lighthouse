{{- include "lighthouse.assertFrontendMode" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lighthouse.fullname" . }}-config
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
data:
  # Lighthouse reads config via env; "__" maps to ":" (e.g. Database__Provider -> Database:Provider).
  # The chart is Postgres-only (ADR-080) — provider is never sqlite.
  Database__Provider: "postgres"
  Telemetry__Enabled: {{ .Values.telemetry.enabled | quote }}
  Shutdown__TimeoutSeconds: {{ .Values.shutdownTimeoutSeconds | quote }}
  # The image binds privileged ports (Dockerfile ENV Kestrel__Endpoints__*: 80/443), which a
  # non-root container cannot bind on a standard cluster (ip_unprivileged_port_start=1024) — it
  # crashes with SocketException(13) Permission denied. Override to unprivileged ports; TLS is
  # terminated at the Ingress, so in-pod HTTP on 8080 is all the Service/probes need.
  Kestrel__Endpoints__Http__Url: "http://+:8080"
  Kestrel__Endpoints__Https__Url: "https://+:8443"
  {{- if .Values.oidc.enabled }}
  Authentication__Enabled: "true"
  Authentication__Authority: {{ required "oidc.issuer is required when oidc.enabled" .Values.oidc.issuer | quote }}
  Authentication__ClientId: {{ required "oidc.clientId is required when oidc.enabled" .Values.oidc.clientId | quote }}
  Authentication__CallbackPath: {{ .Values.oidc.callbackPath | quote }}
  Authentication__RequireHttpsMetadata: {{ .Values.oidc.requireHttpsMetadata | quote }}
  {{- with .Values.oidc.audience }}
  # Validate the JWT `aud` claim on bearer tokens (MCP/CLI). Same value as the MCP resource indicator.
  Authentication__Audience: {{ . | quote }}
  {{- end }}
  Authorization__Enabled: "true"
  # Browser-facing origins permitted under auth — the backend fails closed on an empty list (no
  # wildcard CORS). Default to the single ingress origin (scheme+host); override via oidc.allowedOrigins.
  {{- $origins := .Values.oidc.allowedOrigins | default (list) }}
  {{- if not $origins }}
  {{- $origins = list (include "lighthouse.accessURL" .) }}
  {{- end }}
  {{- range $i, $o := $origins }}
  Authentication__AllowedOrigins__{{ $i }}: {{ $o | quote }}
  {{- end }}
  {{- range $i, $p := .Values.app.proxy.trustedProxies }}
  Authentication__TrustedProxies__{{ $i }}: {{ $p | quote }}
  {{- end }}
  {{- range $i, $n := .Values.app.proxy.trustedNetworks }}
  Authentication__TrustedNetworks__{{ $i }}: {{ $n | quote }}
  {{- end }}
  {{- end }}
