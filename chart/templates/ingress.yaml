{{- if .Values.ingress.enabled }}
{{- if and .Values.ingress.tls (not .Values.ingress.host) }}
{{- fail "ingress.tls is enabled but ingress.host is empty — set ingress.host" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lighthouse.fullname" . }}
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- with .Values.ingress.tlsSecretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if .Values.mcp.enabled }}
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "lighthouse.mcp.host" . }}
                port:
                  name: http
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lighthouse.fullname" . }}-api
                port:
                  name: http
{{- end }}
