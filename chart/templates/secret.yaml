apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lighthouse.secretName" . }}
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Full Npgsql connection string (contains the password → Secret, not ConfigMap).
  Database__ConnectionString: {{ include "lighthouse.connectionString" . | quote }}
  {{- if .Values.postgresql.enabled }}
  # Consumed by the bundled Postgres container (POSTGRES_PASSWORD).
  postgres-password: {{ required "postgresql.auth.password is required (ADR-082)" .Values.postgresql.auth.password | quote }}
  {{- end }}
