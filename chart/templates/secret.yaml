{{- $renderDbKeys := eq (include "lighthouse.renderDbKeys" .) "true" -}}
{{- $renderOidcKey := and .Values.oidc.enabled (eq (include "lighthouse.renderOidcKey" .) "true") -}}
{{- if or $renderDbKeys $renderOidcKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lighthouse.secretName" . }}
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $renderDbKeys }}
  # Full Npgsql connection string (contains the password → Secret, not ConfigMap).
  Database__ConnectionString: {{ include "lighthouse.connectionString" . | quote }}
  {{- if .Values.postgresql.enabled }}
  # Consumed by the bundled Postgres container (POSTGRES_PASSWORD).
  postgres-password: {{ required "postgresql.auth.password is required (ADR-082)" .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- else }}
  # postgresql.auth.existingSecret is set — Database__ConnectionString + postgres-password are
  # supplied by that pre-existing Secret (operator-made in slice-03, ESO/OpenBao-made in slice-04).
  {{- end }}
  {{- if $renderOidcKey }}
  # OIDC client secret (epic-5305 forwarded-headers make the callback correct behind the ingress).
  # Skipped when oidc.existingSecret is set — then an external store (ESO/OpenBao, slice-04) owns it.
  Authentication__ClientSecret: {{ required "oidc.clientSecret is required when oidc.enabled (or set oidc.existingSecret)" .Values.oidc.clientSecret | quote }}
  {{- end }}
{{- end }}
