suite: render — skeleton workloads (slice-01)
tests:
  - it: missing Postgres password fails fast naming the key (ADR-082)
    template: templates/secret.yaml
    asserts:
      - failedTemplate:
          errorMessage: "postgresql.auth.password is required (ADR-082): set a Postgres password"

  - it: bundled Postgres StatefulSet is rendered by default
    set:
      postgresql.auth.password: testpass
    template: templates/postgres-statefulset.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.containers[0].image
          value: postgres:17

  - it: bundled Postgres is absent when disabled (BYO path)
    set:
      postgresql.enabled: false
      externalDatabase.host: my-pg.example
      externalDatabase.database: lh
      externalDatabase.user: lh
      externalDatabase.password: extpass
    template: templates/postgres-statefulset.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: ingress carries the configured host
    set:
      postgresql.auth.password: testpass
      ingress.host: lh.acme.internal
    template: templates/ingress.yaml
    asserts:
      - equal:
          path: spec.rules[0].host
          value: lh.acme.internal

  - it: TLS without a host fails fast
    set:
      postgresql.auth.password: testpass
      ingress.tls: true
      ingress.host: ""
    template: templates/ingress.yaml
    asserts:
      - failedTemplate: {}

  - it: API image tag falls back to Chart.appVersion when unset
    set:
      postgresql.auth.password: testpass
    template: templates/deployment-api.yaml
    asserts:
      # Assert the fallback shape, not a pinned version: with image.tag unset the
      # container image must be the ghcr repo tagged with the Chart.appVersion
      # calver. Matching the pattern (not a literal) keeps this green across every
      # appVersion bump instead of forcing a manual edit each release.
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^ghcr\.io/letpeoplework/lighthouse:[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$

  - it: API binds an unprivileged container port (non-root bind, not 80)
    set:
      postgresql.auth.password: testpass
    template: templates/deployment-api.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: ConfigMap overrides the image's privileged Kestrel ports to unprivileged ones
    set:
      postgresql.auth.password: testpass
    template: templates/configmap.yaml
    asserts:
      - equal:
          path: data["Kestrel__Endpoints__Http__Url"]
          value: "http://+:8080"
      - equal:
          path: data["Kestrel__Endpoints__Https__Url"]
          value: "https://+:8443"

  # --- slice-03: postgresql.auth.existingSecret (operator/ESO-owned credential, CC-3) ---

  - it: existingSecret relaxes the ADR-082 password required (no failure with password omitted)
    set:
      postgresql.auth.existingSecret: tenant-lpw-db
    template: templates/secret.yaml
    asserts:
      # No OIDC, no chart-rendered DB keys → the chart owns no Secret at all.
      - hasDocuments:
          count: 0

  - it: existingSecret does not render chart-owned DB keys but still renders the OIDC secret
    set:
      postgresql.auth.existingSecret: tenant-lpw-db
      oidc.enabled: true
      oidc.issuer: https://idp.example
      oidc.clientId: lighthouse
      oidc.clientSecret: shh
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: stringData.Database__ConnectionString
      - notExists:
          path: stringData["postgres-password"]
      - equal:
          path: stringData.Authentication__ClientSecret
          value: shh

  - it: bundled Postgres reads POSTGRES_PASSWORD from the existing Secret
    set:
      postgresql.auth.existingSecret: tenant-lpw-db
    template: templates/postgres-statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[2].valueFrom.secretKeyRef.name
          value: tenant-lpw-db
      - equal:
          path: spec.template.spec.containers[0].env[2].valueFrom.secretKeyRef.key
          value: postgres-password

  - it: API reads Database__ConnectionString from the existing Secret
    set:
      postgresql.auth.existingSecret: tenant-lpw-db
    template: templates/deployment-api.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: tenant-lpw-db
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: Database__ConnectionString

  # --- slice-04: oidc.existingSecret (ESO/OpenBao-owned OIDC client secret, CC-3) ---

  - it: oidc.existingSecret relaxes the OIDC clientSecret required (no clientSecret value needed)
    set:
      postgresql.auth.password: pw
      oidc.enabled: true
      oidc.issuer: https://idp.example
      oidc.clientId: lighthouse
      oidc.existingSecret: tenant-lpw-oidc
    template: templates/secret.yaml
    asserts:
      # Chart still owns the DB Secret (no DB existingSecret here) but NOT the OIDC key.
      - hasDocuments:
          count: 1
      - exists:
          path: stringData.Database__ConnectionString
      - notExists:
          path: stringData.Authentication__ClientSecret

  - it: API reads the OIDC client secret from oidc.existingSecret
    set:
      postgresql.auth.password: pw
      oidc.enabled: true
      oidc.issuer: https://idp.example
      oidc.clientId: lighthouse
      oidc.existingSecret: tenant-lpw-oidc
    template: templates/deployment-api.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
          value: tenant-lpw-oidc
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.key
          value: Authentication__ClientSecret

  - it: both DB and OIDC existingSecret set → chart owns no Secret at all
    set:
      postgresql.auth.existingSecret: tenant-lpw-db
      oidc.enabled: true
      oidc.issuer: https://idp.example
      oidc.clientId: lighthouse
      oidc.existingSecret: tenant-lpw-oidc
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 0
