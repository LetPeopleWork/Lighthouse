# Lighthouse Helm chart — default values.
# The chart is Postgres-only (ADR-080) and defaults to the standalone-parity shape:
# frontend.mode=embedded (one API workload serving the SPA, ADR-081), bundled Postgres on.

# -- Number of API replicas. >1 requires Redis (ConnectionStrings:Redis); see slice-02/03.
replicaCount: 1

image:
  # -- Lighthouse API image repository.
  repository: ghcr.io/letpeoplework/lighthouse
  # -- Image tag. Empty string falls back to Chart.appVersion (ADR-083 consistency).
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

frontend:
  # -- Frontend topology: embedded (API serves the SPA, default/standalone parity) or split.
  #    split is NOT implemented in this chart version and fails loud (ADR-081).
  mode: embedded

ingress:
  # -- Render an Ingress for the API.
  enabled: true
  # -- Extra annotations for the Ingress (controller-specific). When OIDC is enabled behind
  #    ingress-nginx you MUST raise the proxy buffer, or the large Set-Cookie response on the OIDC
  #    callback overflows the default 4k buffer and the login round-trip fails with 502. Example:
  #    annotations:
  #      nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
  annotations: {}
  # -- Ingress class name (e.g. traefik, nginx). Empty uses the cluster default.
  className: ""
  # -- Public hostname the app is served on (drives the OIDC callback + NOTES.txt URL).
  host: lighthouse.local
  # -- Enable TLS on the Ingress (host must be set).
  tls: false
  # -- TLS secret name (when tls=true and you bring your own cert).
  tlsSecretName: ""

# -- Resource requests/limits for the API container.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

postgresql:
  # -- Deploy a bundled in-chart Postgres StatefulSet (ADR-080). Set false to bring your own (slice-03).
  enabled: true
  # -- Bundled Postgres image (official, vendor-neutral).
  image: postgres:17
  auth:
    # -- Database name.
    database: lighthouse
    # -- Database user.
    username: lighthouse
    # -- Database password. REQUIRED — no default (ADR-082, explicit password). Ignored when
    #    existingSecret is set.
    password: ""
    # -- Read DB credentials from a pre-existing Secret instead of rendering them from auth.password.
    #    The Secret MUST provide both keys the chart consumes: `Database__ConnectionString` (the full
    #    Npgsql string) and `postgres-password` (POSTGRES_PASSWORD for the bundled StatefulSet). Lets an
    #    operator (slice-03) or an external secret store (ESO/OpenBao, slice-04) own the credential
    #    without passing it as a Helm value (CC-3). When set, the ADR-082 render-time password `required`
    #    is relaxed. Empty = the chart renders its own Secret from auth.password.
    existingSecret: ""
  persistence:
    # -- PVC size for the bundled Postgres data volume.
    size: 8Gi
    # -- StorageClass for the PVC. Empty uses the cluster default.
    storageClass: ""

# -- Bounded graceful-shutdown drain window (seconds); maps to Shutdown:TimeoutSeconds + terminationGracePeriodSeconds (epic-5305 #5309).
shutdownTimeoutSeconds: 30

telemetry:
  # -- Enable OpenTelemetry /metrics + JSON logs (epic-5305 #5312). Off by default (self-hoster).
  enabled: false

redis:
  # -- Redis connection string (ConnectionStrings:Redis). REQUIRED when replicaCount>1 — enables the
  #    epic-5305 #5304 SignalR backplane + single-instance background work so the fleet syncs once.
  #    Operator-provided (the chart bundles no Redis; vendor-neutral). Empty = single-replica only.
  connectionString: ""

# -- Bring-your-own Postgres (used when postgresql.enabled=false). Vendor-neutral (managed / CNPG / RDS / Azure).
externalDatabase:
  host: ""
  port: 5432
  database: ""
  user: ""
  password: ""

oidc:
  # -- Enable OIDC login (Authentication:*). Off = no auth (standalone parity). Needs forwarded-headers behind ingress.
  enabled: false
  # -- OIDC authority / issuer URL.
  issuer: ""
  # -- OIDC client id.
  clientId: ""
  # -- OIDC client secret (REQUIRED when oidc.enabled, unless existingSecret is set).
  clientSecret: ""
  # -- Read the OIDC client secret from a pre-existing Secret instead of rendering it from
  #    oidc.clientSecret. The Secret MUST provide the key `Authentication__ClientSecret`. Lets an
  #    external secret store (ESO/OpenBao, slice-04) own the OIDC credential without passing it as a
  #    Helm value (CC-3). When set, the render-time clientSecret `required` is relaxed. Empty = the
  #    chart renders the OIDC key into its own Secret from oidc.clientSecret. Mirrors
  #    postgresql.auth.existingSecret (slice-03) for the OIDC client secret.
  existingSecret: ""
  # -- API audience / resource identifier (Authentication:Audience). When set, the backend validates the
  #    JWT `aud` claim on bearer tokens, and the MCP server advertises it as the RFC 9728 protected
  #    resource (LIGHTHOUSE_OAUTH_RESOURCE). REQUIRED when mcp.auth.mode=oauth. Empty = no audience
  #    validation (browser cookie login still works). Deployment-specific — set it to the API's resource
  #    identifier registered in your IdP (e.g. an Entra Application ID URI, or a Keycloak audience).
  audience: ""
  # -- OIDC callback path.
  callbackPath: /api/auth/callback
  # -- Require the OIDC issuer/metadata to be served over HTTPS (Authentication:RequireHttpsMetadata).
  #    Keep true in production (Entra, Keycloak-behind-TLS, etc.). Set false ONLY for a plain-HTTP
  #    issuer in local/dev clusters — the backend otherwise refuses to load HTTP OIDC metadata.
  requireHttpsMetadata: true
  # -- Browser-facing origins allowed to call the API under auth (Authentication:AllowedOrigins).
  #    The backend fails closed if auth is on and this is empty (no wildcard CORS). Empty list =
  #    derive the single ingress origin (scheme+host) from ingress.host/ingress.tls automatically.
  #    Override only to allow extra origins (e.g. a separate SPA host).
  allowedOrigins: []

app:
  proxy:
    # -- Trusted reverse-proxy IPs (epic-5305 #5311) so OIDC redirect URIs + secure cookies are correct behind the ingress.
    trustedProxies: []
    # -- Trusted proxy CIDR networks.
    trustedNetworks: []

mcp:
  # -- Deploy the optional MCP HTTP server workload (ADR-085). Orthogonal to frontend.mode.
  enabled: false
  # -- MCP server image (lighthouse-clients mcp-http). Pin a real tag in production.
  image: ghcr.io/letpeoplework/lighthouse-clients/mcp-http:latest
  auth:
    # -- Inbound-auth model (ADR-079): apikey (caller's X-Api-Key pass-through) or oauth (IdP Bearer pass-through).
    mode: apikey
