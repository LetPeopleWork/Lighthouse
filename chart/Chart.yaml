apiVersion: v2
name: lighthouse
description: Lighthouse — flow metrics and probabilistic forecasting for Kubernetes. Postgres-only chart that brings the whole stack up with one command.
type: application
# version  — the CHART version (single source of truth; ADR-083). Bumped per release.
# 0.1.1: API binds unprivileged ports (8080/8443) so it runs as non-root on standard clusters.
# 0.1.2: postgresql.auth.existingSecret — read DB creds from a pre-existing Secret (operator/ESO, CC-3).
# 0.1.3: oidc.existingSecret — read the OIDC client secret from a pre-existing Secret (ESO/OpenBao, CC-3).
# 0.1.4: host-mandatory ingress guard + auto-reload wiring (checksum/config + stakater/reloader watch)
#        so an out-of-band ESO/OpenBao rotation reaches the running API without a manual restart.
# 0.1.5: track the v26.7.3.1 release — appVersion moves off the pre-release testing image to the
#        first tagged release carrying the scalability work; Helm/Kubernetes support is now GA.
# 0.1.6: track the v26.7.11.4 release — rule-based blocked items (Epic 5074).
version: 0.1.6
# appVersion — the default Lighthouse image tag the chart ships (mirrors values.image.tag; ADR-083).
appVersion: "26.7.11.4"
home: https://docs.lighthouse.letpeople.work
sources:
  - https://github.com/LetPeopleWork/Lighthouse
keywords:
  - flow-metrics
  - forecasting
  - kanban
maintainers:
  - name: LetPeopleWork
    url: https://docs.lighthouse.letpeople.work
