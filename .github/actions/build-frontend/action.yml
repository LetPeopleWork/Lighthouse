name: "build-frontend"
description: "Composite action to build and test the frontend with fixed tool versions and paths"

inputs:
  run-tests:
    description: "Run tests and Sonar analysis (true/false)"
    required: false
    default: 'true'
  sbom-version:
    description: "Version string to download SBOM artifact (leave empty to skip)"
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: '0'

    - name: Download SBOM artifacts
      if: ${{ inputs.sbom-version != '' }}
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: Lighthouse-SBOM-${{ inputs.sbom-version }}
        path: ./sbom-download

    - name: Copy SBOM files to frontend public directory
      if: ${{ inputs.sbom-version != '' }}
      shell: bash
      run: |
        mkdir -p ./Lighthouse.Frontend/public/sbom
        cp ./sbom-download/lighthouse-backend-sbom.cdx.json ./Lighthouse.Frontend/public/sbom/backend.cdx.json
        cp ./sbom-download/lighthouse-frontend-sbom.cdx.json ./Lighthouse.Frontend/public/sbom/frontend.cdx.json

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      with:
        version: 10
        run_install: false

    - name: Use Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version: '24'
        cache: 'pnpm'
        cache-dependency-path: './Lighthouse.Frontend/pnpm-lock.yaml'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
      working-directory: ./Lighthouse.Frontend

    - name: Build Frontend
      shell: bash
      run: pnpm run build
      working-directory: ./Lighthouse.Frontend

    - name: Test Frontend and Sonar report
      if: ${{ inputs.run-tests == 'true' }}
      shell: bash
      run: pnpm run sonarreport
      working-directory: ./Lighthouse.Frontend
      env:
        CI: true

    - name: Setup Sonar cache
      if: ${{ inputs.run-tests == 'true' }}
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: |
          ${{ runner.os }}-sonar

    - name: Frontend SonarCloud
      if: ${{ inputs.run-tests == 'true' }}
      uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
      args: >
        -Dsonar.verbose=true
      env:
        SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
      with:
        projectBaseDir: ./Lighthouse.Frontend
