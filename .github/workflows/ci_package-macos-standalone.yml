name: Package macOS Standalone (Tauri)

on:
  workflow_call:
    inputs:
      fileversion:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  package-macos-standalone:
    runs-on: macos-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'
    
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: "Developer ID Application: LetPeopleWork GmbH (${{ secrets.APPLE_TEAM_ID }})"

    environment:
      name: "Package and Sign"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: '10'

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '25'
          cache: 'pnpm'
          cache-dependency-path: './Lighthouse.Frontend/pnpm-lock.yaml'

      - name: Install Rust stable with universal targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./Lighthouse.Frontend

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-SBOM-${{ inputs.version }}
          path: ./sbom-download

      - name: Copy SBOM files to frontend public directory
        run: |
          mkdir -p ./Lighthouse.Frontend/public/sbom
          cp ./sbom-download/lighthouse-backend-sbom.cdx.json ./Lighthouse.Frontend/public/sbom/backend.cdx.json
          cp ./sbom-download/lighthouse-frontend-sbom.cdx.json ./Lighthouse.Frontend/public/sbom/frontend.cdx.json

      - name: Build Backend (composite, publish osx targets)
        uses: ./.github/actions/build-backend
        with:
          publish: 'true'
          fileversion: ${{ inputs.fileversion }}

      - name: Create universal binary
        run: |
          UNIVERSAL_DIR="./publish/osx-universal"
          mkdir -p "$UNIVERSAL_DIR"

          # Copy x64 publish output as base (gets all supporting files)
          cp -R ./Lighthouse.Backend/Lighthouse.Backend/publish/osx-x64/. "$UNIVERSAL_DIR/"

          # Overwrite with universal binary
          lipo -create \
            ./Lighthouse.Backend/Lighthouse.Backend/publish/osx-x64/Lighthouse \
            ./Lighthouse.Backend/Lighthouse.Backend/publish/osx-arm64/Lighthouse \
            -output "$UNIVERSAL_DIR/Lighthouse"

          # Overwrite with universal dylib
          lipo -create \
            ./Lighthouse.Backend/Lighthouse.Backend/publish/osx-x64/libe_sqlite3.dylib \
            ./Lighthouse.Backend/Lighthouse.Backend/publish/osx-arm64/libe_sqlite3.dylib \
            -output "$UNIVERSAL_DIR/libe_sqlite3.dylib"

          chmod +x "$UNIVERSAL_DIR/Lighthouse"

      - name: Remove development settings
        run: rm -f ./publish/osx-universal/appsettings.Development.json

      - name: Place sidecar binary and resources for Tauri
        run: |
          TARGET_TRIPLE="universal-apple-darwin"
          SIDECAR_DIR="./Lighthouse.Frontend/src-tauri/binaries"
          RESOURCES_DIR="./Lighthouse.Frontend/src-tauri/resources"
          UNIVERSAL_DIR="./publish/osx-universal"

          mkdir -p "${SIDECAR_DIR}"
          mkdir -p "${RESOURCES_DIR}"

          cp ./publish/osx-universal/Lighthouse "${SIDECAR_DIR}/Lighthouse.Backend-${TARGET_TRIPLE}"
          
          chmod +x "${SIDECAR_DIR}/Lighthouse.Backend-${TARGET_TRIPLE}"

          cp ./Lighthouse.Backend/Lighthouse.Backend/publish/osx-arm64/Lighthouse "${SIDECAR_DIR}/Lighthouse.Backend-aarch64-apple-darwin"
          chmod +x "${SIDECAR_DIR}/Lighthouse.Backend-aarch64-apple-darwin"

          cp ./Lighthouse.Backend/Lighthouse.Backend/publish/osx-x64/Lighthouse "${SIDECAR_DIR}/Lighthouse.Backend-x86_64-apple-darwin"
          chmod +x "${SIDECAR_DIR}/Lighthouse.Backend-x86_64-apple-darwin"

          cp -r ./publish/osx-universal/. "${RESOURCES_DIR}/"
          rm "${RESOURCES_DIR}/Lighthouse"

      - name: Update Tauri Version
        shell: bash
        run: |
            TARGET_FILE="Lighthouse.Frontend/src-tauri/tauri.conf.json"
            if [ -f "$TARGET_FILE" ]; then
            FULL_VERSION="${{ inputs.fileversion }}"
            SEMVER=$(echo "$FULL_VERSION" | awk -F'.' '{print $1"."$2"."$3$4}')
            jq --arg v "$SEMVER" '.version = $v' "$TARGET_FILE" > tmp.json && mv tmp.json "$TARGET_FILE"
            echo "Successfully updated version to $SEMVER in $TARGET_FILE"
            else
            echo "Error: $TARGET_FILE not found!"
            exit 1
            fi

      - name: Patch rpath on sidecar binaries
        run: |
          SIDECAR_DIR="./Lighthouse.Frontend/src-tauri/binaries"
          
          # The dylib lives in Contents/Resources/resources/ at runtime.
          # @executable_path is Contents/MacOS/, so we go up one and into Resources/resources/
          RPATH="@executable_path/../Resources/resources"

          for binary in \
            "${SIDECAR_DIR}/Lighthouse.Backend-universal-apple-darwin" \
            "${SIDECAR_DIR}/Lighthouse.Backend-aarch64-apple-darwin" \
            "${SIDECAR_DIR}/Lighthouse.Backend-x86_64-apple-darwin"; do
            
            echo "Patching rpath on: $binary"
            # Remove any stale rpath entries pointing to the old publish dir
            existing_rpaths=$(otool -l "$binary" | grep -A2 LC_RPATH | grep path | awk '{print $2}' || true)
            while IFS= read -r rp; do
              [ -n "$rp" ] && install_name_tool -delete_rpath "$rp" "$binary" 2>/dev/null || true
            done <<< "$existing_rpaths"
            
            # Add the correct runtime rpath
            install_name_tool -add_rpath "$RPATH" "$binary"
            
            # Verify
            echo "RPaths for $binary:"
            otool -l "$binary" | grep -A2 LC_RPATH | grep path
          done


      - name: Import Apple Certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Pre-sign bundled dylibs and binaries
        env:
            APPLE_SIGNING_IDENTITY: "Developer ID Application: LetPeopleWork GmbH (${{ secrets.APPLE_TEAM_ID }})"
        run: |
            # 1. Sign everything in the binaries folder (The actual sidecar)
            find Lighthouse.Frontend/src-tauri/binaries -type f | while read item; do
              echo "Signing sidecar: $item..."
              codesign --force --verify --verbose --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options runtime "$item"
            done

            # 2. Sign all dylibs in the resources folder
            find Lighthouse.Frontend/src-tauri/resources -name "*.dylib" | while read item; do
              echo "Signing dylib: $item..."
              codesign --force --verify --verbose --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options runtime "$item"
            done

      - name: Build Tauri app (signed + notarized)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: ./Lighthouse.Frontend
          args: --target universal-apple-darwin

      - name: Notarize and staple DMG
        run: |
          BUNDLE_DIR="./Lighthouse.Frontend/src-tauri/target/universal-apple-darwin/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found"
            exit 1
          fi
          echo "Submitting DMG for notarization: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling ticket to DMG..."
          xcrun stapler staple "$DMG"

          echo "Validating staple..."
          xcrun stapler validate "$DMG"

      - name: Find and rename artifacts
        run: |
          BUNDLE_DIR="./Lighthouse.Frontend/src-tauri/target/universal-apple-darwin/release/bundle"

          # Find DMG
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found in Tauri build output"
            ls -laR "$BUNDLE_DIR/" || true
            exit 1
          fi
          echo "Found DMG: ${DMG}"
          cp "${DMG}" "./Lighthouse-${{ inputs.version }}.dmg"

          # Find .app and create signed zip with ditto (preserves code signatures)
          APP_DIR=$(find "$BUNDLE_DIR/macos" -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: No .app found in Tauri build output"
            ls -laR "$BUNDLE_DIR/" || true
            exit 1
          fi
          echo "Found .app: ${APP_DIR}"
          ditto -c -k --keepParent "$APP_DIR" "./Lighthouse-${{ inputs.version }}.app.zip"

          # Collect updater archive and signature (produced by Tauri when TAURI_SIGNING_PRIVATE_KEY is set)
          UPDATER_TAR=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz" | head -1)
          if [ -n "$UPDATER_TAR" ]; then
            cp "$UPDATER_TAR" "./Lighthouse-${{ inputs.version }}.app.tar.gz"
            echo "Copied updater archive: $(basename $UPDATER_TAR)"
          fi
          
          UPDATER_SIG=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz.sig" | head -1)
          if [ -n "$UPDATER_SIG" ]; then
            cp "$UPDATER_SIG" "./Lighthouse-${{ inputs.version }}.app.tar.gz.sig"
            echo "Copied updater signature: $(basename $UPDATER_SIG)"
          fi

      - name: Upload signed DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Lighthouse-osx-dmg-${{ inputs.version }}
          path: ./Lighthouse-${{ inputs.version }}.dmg

      - name: Upload signed app zip artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Lighthouse-osx-app-${{ inputs.version }}
          path: ./Lighthouse-${{ inputs.version }}.app.zip

      - name: Upload macOS updater artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Lighthouse-osx-updater-${{ inputs.version }}
          path: |
            ./Lighthouse-${{ inputs.version }}.app.tar.gz
            ./Lighthouse-${{ inputs.version }}.app.tar.gz.sig
