name: Package Windows Standalone (Tauri)

on:
  workflow_call:
    inputs:
      fileversion:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  package-win-standalone:
    runs-on: windows-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'

    environment:
      name: "Package and Sign"

    permissions:
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: '0'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: './Lighthouse.Frontend/pnpm-lock.yaml'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./Lighthouse.Frontend

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-SBOM-${{ inputs.version }}
          path: ./sbom-download

      - name: Copy SBOM files to frontend public directory
        shell: bash
        run: |
          mkdir -p ./Lighthouse.Frontend/public/sbom
          cp ./sbom-download/lighthouse-backend-sbom.cdx.json ./Lighthouse.Frontend/public/sbom/backend.cdx.json
          cp ./sbom-download/lighthouse-frontend-sbom.cdx.json ./Lighthouse.Frontend/public/sbom/frontend.cdx.json

      - name: Download pre-built Windows backend
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-win-x64-${{ inputs.version }}
          path: ./Lighthouse/win-x64

      - name: Place sidecar binary and resources for Tauri
        shell: bash
        run: |
          TARGET_TRIPLE="x86_64-pc-windows-msvc"
          SIDECAR_DIR="./Lighthouse.Frontend/src-tauri/binaries"
          RESOURCES_DIR="./Lighthouse.Frontend/src-tauri/resources"

          mkdir -p "${SIDECAR_DIR}"
          mkdir -p "${RESOURCES_DIR}"

          cp ./Lighthouse/win-x64/Lighthouse.exe "${SIDECAR_DIR}/Lighthouse.Backend-${TARGET_TRIPLE}.exe"
          cp -r ./Lighthouse/win-x64/. "${RESOURCES_DIR}/"
          rm "${RESOURCES_DIR}/Lighthouse.exe"

      - name: Update Tauri Version
        shell: bash
        run: |
          TARGET_FILE="Lighthouse.Frontend/src-tauri/tauri.conf.json"
          if [ -f "$TARGET_FILE" ]; then
            FULL_VERSION="${{ inputs.fileversion }}"
            SEMVER=$(echo "$FULL_VERSION" | awk -F'.' '{print $1"."$2"."$3$4}')
            jq --arg v "$SEMVER" '.version = $v' "$TARGET_FILE" > tmp.json && mv tmp.json "$TARGET_FILE"
            echo "Successfully updated version to $SEMVER in $TARGET_FILE"
          else
            echo "Error: $TARGET_FILE not found!"
            exit 1
          fi

      - name: Build Tauri (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: ./Lighthouse.Frontend

      - name: Collect Tauri outputs
        shell: bash
        run: |
          BUNDLE_DIR="./Lighthouse.Frontend/src-tauri/target/release/bundle"
          OUTPUT_DIR="./standalone-output"
          mkdir -p "${OUTPUT_DIR}"

          echo "=== Tauri bundle contents ==="
          find "${BUNDLE_DIR}" -type f || true

          # NSIS installer + updater sig
          NSIS_EXE=$(find "${BUNDLE_DIR}/nsis" -name "*-setup.exe" 2>/dev/null | head -1)
          if [ -z "$NSIS_EXE" ]; then
            echo "ERROR: No NSIS setup EXE found"
            exit 1
          fi
          cp "$NSIS_EXE" "${OUTPUT_DIR}/"
          echo "Copied NSIS installer: $(basename "$NSIS_EXE")"

          NSIS_SIG=$(find "${BUNDLE_DIR}/nsis" -name "*-setup.exe.sig" 2>/dev/null | head -1)
          if [ -n "$NSIS_SIG" ]; then
            cp "$NSIS_SIG" "${OUTPUT_DIR}/"
            echo "Copied NSIS updater sig: $(basename "$NSIS_SIG")"
          else
            echo "WARN: No NSIS updater sig found"
          fi

          # MSI installer + updater sig
          MSI=$(find "${BUNDLE_DIR}/msi" -name "*.msi" ! -name "*.msi.zip" 2>/dev/null | head -1)
          if [ -z "$MSI" ]; then
            echo "ERROR: No MSI found"
            exit 1
          fi
          cp "$MSI" "${OUTPUT_DIR}/"
          echo "Copied MSI: $(basename "$MSI")"

          MSI_SIG=$(find "${BUNDLE_DIR}/msi" -name "*.msi.sig" 2>/dev/null | head -1)
          if [ -n "$MSI_SIG" ]; then
            cp "$MSI_SIG" "${OUTPUT_DIR}/"
            echo "Copied MSI updater sig: $(basename "$MSI_SIG")"
          else
            echo "WARN: No MSI updater sig found"
          fi

          echo "=== Standalone output ==="
          ls -la "${OUTPUT_DIR}/"

      - name: Upload unsigned standalone artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Lighthouse-win-standalone-x64-${{ inputs.version }}
          path: ./standalone-output