name: Verify macOS DMG

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      submission_id:
        required: false
        type: string
        default: ''

jobs:
  verifymacos:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'

    steps:
      - name: Download signed DMG
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-osx-dmg-${{ inputs.version }}
          path: ./publish

      - name: Verify DMG signature
        run: |
          DMG_FILE="./publish/Lighthouse-${{ inputs.version }}.dmg"
          if [ ! -f "$DMG_FILE" ]; then
            echo "Error: DMG not found at $DMG_FILE"
            ls -la ./publish/
            exit 1
          fi

          echo "Verifying DMG signature..."
          codesign --verify --deep --strict --verbose=4 "$DMG_FILE"
          codesign -dvvv "$DMG_FILE" || true
          
          echo "Verifying notarization staple..."
          xcrun stapler validate "$DMG_FILE"
          
          echo "Checking if DMG would pass Gatekeeper..."
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_FILE"

      - name: Mount DMG and verify contents
        run: |
          DMG_FILE="./publish/Lighthouse-${{ inputs.version }}.dmg"
          
          echo "Mounting DMG..."
          MOUNT_OUTPUT=$(hdiutil attach "$DMG_FILE" -nobrowse)
          MOUNT_DIR=$(echo "$MOUNT_OUTPUT" | grep Volumes | sed 's/.*\/Volumes/\/Volumes/')
          
          echo "Mounted at: $MOUNT_DIR"
          ls -la "$MOUNT_DIR"
          
          APP_PATH="$MOUNT_DIR/Lighthouse.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Lighthouse.app not found in DMG"
            exit 1
          fi
          
          echo "Verifying app bundle signature..."
          codesign --verify --verbose=4 "$APP_PATH"
          codesign -dvvv "$APP_PATH" || true
          
          echo "Checking if app would pass Gatekeeper..."
          spctl --assess --type execute --verbose=4 "$APP_PATH"
          
          # Store mount dir for later steps
          echo "MOUNT_DIR=$MOUNT_DIR" >> $GITHUB_ENV
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Verify sidecar rpath and dylib presence
        run: |
          APP_PATH="$APP_PATH"
          SIDECAR="$APP_PATH/Contents/MacOS/Lighthouse.Backend"
          DYLIB="$APP_PATH/Contents/Resources/resources/libe_sqlite3.dylib"

          echo "=== Sidecar binary ==="
          if [ ! -f "$SIDECAR" ]; then
            echo "ERROR: Sidecar not found at $SIDECAR"
            exit 1
          fi
          ls -la "$SIDECAR"

          echo "=== RPaths on sidecar ==="
          otool -l "$SIDECAR" | grep -A3 LC_RPATH || echo "WARNING: No LC_RPATH entries found"

          echo "=== dylib presence ==="
          if [ ! -f "$DYLIB" ]; then
            echo "ERROR: libe_sqlite3.dylib not found at $DYLIB"
            echo "Contents of Resources/resources/:"
            ls -la "$APP_PATH/Contents/Resources/resources/" || true
            exit 1
          fi
          ls -la "$DYLIB"

          echo "=== dylib architecture ==="
          lipo -info "$DYLIB"

          echo "=== dylib codesign ==="
          codesign -dvvv "$DYLIB" || echo "WARNING: dylib not signed"

          echo "=== sidecar codesign ==="
          codesign -dvvv "$SIDECAR" || echo "WARNING: sidecar not signed"

      - name: Retrieve notarization info
        if: inputs.submission_id != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMISSION_ID="${{ inputs.submission_id }}"
          echo "Using submission id: $SUBMISSION_ID"

          xcrun notarytool info "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json > notarization-info.json

          cat notarization-info.json

          STATUS=$(cat notarization-info.json | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Notarization status: $STATUS"
          if [ "$STATUS" != "Accepted" ]; then
            echo "Error: Notarization status is not Accepted"
            exit 1
          fi

      - name: Install app to Applications folder
        run: |
          echo "Installing Lighthouse.app to Applications..."
          cp -R "$APP_PATH" /Applications/Lighthouse.app
          ls -la /Applications/Lighthouse.app

      - name: Unmount DMG
        if: always()
        run: |
          if [ -n "$MOUNT_DIR" ]; then
            hdiutil detach "$MOUNT_DIR" || true
          fi

      - name: Run Lighthouse
        run: |
          echo "Starting Lighthouse app bundle..."
          open -a /Applications/Lighthouse.app
          echo "App launched"

      - name: Wait for Lighthouse to start
        run: |
          echo "Waiting for URL to appear in sidecar logs..."
          LOG_DIR="$HOME/Library/Application Support/Lighthouse/logs"
          LIGHTHOUSE_URL=""
          end=$((SECONDS+60))  # give more time since frontend needs to boot first
          while [ $SECONDS -lt $end ]; do
            if [ -d "$LOG_DIR" ]; then
              LIGHTHOUSE_URL=$(grep -rhoE 'Url\s+: (https?://[^ ]+)' "$LOG_DIR"/ 2>/dev/null | head -1 | grep -oE 'https?://[^ ]+' || true)
              if [ -n "$LIGHTHOUSE_URL" ]; then
                echo "Found URL: $LIGHTHOUSE_URL"
                echo "LIGHTHOUSE_URL=$LIGHTHOUSE_URL" >> $GITHUB_ENV
                exit 0
              fi
            fi
            sleep 1
          done

          echo "Timeout waiting for URL in logs"
          echo "=== Log directory contents ==="
          ls -la "$LOG_DIR" 2>/dev/null || echo "Log dir missing entirely"
          echo "=== All log file contents ==="
          cat "$LOG_DIR"/* 2>/dev/null || true
          echo "=== Running processes ==="
          ps aux | grep -i lighthouse || true
          echo "=== macOS crash logs ==="
          find ~/Library/Logs/DiagnosticReports -name "Lighthouse*" -newer /tmp -exec cat {} \; 2>/dev/null || true
          exit 1

      - name: Verify log files
        if: always()
        run: |
          LOG_DIR="$HOME/Library/Application Support/Lighthouse/logs"
          echo "Checking for log files in: $LOG_DIR"
          if [ ! -d "$LOG_DIR" ]; then
            echo "Error: Log directory $LOG_DIR does not exist"
            exit 1
          fi

          echo "Found files:"
          ls -la "$LOG_DIR"

          for logfile in "$LOG_DIR"/*; do
            if [ -f "$logfile" ]; then
              echo "=== Contents of $logfile ==="
              cat "$logfile"
              echo ""
            fi
          done

      - name: Verify database exists in correct directory
        run: |
          DB_DIR="$HOME/Library/Application Support/Lighthouse"
          DB_FILE="$DB_DIR/LighthouseAppContext.db"
          echo "Checking for database at: $DB_FILE"
          if [ ! -d "$DB_DIR" ]; then
            echo "Error: Database directory $DB_DIR does not exist"
            exit 1
          fi
          
          if [ ! -f "$DB_FILE" ]; then
            echo "Error: Database file $DB_FILE does not exist"
            ls -la "$DB_DIR"
            exit 1
          fi
          
          echo "Database file found: $DB_FILE"
          ls -la "$DB_DIR"
          
          echo "=== Full Application Support/Lighthouse contents ==="
          find "$DB_DIR" -type f | sort
