name: Verify Backend

on:
  workflow_call:
    inputs:
      backend:
        required: true
        type: string
      jira_connector:
        required: false
        type: string
        default: 'false'
      ado_connector:
        required: false
        type: string
        default: 'false'
      linear_connector:
        required: false
        type: string
        default: 'false'
      github_connector:
        required: false
        type: string
        default: 'false'
      connector_shared:
        required: false
        type: string
        default: 'false'
      run_sonar:
        required: false
        type: boolean
        default: false

jobs:
  backend:
    if: inputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      AzureDevOpsLighthouseIntegrationTestToken: ${{ secrets.AZUREDEVOPSLIGHTHOUSEINTEGRATIONTESTTOKEN }}
      JiraLighthouseIntegrationTestToken: ${{ secrets.JIRALIGHTHOUSEINTEGRATIONTESTTOKEN }}
      JiraScopedTokenIntegrationTestToken: ${{ secrets.JIRASCOPEDTOKENINTEGRATIONTESTTOKEN }}
      AzureDevOpsLighthouseE2ETestToken: ${{ secrets.AZUREDEVOPSLIGHTHOUSEE2ETESTTOKEN }}
      LinearAPIKey: ${{ secrets.LINEARAPIKEY }}
      LighthouseBackupPassword: ${{ secrets.LIGHTHOUSEBACKUPPASSWORD }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: '0'

    - name: Remove Frontend sonar-project.properties
      if: ${{ inputs.run_sonar }}
      run: |
        rm ./Lighthouse.Frontend/sonar-project.properties

    - name: Set up JDK 17
      if: ${{ inputs.run_sonar }}
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
      with:
        java-version: 17
        distribution: 'zulu'

    - name: Write private key to file
      run: echo "${{ secrets.LIGHTHOUSE_LICENSE_PRIVATE_KEY }}" > private_key.pem

    - name: Generate license for backend Tests
      run: |
        python Scripts/generate_license.py private_key.pem Lighthouse.Backend/Lighthouse.Backend.Tests/Services/Implementation/Licensing/valid_not_expired_license.json "1886" "Lighthouse CI" "ci@lighthouse.test" "Lighthouse Test Organization" "$(date -d '+2 days' '+%Y-%m-%d')" "$(date -d '-3 days' '+%Y-%m-%d')"

    - name: Cache NuGet packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/Lighthouse.Backend/**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Install SonarCloud scanner
      if: ${{ inputs.run_sonar }}
      run: |
        dotnet tool install --global dotnet-sonarscanner

    - name: Begin SonarCloud analysis
      if: ${{ inputs.run_sonar }}
      run: |
        dotnet sonarscanner begin \
          /k:"LetPeopleWork_Lighthouse" \
          /o:"letpeoplework" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.sources="Lighthouse.Backend" \
          /d:sonar.language="cs" \
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
          /d:sonar.cs.vstest.reportsPaths="**/TestResults/*.trx" \
          /d:sonar.exclusions="**/Lighthouse.Migrations.Sqlite/**,**/Lighthouse.Migrations.Postgres/**,**/Lighthouse.Frontend/**,**/Lighthouse.EndToEndTests/**,Lighthouse.Frontend/**,Lighthouse.EndToEndTests/**,Scripts/**,**/.github/**,**/.vscode/**,**/docs/**" \
          /d:sonar.coverage.exclusions="**/Lighthouse.Migrations.Sqlite/**,**/Lighthouse.Migrations.Postgres/**,**/Lighthouse.Frontend/**,**/Lighthouse.EndToEndTests/**,Scripts/**"
    
    - name: Build Backend (composite)
      uses: ./.github/actions/build-backend
      with:
        publish: 'false'

    - name: Compute Test Backend filter
      id: filter
      run: |
        # Always include every non-integration test (unit, WAF, security, etc.)
        parts=("Category!=Integration")

        # Force-full only when the diff touched a path on the shared-connector
        # whitelist (Auth/OAuth subfolders, top-level schema, interfaces,
        # Program.cs, csproj, .sln, etc.) — see Scripts/test-selection/path-
        # classifier.sh. Every other trigger (push to main, PR, workflow_dispatch)
        # respects the per-connector inputs; on main the ci_changes.yml diff
        # spans from the last successful run, so any connector change in that
        # window will flip the matching input to true.
        force_full="false"
        if [ "${{ inputs.connector_shared }}" == "true" ]; then
          force_full="true"
        fi

        if [ "$force_full" == "true" ]; then
          parts+=("Category=Integration")
        else
          [ "${{ inputs.jira_connector }}"   == "true" ] && parts+=("Category=JiraIntegration")
          [ "${{ inputs.ado_connector }}"    == "true" ] && parts+=("Category=AdoIntegration")
          [ "${{ inputs.linear_connector }}" == "true" ] && parts+=("Category=LinearIntegration")
          [ "${{ inputs.github_connector }}" == "true" ] && parts+=("Category=GithubIntegration")
        fi

        filter=$(IFS='|'; echo "${parts[*]}")
        echo "force_full=$force_full"
        echo "filter=$filter"
        echo "filter=$filter" >> $GITHUB_OUTPUT

    - name: Test Backend (with Coverage)
      if: ${{ inputs.run_sonar }}
      run: |
        dotnet test -c Release --no-build --no-restore ./Lighthouse.Backend --filter "${{ steps.filter.outputs.filter }}" --logger trx --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[Lighthouse]*" RunConfiguration.MaxCpuCount=0

    - name: Test Backend (without Coverage)
      if: ${{ !inputs.run_sonar }}
      run: |
        dotnet test -c Release --no-build --no-restore ./Lighthouse.Backend --filter "${{ steps.filter.outputs.filter }}" --logger trx -- RunConfiguration.MaxCpuCount=0

    - name: Extract backend per-test timings
      if: always()
      run: |
        shopt -s globstar nullglob
        TRX_FILES=(Lighthouse.Backend/**/TestResults/*.trx)
        if [ ${#TRX_FILES[@]} -eq 0 ]; then
          echo "No TRX files found; skipping timings extraction."
          exit 0
        fi
        TRX_ARGS=()
        for f in "${TRX_FILES[@]}"; do TRX_ARGS+=(--trx "$f"); done
        python3 Scripts/test-timings/trx_to_csv.py \
          "${TRX_ARGS[@]}" \
          --source-root Lighthouse.Backend/Lighthouse.Backend.Tests \
          --output test-timings-backend.csv
        echo "--- top 20 slowest backend tests ---"
        python3 Scripts/test-timings/summarise.py \
          --top 20 \
          --source-root Lighthouse.Backend/Lighthouse.Backend.Tests \
          "${TRX_FILES[@]}"

    - name: Upload backend per-test timings
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: test-timings-backend
        path: test-timings-backend.csv
        if-no-files-found: warn

    - name: End SonarCloud analysis
      if: ${{ inputs.run_sonar }}
      run: |
        dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Upload Sonar report metadata
      if: ${{ inputs.run_sonar }}
      uses: actions/upload-artifact@v7.0.1
      with:
        name: sonar-report-backend
        path: .sonarqube/out/.sonar/report-task.txt