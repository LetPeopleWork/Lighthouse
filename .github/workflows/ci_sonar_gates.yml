name: Verify SonarCloud Quality Gates

on:
  workflow_call:
    inputs:
      frontend-ran:
        type: boolean
        required: true
      backend-ran:
        type: boolean
        required: true
      backend-status-check:
        type: boolean
        required: false
        default: false

jobs:
  sonar-gates:
    if: inputs.frontend-ran || inputs.backend-ran || inputs.backend-status-check
    runs-on: ubuntu-latest
    steps:
      - name: Verify Backend Quality Gate (no scan, status check)
        if: inputs.backend-status-check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          status=$(curl -sf -H "Authorization: Bearer ${SONAR_TOKEN}" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=LetPeopleWork_Lighthouse&branch=main" \
            | jq -r '.projectStatus.status')
          echo "Backend SonarCloud quality gate on main: $status"
          if [ "$status" != "OK" ]; then
            echo "::error::Backend SonarCloud quality gate is '$status' on main. The last analysis is not green — open a PR or run the nightly to re-analyse after cleaning it up (pushes to main no longer re-scan)."
            exit 1
          fi

      - name: Download Frontend Sonar report
        if: inputs.frontend-ran
        uses: actions/download-artifact@v8
        with:
          name: sonar-report-frontend
          path: ./Lighthouse.Frontend/.scannerwork/

      - name: Wait for Frontend Quality Gate
        if: inputs.frontend-ran
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: ./Lighthouse.Frontend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Download Backend Sonar report
        if: inputs.backend-ran
        uses: actions/download-artifact@v8
        with:
          name: sonar-report-backend
          path: .sonarqube/out/.sonar/

      - name: Wait for Backend Quality Gate
        if: inputs.backend-ran
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: .sonarqube/out/.sonar/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      
      - name: Checkout
        if: inputs.frontend-ran
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: '0'

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 10.33.2
          run_install: false

      - name: Use Node.js
        if: inputs.frontend-ran
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: './Lighthouse.Frontend/pnpm-lock.yaml'
      
      - name: Audit Frontend Dependencies
        if: inputs.frontend-ran && github.ref == 'refs/heads/main'
        working-directory: ./Lighthouse.Frontend
        run: pnpm audit --audit-level=low --prod