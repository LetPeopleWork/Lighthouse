name: Package App

on:
  workflow_call:
    inputs:
      fileversion:
        required: true
        type: string
      version:
        required: true
        type: string
      sbom-version:
        required: false
        type: string
        default: ''
      dotnet_version:
        required: false
        type: string
        default: '10'

jobs:
  packageapp:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: '0'
        
      - name: Package App (composite)
        uses: ./.github/actions/package-app
        with:
          fileversion: ${{ inputs.fileversion }}
          version: ${{ inputs.version }}
          sbom-version: ${{ inputs.sbom-version }}