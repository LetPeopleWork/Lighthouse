name: Generate Tauri Update Feed

on:
  # Enable schedule once we have the first proper release
  # schedule:
  #  - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      include_prereleases:
        description: 'Include pre-releases (for testing only)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    if: github.repository == 'LetPeopleWork/Lighthouse'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - name: Get latest release and check for existing feed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cron runs always use stable-only, regardless of any input
          # Manual runs use the input flag (defaults to false = stable-only)
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.include_prereleases }}" != "true" ]; then
            echo "Mode: stable releases only"
            LATEST=$(gh api repos/${{ github.repository }}/releases \
              --jq '[.[] | select(.prerelease == false)] | first | .tag_name')
          else
            echo "Mode: include pre-releases"
            LATEST=$(gh api repos/${{ github.repository }}/releases \
              --jq 'first | .tag_name')
          fi

          if [ -z "$LATEST" ]; then
            echo "No releases found, stopping"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest release: $LATEST"

          # Skip the exists-check when testing with pre-releases — always regenerate
          if [ "${{ github.event_name }}" != "schedule" ] && [ "${{ inputs.include_prereleases }}" = "true" ]; then
            echo "Pre-release mode: skipping exists check, always proceeding"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if tauri-update.json already exists on this release
          URL="https://github.com/${{ github.repository }}/releases/download/${LATEST}/tauri-update.json"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL" || echo "000")
          echo "HTTP status for tauri-update.json: $STATUS"

          if [ "$STATUS" -eq 200 ]; then
            echo "tauri-update.json already exists on $LATEST — nothing to do"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tauri-update.json not found on $LATEST — proceeding"
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"

  generate-feed:
    needs: check-release
    runs-on: ubuntu-latest
    if: needs.check-release.outputs.proceed == 'true'

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Fetch release data
        id: release
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/tags/${TAG})

          VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          PUB_DATE=$(echo "$RELEASE_JSON" | jq -r '.published_at')

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "pub_date=${PUB_DATE}" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_JSON" | jq -r '.body // ""' > /tmp/release_notes.md

      - name: Download updater signatures
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          mkdir -p /tmp/sigs

          echo "Downloading Linux updater signature..."
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --pattern "Lighthouse-linux-standalone.AppImage.tar.gz.sig" \
            --dir /tmp/sigs 2>/dev/null || echo "WARN: Linux updater sig not found"

          echo "Downloading macOS updater signature..."
          MACOS_SIG=$(gh release view "${TAG}" \
            --repo "${{ github.repository }}" \
            --json assets -q '.assets[].name' | grep '\.app\.tar\.gz\.sig$' | head -1)
          if [ -n "$MACOS_SIG" ]; then
            gh release download "${TAG}" \
              --repo "${{ github.repository }}" \
              --pattern "$MACOS_SIG" \
              --dir /tmp/sigs
            mv "/tmp/sigs/$MACOS_SIG" /tmp/sigs/macos-updater.sig
          else
            echo "WARN: macOS updater sig not found"
          fi

          echo "Downloading Windows NSIS updater signature..."
          NSIS_SIG=$(gh release view "${TAG}" \
            --repo "${{ github.repository }}" \
            --json assets -q '.assets[].name' | grep '\.nsis\.zip\.sig$' | head -1)
          if [ -n "$NSIS_SIG" ]; then
            gh release download "${TAG}" \
              --repo "${{ github.repository }}" \
              --pattern "$NSIS_SIG" \
              --dir /tmp/sigs
            mv "/tmp/sigs/$NSIS_SIG" /tmp/sigs/windows-nsis-updater.sig
          else
            echo "WARN: Windows NSIS updater sig not found"
          fi

          echo "=== Downloaded signatures ==="
          ls -la /tmp/sigs/

      - name: Build update feed JSON
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          PUB_DATE="${{ steps.release.outputs.pub_date }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          LINUX_SIG=""
          [ -f /tmp/sigs/Lighthouse-linux-standalone.AppImage.tar.gz.sig ] && \
            LINUX_SIG=$(cat /tmp/sigs/Lighthouse-linux-standalone.AppImage.tar.gz.sig)

          MACOS_SIG=""
          [ -f /tmp/sigs/macos-updater.sig ] && \
            MACOS_SIG=$(cat /tmp/sigs/macos-updater.sig)

          WINDOWS_SIG=""
          [ -f /tmp/sigs/windows-nsis-updater.sig ] && \
            WINDOWS_SIG=$(cat /tmp/sigs/windows-nsis-updater.sig)

          MACOS_TAR_NAME=$(gh release view "${TAG}" \
            --repo "${{ github.repository }}" \
            --json assets -q '.assets[].name' | grep '\.app\.tar\.gz$' | head -1)
          MACOS_TAR_NAME="${MACOS_TAR_NAME:-Lighthouse-${TAG}.app.tar.gz}"

          NSIS_ZIP_NAME=$(gh release view "${TAG}" \
            --repo "${{ github.repository }}" \
            --json assets -q '.assets[].name' | grep '\.nsis\.zip$' | head -1)
          NSIS_ZIP_NAME="${NSIS_ZIP_NAME:-Lighthouse_${TAG}_x64-setup.nsis.zip}"

          jq -n \
            --arg version "$VERSION" \
            --rawfile notes /tmp/release_notes.md \
            --arg pub_date "$PUB_DATE" \
            --arg linux_url "${DOWNLOAD_URL}/Lighthouse-linux-standalone.AppImage.tar.gz" \
            --arg linux_sig "$LINUX_SIG" \
            --arg darwin_url "${DOWNLOAD_URL}/${MACOS_TAR_NAME}" \
            --arg darwin_sig "$MACOS_SIG" \
            --arg windows_url "${DOWNLOAD_URL}/${NSIS_ZIP_NAME}" \
            --arg windows_sig "$WINDOWS_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64":   { url: $linux_url,   signature: $linux_sig   },
                "darwin-aarch64": { url: $darwin_url,  signature: $darwin_sig  },
                "darwin-x86_64":  { url: $darwin_url,  signature: $darwin_sig  },
                "windows-x86_64": { url: $windows_url, signature: $windows_sig }
              }
            }' > /tmp/tauri-update.json

          echo "=== Generated tauri-update.json ==="
          cat /tmp/tauri-update.json

      - name: Upload feed to release
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          echo "Uploading tauri-update.json to release ${TAG}"
          gh release upload "${TAG}" /tmp/tauri-update.json \
            --repo "${{ github.repository }}" --clobber