name: Sign Windows Binaries

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  codesign-windows:
    runs-on: [self-hosted, codesign]
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download server artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-win-x64-${{ inputs.version }}
          path: ./artifacts/server

      - name: Download standalone artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-win-standalone-x64-${{ inputs.version }}
          path: ./artifacts/standalone

      - name: Extract portable ZIP for signing
        shell: bash
        run: |
          PORTABLE_ZIP=$(find ./artifacts/standalone -name "*-portable-win-x64.zip" 2>/dev/null | head -1)
          if [ -z "$PORTABLE_ZIP" ]; then
            echo "ERROR: No portable ZIP found"
            exit 1
          fi
          echo "Found portable ZIP: $(basename "$PORTABLE_ZIP")"
          mkdir -p ./artifacts/portable-extracted
          7z x "$PORTABLE_ZIP" -o./artifacts/portable-extracted
          echo "=== Extracted portable contents ==="
          ls -la ./artifacts/portable-extracted/

      - name: Sign on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $thumbprint = $env:CERT_THUMBPRINT
          if (-not $thumbprint) { throw "CERT_THUMBPRINT environment variable is not set" }

          function Sign-File($filePath) {
            Write-Host "Signing $filePath with signtool.exe"
            & "signtool.exe" sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /sha1 $thumbprint /d "Lighthouse ${{ inputs.version }}" /du "https://letpeople.work/lighthouse" $filePath
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $filePath" }
          }

          # Server EXEs
          $serverFiles = Get-ChildItem -Path ./artifacts/server -Filter "Lighthouse*.exe"
          foreach ($file in $serverFiles) { Sign-File $file.FullName }

          # Standalone EXEs (NSIS setup)
          $standaloneExes = Get-ChildItem -Path ./artifacts/standalone -Filter "Lighthouse*.exe"
          foreach ($file in $standaloneExes) { Sign-File $file.FullName }

          # Standalone MSIs
          $standaloneMsis = Get-ChildItem -Path ./artifacts/standalone -Filter "Lighthouse*.msi" | Where-Object { $_.Name -notlike "*.msi.zip*" }
          foreach ($file in $standaloneMsis) { Sign-File $file.FullName }

          # Portable EXEs (extracted)
          $portableExes = Get-ChildItem -Path ./artifacts/portable-extracted -Filter "*.exe"
          foreach ($file in $portableExes) { Sign-File $file.FullName }
        env:
          CERT_THUMBPRINT: ${{ secrets.CERT_THUMBPRINT }}

      - name: Sign on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          INTERMEDIATE_CERT="./tools/codesign/SSL_COM_CODE_SIGNING_INTERMEDIATE_CA_ECC_R2.crt"

          sign_file() {
            local file="$1"
            echo "Signing ${file} with osslsigncode"
            osslsigncode sign \
              -pkcs11engine /usr/lib/engines-3/pkcs11.so \
              -pkcs11module /usr/lib/opensc-pkcs11.so \
              -key "pkcs11:id=%01;type=private" \
              -pkcs11cert "pkcs11:id=%01;type=cert" \
              -ac "$INTERMEDIATE_CERT" \
              -pass "$YUBI_PIN" \
              -n "Lighthouse ${{ inputs.version }}" \
              -i "https://letpeople.work/lighthouse" \
              -t http://timestamp.digicert.com \
              -in "$file" \
              -out "${file}.signed"
            mv "${file}.signed" "$file"
          }

          for file in ./artifacts/server/Lighthouse*.exe; do
            [ -f "$file" ] && sign_file "$file"
          done

          for file in ./artifacts/standalone/Lighthouse*.exe; do
            [ -f "$file" ] && sign_file "$file"
          done

          for file in ./artifacts/standalone/*.msi; do
            [ -f "$file" ] && [[ "$file" != *.msi.zip ]] && sign_file "$file"
          done

          # Portable EXEs (extracted from ZIP)
          for file in ./artifacts/portable-extracted/*.exe; do
            [ -f "$file" ] && sign_file "$file"
          done
        env:
          YUBI_PIN: ${{ secrets.YUBI_PIN }}

      - name: Repack portable ZIP after signing
        shell: bash
        run: |
          PORTABLE_ZIP=$(find ./artifacts/standalone -name "*-portable-win-x64.zip" 2>/dev/null | head -1)
          if [ -z "$PORTABLE_ZIP" ]; then
            echo "ERROR: No portable ZIP found to repack"
            exit 1
          fi
          echo "Repacking $(basename "$PORTABLE_ZIP") with signed EXEs"
          rm "$PORTABLE_ZIP"
          cd ./artifacts/portable-extracted
          7z a "../../standalone/$(basename "$PORTABLE_ZIP")" .
          cd -
          echo "=== Repacked portable ZIP ==="
          ls -lh ./artifacts/standalone/

      - name: Re-sign NSIS updater sig after code signing
        shell: bash
        run: |
          NSIS_EXE=$(find ./artifacts/standalone -maxdepth 1 -name "*-setup.exe" 2>/dev/null | head -1)
          if [ -z "$NSIS_EXE" ]; then
            echo "No NSIS setup EXE found — skipping"
            exit 0
          fi
          echo "Re-generating Tauri updater signature for $(basename "$NSIS_EXE")"
          rm -f "${NSIS_EXE}.sig"
          npx -y @tauri-apps/cli@2 signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" "$NSIS_EXE"
          if [ -f "${NSIS_EXE}.sig" ]; then
            echo "Successfully generated: $(basename "${NSIS_EXE}.sig")"
          else
            echo "ERROR: Tauri signer did not produce a .sig file"
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Re-sign MSI updater sig after code signing
        shell: bash
        run: |
          MSI=$(find ./artifacts/standalone -maxdepth 1 -name "*.msi" ! -name "*.msi.zip" 2>/dev/null | head -1)
          if [ -z "$MSI" ]; then
            echo "No MSI found — skipping"
            exit 0
          fi
          echo "Re-generating Tauri updater signature for $(basename "$MSI")"
          rm -f "${MSI}.sig"
          npx -y @tauri-apps/cli@2 signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" "$MSI"
          if [ -f "${MSI}.sig" ]; then
            echo "Successfully generated: $(basename "${MSI}.sig")"
          else
            echo "ERROR: Tauri signer did not produce a .sig file"
            exit 1
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Verify signing coverage
        shell: bash
        run: |
          SERVER_COUNT=0
          STANDALONE_COUNT=0
          PORTABLE_COUNT=0

          for file in ./artifacts/server/Lighthouse*.exe; do
            [ -f "$file" ] && SERVER_COUNT=$((SERVER_COUNT + 1))
          done

          for file in ./artifacts/standalone/Lighthouse*.exe; do
            [ -f "$file" ] && STANDALONE_COUNT=$((STANDALONE_COUNT + 1))
          done
          for file in ./artifacts/standalone/*.msi; do
            [ -f "$file" ] && [[ "$file" != *.msi.zip ]] && STANDALONE_COUNT=$((STANDALONE_COUNT + 1))
          done

          for file in ./artifacts/portable-extracted/*.exe; do
            [ -f "$file" ] && PORTABLE_COUNT=$((PORTABLE_COUNT + 1))
          done

          echo "Server files found: ${SERVER_COUNT}"
          echo "Standalone files found: ${STANDALONE_COUNT}"
          echo "Portable EXEs signed: ${PORTABLE_COUNT}"

          if [ "$SERVER_COUNT" -eq 0 ]; then
            echo "ERROR: No server files were signed"
            ls -la ./artifacts/server/ || true
            exit 1
          fi

          if [ "$STANDALONE_COUNT" -eq 0 ]; then
            echo "ERROR: No standalone files were signed"
            ls -la ./artifacts/standalone/ || true
            exit 1
          fi

          if [ "$PORTABLE_COUNT" -eq 0 ]; then
            echo "ERROR: No portable EXEs were signed"
            ls -la ./artifacts/portable-extracted/ || true
            exit 1
          fi

          echo "Signing coverage OK: ${SERVER_COUNT} server file(s), ${STANDALONE_COUNT} standalone file(s), ${PORTABLE_COUNT} portable EXE(s)"

      - name: Delete unsigned server artifact
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118
        with:
          name: Lighthouse-win-x64-${{ inputs.version }}

      - name: Upload signed server artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: Lighthouse-win-x64-${{ inputs.version }}
          path: ./artifacts/server

      - name: Delete unsigned standalone artifact
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118
        with:
          name: Lighthouse-win-standalone-x64-${{ inputs.version }}

      - name: Upload signed standalone artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: Lighthouse-win-standalone-x64-${{ inputs.version }}
          path: ./artifacts/standalone