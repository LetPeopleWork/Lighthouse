name: Verify Windows version

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  verifywindows:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'

    steps:
      - name: Download signed Windows binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-win-x64-${{ inputs.version }}
          path: ./publish

      - name: Verify code signature
        shell: powershell
        run: |
          $binary = ".\publish\Lighthouse.exe"
          if (-not (Test-Path $binary)) {
            Write-Error "Error: binary not found at $binary"
            Get-ChildItem .\publish
            exit 1
          }

          Write-Host "Verifying code signature for $binary"
          $signature = Get-AuthenticodeSignature $binary
          
          Write-Host "Signature Status: $($signature.Status)"
          Write-Host "Signer Certificate Subject: $($signature.SignerCertificate.Subject)"
          Write-Host "Signer Certificate Issuer: $($signature.SignerCertificate.Issuer)"
          Write-Host "Timestamp: $($signature.TimeStamperCertificate.NotAfter)"
          
          if ($signature.Status -ne "Valid") {
            Write-Error "Error: Signature status is not Valid"
            exit 1
          }


      - name: Download signed standalone artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-win-standalone-x64-${{ inputs.version }}
          path: ./publish-standalone

      - name: Verify standalone signatures
        shell: powershell
        run: |
          $targets = @(
            (Get-ChildItem .\publish-standalone -Filter "Lighthouse.exe"     | Select-Object -First 1).FullName,
            (Get-ChildItem .\publish-standalone -Filter "*-setup.exe"        | Select-Object -First 1).FullName,
            (Get-ChildItem .\publish-standalone -Filter "*.msi" -Exclude "*.msi.zip" | Select-Object -First 1).FullName
          )

          $failed = $false
          foreach ($path in $targets) {
            if (-not $path -or -not (Test-Path $path)) {
              Write-Error "Expected file not found (check artifact contents)"
              Get-ChildItem .\publish-standalone
              exit 1
            }

            Write-Host "`nVerifying: $path"
            $sig = Get-AuthenticodeSignature $path
            Write-Host "  Status:  $($sig.Status)"
            Write-Host "  Subject: $($sig.SignerCertificate.Subject)"
            Write-Host "  Issuer:  $($sig.SignerCertificate.Issuer)"

            if ($sig.Status -ne "Valid") {
              Write-Error "Signature not valid for $path"
              $failed = $true
            }
          }

          if ($failed) { exit 1 }
          Write-Host "`nAll standalone signatures OK"

      - name: Run Lighthouse (sqlite)
        shell: bash
        run: |
          cd publish
          ./Lighthouse.exe > lighthouse.log 2>&1 &
          echo $! > lighthouse.pid
          echo "Started Lighthouse with PID $(cat lighthouse.pid)"
        env:
          Database__Provider: sqlite
          Database__ConnectionString: "Data Source=lighthouse.db"

      - name: Wait for Lighthouse to start
        shell: bash
        run: |
          timeout=60
          elapsed=0
          
          echo "Waiting for service to start..."
          while [ $elapsed -lt $timeout ]; do
            if curl -k -s -f http://localhost:5000 > /dev/null 2>&1; then
              echo "Service is up!"
              exit 0
            fi
            
            # Check if process is still running
            if [ -f publish/lighthouse.pid ]; then
              pid=$(cat publish/lighthouse.pid)
              if ! kill -0 $pid 2>/dev/null; then
                echo "Process died unexpectedly!"
                cat publish/lighthouse.log
                exit 1
              fi
            fi
            
            sleep 2
            elapsed=$((elapsed + 2))
          done
          
          echo "Timeout waiting for service"
          cat publish/lighthouse.log
          exit 1

      - name: Stop Lighthouse Server
        if: always()
        shell: bash
        run: |
          if [ -f publish/lighthouse.pid ]; then
            pid=$(cat publish/lighthouse.pid)
            echo "Stopping process $pid"
            kill $pid 2>/dev/null || true
          fi
          
          # Show logs
          echo "=== Lighthouse Log ==="
          cat publish/lighthouse.log || true