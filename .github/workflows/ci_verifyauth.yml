name: Verify Authentication

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  verifyauth:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: '0'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-linux-x64-${{ inputs.version }}
          path: ./Lighthouse/linux-x64

      - name: Run keycloak
        run: |
          docker compose up -d
        working-directory: ./examples/keycloak

      - name: Run TLS-terminating reverse proxy (Traefik)
        run: |
          docker compose up -d
        working-directory: ./examples/reverse-proxy

      - name: Enable Corepack and prepare pnpm
        run: |
          mkdir -p "$HOME/.local/share/pnpm"
          echo "PNPM_HOME=$HOME/.local/share/pnpm" >> $GITHUB_ENV
          echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          corepack enable
          corepack prepare pnpm@latest --activate
        shell: bash
        working-directory: ./Lighthouse.EndToEndTests

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: '24'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
        working-directory: ./Lighthouse.EndToEndTests

      - name: Cache pnpm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-e2e-${{ hashFiles('**/Lighthouse.EndToEndTests/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-e2e-

      - name: Install E2E dependencies
        run: pnpm install --frozen-lockfile
        shell: bash
        working-directory: ./Lighthouse.EndToEndTests

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/Lighthouse.EndToEndTests/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Chromium
        run: pnpm exec playwright install chromium --only-shell
        shell: bash
        working-directory: ./Lighthouse.EndToEndTests

      - name: Install Chromium system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install-deps chromium
        shell: bash
        working-directory: ./Lighthouse.EndToEndTests

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install cryptography

      - name: Set linux executable permission
        run: sudo chmod -R +x ./linux-x64
        working-directory: ./Lighthouse

      - name: Write private key to file
        run: echo "${{ secrets.LIGHTHOUSE_LICENSE_PRIVATE_KEY }}" > private_key.pem

      - name: Generate license for E2E Tests
        run: |
          python Scripts/generate_license.py private_key.pem Lighthouse.Backend/Lighthouse.Backend.Tests/Services/Implementation/Licensing/valid_not_expired_license.json "1886" "Lighthouse CI" "ci@lighthouse.test" "Lighthouse Test Organization" "$(date -d '+2 days' '+%Y-%m-%d')" "$(date -d '-3 days' '+%Y-%m-%d')"

      - name: Start Lighthouse for Auth tests
        run: |
          ./Lighthouse > lighthouse.log 2>&1 &
        working-directory: ./Lighthouse/linux-x64
        env:
          Database__Provider: sqlite
          Database__ConnectionString: 'Data Source=lighthouse.db'
          Kestrel__Endpoints__Http__Url: "http://localhost:5169"
          Authentication__Enabled: true
          Authentication__Authority: "http://localhost:38080/realms/Lighthouse"
          Authentication__ClientId: "lighthouse-app"
          Authentication__ClientSecret: "vTaGFsyZ70RtZbkHClkqrJomzov5WmB9"
          Authentication__CallbackPath: "/api/auth/callback"
          Authentication__SignedOutCallbackPath: "/api/auth/signout-callback"
          Authentication__Scopes: '["openid", "profile", "email"]'
          Authentication__AllowedOrigins__0: "http://localhost:5173"
          Authentication__SessionLifetimeMinutes: 480
          Authentication__RequireHttpsMetadata: false
          Authorization__Enabled: true
          Authorization__EmergencySystemAdminSubjects__0: "bc58019b-61fb-4cf9-9315-976faf7238aa"
          Authorization__GroupClaimName: "groups"

      - name: Wait for Lighthouse to start (Auth tests)
        run: |
          echo "Waiting for server to be ready..."
          timeout 30 bash -c 'until curl --silent --fail --insecure http://localhost:5169; do sleep 1; done'
          echo "Server is ready!"

          cat lighthouse.log
        working-directory: ./Lighthouse/linux-x64

      - name: Run Auth Playwright tests
        run: pnpm run test:auth
        shell: bash
        working-directory: ./Lighthouse.EndToEndTests
        env:
          LIGHTHOUSEURL: http://localhost:5169

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-auth
          path: ./Lighthouse.EndToEndTests/playwright-report/
          retention-days: 30

      - name: Reset Lighthouse state for RBAC tests
        if: ${{ !cancelled() }}
        run: |
          echo "Stopping Lighthouse..."
          pkill Lighthouse || true
          # Give the process a moment to release file locks before deleting the DB.
          for i in 1 2 3 4 5; do
            if pgrep Lighthouse > /dev/null; then
              sleep 1
            else
              break
            fi
          done
          echo "Removing database and logs to ensure clean state..."
          rm -f ./linux-x64/lighthouse.db ./linux-x64/lighthouse.db-shm ./linux-x64/lighthouse.db-wal
          rm -rf ./linux-x64/logs
          mv ./linux-x64/lighthouse.log ./linux-x64/lighthouse-auth.log || true
          rm -rf ./Lighthouse.EndToEndTests/playwright-report
          rm -rf ./Lighthouse.EndToEndTests/test-results
        working-directory: ./Lighthouse

      - name: Start Lighthouse for RBAC tests
        if: ${{ !cancelled() }}
        run: |
          ./Lighthouse > lighthouse.log 2>&1 &
        working-directory: ./Lighthouse/linux-x64
        env:
          Database__Provider: sqlite
          Database__ConnectionString: 'Data Source=lighthouse.db'
          Kestrel__Endpoints__Http__Url: "http://localhost:5169"
          Authentication__Enabled: true
          Authentication__Authority: "http://localhost:38080/realms/Lighthouse"
          Authentication__ClientId: "lighthouse-app"
          Authentication__ClientSecret: "vTaGFsyZ70RtZbkHClkqrJomzov5WmB9"
          Authentication__CallbackPath: "/api/auth/callback"
          Authentication__SignedOutCallbackPath: "/api/auth/signout-callback"
          Authentication__Scopes: '["openid", "profile", "email"]'
          Authentication__AllowedOrigins__0: "http://localhost:5173"
          Authentication__SessionLifetimeMinutes: 480
          Authentication__RequireHttpsMetadata: false
          Authorization__Enabled: true
          Authorization__EmergencySystemAdminSubjects__0: "bc58019b-61fb-4cf9-9315-976faf7238aa"
          Authorization__GroupClaimName: "groups"

      - name: Wait for Lighthouse to restart (RBAC tests)
        if: ${{ !cancelled() }}
        run: |
          echo "Waiting for server to be ready..."
          timeout 30 bash -c 'until curl --silent --fail --insecure http://localhost:5169; do sleep 1; done'
          echo "Server is ready!"

          cat lighthouse.log
        working-directory: ./Lighthouse/linux-x64

      - name: Run RBAC Playwright tests
        if: ${{ !cancelled() }}
        run: pnpm run test:rbac
        shell: bash
        working-directory: ./Lighthouse.EndToEndTests
        env:
          LIGHTHOUSEURL: http://localhost:5169

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-rbac
          path: ./Lighthouse.EndToEndTests/playwright-report/
          retention-days: 30

      - name: Reset Lighthouse state for proxied-auth tests
        if: ${{ !cancelled() }}
        run: |
          echo "Stopping Lighthouse..."
          pkill Lighthouse || true
          for i in 1 2 3 4 5; do
            if pgrep Lighthouse > /dev/null; then
              sleep 1
            else
              break
            fi
          done
          echo "Removing database and logs to ensure clean state..."
          rm -f ./linux-x64/lighthouse.db ./linux-x64/lighthouse.db-shm ./linux-x64/lighthouse.db-wal
          rm -rf ./linux-x64/logs
          mv ./linux-x64/lighthouse.log ./linux-x64/lighthouse-rbac.log || true
          rm -rf ./Lighthouse.EndToEndTests/playwright-report
          rm -rf ./Lighthouse.EndToEndTests/test-results
        working-directory: ./Lighthouse

      - name: Start Lighthouse behind reverse proxy (proxied-auth tests)
        if: ${{ !cancelled() }}
        run: |
          ./Lighthouse > lighthouse.log 2>&1 &
        working-directory: ./Lighthouse/linux-x64
        env:
          Database__Provider: sqlite
          Database__ConnectionString: 'Data Source=lighthouse.db'
          Kestrel__Endpoints__Http__Url: "http://localhost:5169"
          Authentication__Enabled: true
          Authentication__Authority: "http://localhost:38080/realms/Lighthouse"
          Authentication__ClientId: "lighthouse-app"
          Authentication__ClientSecret: "vTaGFsyZ70RtZbkHClkqrJomzov5WmB9"
          Authentication__CallbackPath: "/api/auth/callback"
          Authentication__SignedOutCallbackPath: "/api/auth/signout-callback"
          Authentication__Scopes: '["openid", "profile", "email"]'
          Authentication__AllowedOrigins__0: "https://localhost:8443"
          Authentication__TrustedProxies__0: "127.0.0.1"
          Authentication__TrustedProxies__1: "::1"
          Authentication__SessionLifetimeMinutes: 480
          Authentication__RequireHttpsMetadata: false
          Authorization__Enabled: true
          Authorization__EmergencySystemAdminSubjects__0: "bc58019b-61fb-4cf9-9315-976faf7238aa"
          Authorization__GroupClaimName: "groups"

      - name: Wait for reverse proxy to serve Lighthouse (proxied-auth tests)
        if: ${{ !cancelled() }}
        run: |
          echo "Waiting for https://localhost:8443 to be ready..."
          timeout 30 bash -c 'until curl --silent --fail --insecure https://localhost:8443; do sleep 1; done'
          echo "Reverse proxy is ready!"

          cat lighthouse.log
        working-directory: ./Lighthouse/linux-x64

      - name: Run proxied-auth Playwright tests
        if: ${{ !cancelled() }}
        run: pnpm run test:proxyauth
        shell: bash
        working-directory: ./Lighthouse.EndToEndTests
        env:
          LIGHTHOUSEURL: https://localhost:8443

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-proxyauth
          path: ./Lighthouse.EndToEndTests/playwright-report/
          retention-days: 30

      - name: Stop Lighthouse Server
        if: always()
        run: |
          pkill Lighthouse || true
          echo "===== Auth-run lighthouse log ====="
          cat ./linux-x64/lighthouse-auth.log || true
          echo "===== RBAC-run lighthouse log ====="
          cat ./linux-x64/lighthouse-rbac.log || true
          echo "===== Proxied-auth-run lighthouse log ====="
          cat ./linux-x64/lighthouse.log || true
          rm -rf ./linux-x64/logs
        working-directory: ./Lighthouse
