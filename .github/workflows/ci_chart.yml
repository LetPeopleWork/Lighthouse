name: Helm Chart

# epic-5306 slice-04 — chart lifecycle (ADR-083). Standalone workflow for the new "chart" concern,
# matching the repo's split-by-concern workflows. `validate` runs on every chart change. `publish`
# packages + indexes into docs/charts/ and commits, so the existing pages.yml serves it (one Pages
# source per repo). Publishing is gated on the `Release` GitHub environment — the SAME approval gate
# as the server release (ci_release.yml) and analogous to the lighthouse-clients publish flow: a push
# to main that carries a NOT-yet-published Chart.yaml version auto-requests publish and waits for a
# maintainer to approve the gate (no separate manual run). `detect-publish` suppresses the gate for
# chart edits that don't bump the version (docs/template tweaks). A `workflow_dispatch` with
# publish=true forces a (still version-guarded) republish for backfills.

on:
  push:
    branches: [main]
    paths:
      - "chart/**"
      - ".github/workflows/ci_chart.yml"
  pull_request:
    paths:
      - "chart/**"
      - ".github/workflows/ci_chart.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Package + index + commit the chart to docs/charts/ (publish)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.3

      - name: helm lint (default + enterprise values)
        run: |
          helm lint ./chart
          helm lint ./chart -f ./chart/values-enterprise.yaml \
            --set postgresql.auth.password=ci --set oidc.clientSecret=ci

      - name: Install helm-unittest plugin
        # v1.0.3 is the last release whose plugin.yaml predates the helm-v4-only `platformHooks`
        # field, so it loads + registers the `unittest` command on helm v3 (v1.1.x does not).
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3 || helm plugin list

      - name: helm unittest (incl. standalone-gate render guard)
        run: helm unittest -f 'tests/unit/*.yaml' ./chart

      - name: Standalone gate — default values render exactly one API workload, postgres provider
        run: |
          set -euo pipefail
          render="$(helm template l8e ./chart --set postgresql.auth.password=ci)"
          deploys="$(printf '%s\n' "$render" | grep -c '^kind: Deployment' || true)"
          [ "$deploys" = "1" ] || { echo "standalone gate: expected 1 Deployment, got $deploys"; exit 1; }
          printf '%s\n' "$render" | grep -qE 'Database__Provider' || { echo "standalone gate: Database__Provider missing"; exit 1; }
          # The provider value must be postgres and never sqlite (Postgres-only chart, ADR-080).
          printf '%s\n' "$render" | grep -iE '[:=]\s*"?sqlite' && { echo "standalone gate: chart must never set provider sqlite"; exit 1; }
          printf '%s\n' "$render" | grep -A1 'Database__Provider' | grep -qi 'postgres' || { echo "standalone gate: provider is not postgres"; exit 1; }
          echo "standalone gate OK"

      - name: config-ref drift gate (helm-docs is regenerated; README must already match)
        # ADR-084 — the chart/README.md Values table is generated from values.yaml `# --` comments.
        # Regenerate with the pinned helm-docs and fail if it differs from the committed file, so a
        # renamed/added/removed values key without a regen is caught before publish (zero phantom keys).
        env:
          HELM_DOCS_VERSION: 1.14.2
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp helm-docs
          /tmp/helm-docs --chart-search-root chart --skip-version-footer -s file --ignore-non-descriptions
          git diff --exit-code -- chart/README.md \
            || { echo "config-ref drift: chart/README.md is stale — run helm-docs and commit (see chart/README.md.gotmpl)"; exit 1; }
          echo "config-ref drift gate OK"

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.3

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: lighthouse-chart-smoke

      - name: helm install (bundled Postgres, embedded SPA, no ingress) into kind
        run: |
          helm install l8e ./chart \
            --set ingress.enabled=false \
            --set postgresql.auth.password=ci-smoke-pw \
            --wait --timeout 5m
          kubectl get pods -o wide

      - name: Assert all workloads Ready
        run: |
          kubectl rollout status deploy -l app.kubernetes.io/instance=l8e --timeout=300s
          kubectl rollout status statefulset -l app.kubernetes.io/instance=l8e --timeout=300s

      - name: Assert API serves /health/ready and the SPA
        run: |
          set -euo pipefail
          kubectl port-forward svc/l8e-lighthouse-api 8080:80 >/tmp/pf.log 2>&1 &
          pf=$!; sleep 5
          curl -fsS http://127.0.0.1:8080/health/ready
          curl -fsS http://127.0.0.1:8080/ | grep -q '<title>Lighthouse</title>'
          kill $pf || true

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -l app.kubernetes.io/instance=l8e || true
          kubectl logs -l app.kubernetes.io/instance=l8e --tail=200 --all-containers || true

  # Decide whether there is a new chart version to publish, so the Release gate only appears when
  # there is actually something to ship. On a push to main: "Chart.yaml version not yet in
  # docs/charts/index.yaml". On workflow_dispatch: honour the publish input (the version-guard in
  # publish.sh still blocks a real overwrite, so forcing it is safe). Never on pull_request.
  detect-publish:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.3

      - name: Decide whether a new chart version needs publishing
        id: decide
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch: publish input = ${{ inputs.publish }}"
            echo "should_publish=${{ inputs.publish }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version="$(helm show chart ./chart | awk '/^version:/ {print $2; exit}' | tr -d '"')"
          if grep -qE "version:[[:space:]]*${version//./\\.}([^0-9]|$)" docs/charts/index.yaml 2>/dev/null; then
            echo "chart $version is already published — no publish needed, no gate"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "chart $version is not yet published — requesting Release-gated publish"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: [validate, install-smoke, detect-publish]
    if: needs.detect-publish.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    # Reuse the server release gate: publishing the chart waits for the same maintainer approval
    # as ci_release.yml. Configure required reviewers on the `Release` environment in repo settings.
    environment:
      name: Release
    permissions:
      contents: write
    steps:
      # Check out with a maintainer PAT (same secret ci_release.yml uses for the GitHub Release).
      # The publish step pushes a commit to main, and main's ruleset requires 7 status checks;
      # only Admin/Maintain roles bypass it. The default GITHUB_TOKEN (GitHub Actions) is NOT a
      # ruleset bypass actor and cannot be added as one (422: "integration must be part of the
      # ruleset source or owner organization"), so the push must authenticate as an admin user.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          token: ${{ secrets.RELEASE_CREATION_TOKEN }}

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.3

      - name: Guard + package + index into docs/charts/
        # version-guard refuses to overwrite an already-published version and asserts
        # Chart.yaml == README == NOTES.txt == values-enterprise image.tag (appVersion).
        run: ./chart/scripts/publish.sh

      - name: Commit the published chart (pages.yml serves docs/charts/)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          version="$(helm show chart ./chart | awk '/^version:/ {print $2; exit}')"
          git add docs/charts
          git commit -m "chore(chart): publish lighthouse-${version} to docs/charts (ADR-083)"
          git push origin HEAD:main
