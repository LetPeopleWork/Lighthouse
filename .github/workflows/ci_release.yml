name: Release
on:
  workflow_call:
    inputs:
      fileversion:
        required: true
        type: string
      version:
        required: true
        type: string
jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'
    
    environment:
      name: Release
   
    permissions:
      contents: write
      packages: write
      actions: read
      id-token: write
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: '0'
      
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ inputs.version }} -m "Release ${{ inputs.version }}"
          git push origin ${{ inputs.version }}
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Tag docker image with latest
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/$REPO_NAME:${{ inputs.fileversion }}
          docker tag ghcr.io/$REPO_NAME:${{ inputs.fileversion }} ghcr.io/$REPO_NAME:latest
          docker push ghcr.io/$REPO_NAME:latest
      
          # Install Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22
      
        # Sign the image using keyless signing (GitHub OIDC)
      - name: Sign Docker image with Cosign
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          cosign sign --yes ghcr.io/$REPO_NAME:${{ inputs.fileversion }}
          cosign sign --yes ghcr.io/$REPO_NAME:latest
      
      - name: Verify the signature
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          cosign verify --certificate-identity="https://github.com/LetPeopleWork/Lighthouse/.github/workflows/ci_release.yml@refs/heads/main" --certificate-oidc-issuer="https://token.actions.githubusercontent.com" ghcr.io/$REPO_NAME:${{ inputs.fileversion }}
          cosign verify --certificate-identity="https://github.com/LetPeopleWork/Lighthouse/.github/workflows/ci_release.yml@refs/heads/main" --certificate-oidc-issuer="https://token.actions.githubusercontent.com" ghcr.io/$REPO_NAME:latest
      
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-win-x64-${{ inputs.version }}
          path: LighthouseArtifacts/win-x64
          
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-osx-dmg-${{ inputs.version }}
          path: LighthouseArtifacts/osx-dmg

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-osx-app-${{ inputs.version }}
          path: LighthouseArtifacts/osx-app

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-osx-updater-${{ inputs.version }}
          path: LighthouseArtifacts/osx-updater

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-linux-x64-${{ inputs.version }}
          path: LighthouseArtifacts/linux-x64

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-linux-standalone-${{ inputs.version }}
          path: LighthouseArtifacts/linux-standalone

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-win-standalone-x64-${{ inputs.version }}
          path: LighthouseArtifacts/win-standalone

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: Lighthouse-SBOM-${{ inputs.version }}
          path: LighthouseArtifacts/sbom

      - uses: vimtor/action-zip@5407800dfb2b1b37d48df912330cb22f4ab6f422
        with:
          files: LighthouseArtifacts/win-x64
          dest: Lighthouse-server-win-x64.zip

      - uses: vimtor/action-zip@5407800dfb2b1b37d48df912330cb22f4ab6f422
        with:
          files: LighthouseArtifacts/linux-x64
          dest: Lighthouse-server-linux-x64.zip

      - name: Prepare macOS release files
        run: |
          cp LighthouseArtifacts/osx-dmg/Lighthouse-${{ inputs.version }}.dmg Lighthouse-standalone-osx.dmg
          cp LighthouseArtifacts/osx-app/Lighthouse-${{ inputs.version }}.app.zip Lighthouse-standalone-osx.app.zip

      - uses: vimtor/action-zip@5407800dfb2b1b37d48df912330cb22f4ab6f422
        with:
          files: LighthouseArtifacts/sbom
          dest: Lighthouse-SBOM.zip

      - name: Prepare Linux standalone release file
        run: |
          cp LighthouseArtifacts/linux-standalone/Lighthouse-standalone.AppImage Lighthouse-standalone.AppImage

          if [ -f LighthouseArtifacts/linux-standalone/Lighthouse-standalone.AppImage.sig ]; then
            cp LighthouseArtifacts/linux-standalone/Lighthouse-standalone.AppImage.sig Lighthouse-standalone.AppImage.sig
          else
            echo "WARN: No Linux updater sig found"
          fi

      - name: Prepare Windows standalone release files
        run: |
          # Find and rename setup EXE to canonical release name
          SETUP_EXE=$(find LighthouseArtifacts/win-standalone -name "*-setup.exe" | head -1)
          if [ -z "$SETUP_EXE" ]; then
            echo "ERROR: No NSIS setup EXE found in win-standalone artifact"
            ls -laR LighthouseArtifacts/win-standalone/ || true
            exit 1
          fi
          cp "$SETUP_EXE" Lighthouse-standalone-installer.exe

          # Find and rename MSI to canonical release name
          MSI=$(find LighthouseArtifacts/win-standalone -name "*.msi" ! -name "*.msi.zip" | head -1)
          if [ -z "$MSI" ]; then
            echo "ERROR: No MSI found in win-standalone artifact"
            ls -laR LighthouseArtifacts/win-standalone/ || true
            exit 1
          fi
          cp "$MSI" Lighthouse-standalone-installer.msi

          # Windows updater sigs (Tauri v2: signs exe/msi directly, no zip)
          NSIS_SIG=$(find LighthouseArtifacts/win-standalone -name "*-setup.exe.sig" | head -1)
          if [ -n "$NSIS_SIG" ]; then
            cp "$NSIS_SIG" Lighthouse-standalone-installer.exe.sig
          else
            echo "WARN: No NSIS updater sig found"
          fi

          MSI_SIG=$(find LighthouseArtifacts/win-standalone -name "*.msi.sig" | head -1)
          if [ -n "$MSI_SIG" ]; then
            cp "$MSI_SIG" Lighthouse-standalone-installer.msi.sig
          else
            echo "WARN: No MSI updater sig found"
          fi

      - name: Prepare macOS updater release files
        run: |
          # macOS updater archive + signature
          if [ -f LighthouseArtifacts/osx-updater/Lighthouse-${{ inputs.version }}.app.tar.gz ]; then
            cp LighthouseArtifacts/osx-updater/Lighthouse-${{ inputs.version }}.app.tar.gz Lighthouse-standalone-osx.app.tar.gz
          fi
          if [ -f LighthouseArtifacts/osx-updater/Lighthouse-${{ inputs.version }}.app.tar.gz.sig ]; then
            cp LighthouseArtifacts/osx-updater/Lighthouse-${{ inputs.version }}.app.tar.gz.sig Lighthouse-standalone-osx.app.tar.gz.sig
          fi

      - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          artifacts: "Lighthouse-server-win-x64.zip,Lighthouse-standalone-installer.exe,Lighthouse-standalone-installer.exe.sig,Lighthouse-standalone-installer.msi,Lighthouse-standalone-installer.msi.sig,Lighthouse-standalone-osx.dmg,Lighthouse-standalone-osx.app.zip,Lighthouse-standalone-osx.app.tar.gz,Lighthouse-standalone-osx.app.tar.gz.sig,Lighthouse-server-linux-x64.zip,Lighthouse-standalone.AppImage,Lighthouse-standalone.AppImage.sig,Lighthouse-SBOM.zip"
          tag: ${{ inputs.version }}
          prerelease: true
          name: "Lighthouse ${{ inputs.version }}"
          token: ${{ secrets.RELEASE_CREATION_TOKEN}}